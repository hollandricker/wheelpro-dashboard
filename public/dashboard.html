// Concentration helpers — exposed at module scope so all tables (Recommended Puts,
// Top Candidates, Screener) can reuse them. A stock is "high concentration" when
// its cash-at-risk (strike × 100) consumes ≥60% of the selected tier's upper cap.
function getConcentrationPctFor(stock, capitalTier) {
  const tierUpper = CAPITAL_TIERS[capitalTier]?.upper || null;
  if (!tierUpper) return 0;
  const cashReq = (stock?.strikePrice || 0) * 100;
  return (cashReq / tierUpper) * 100;
}
function isHighConcentrationFor(stock, capitalTier) {
  return getConcentrationPctFor(stock, capitalTier) >= 60;
}

function DashboardPage({ stocks, watchlist = [], toggleWatchlist, onSelectStock, onSetPage, capitalTier = 'all' }) {
  const DISMISSAL_COOLDOWN_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
  const [dismissedAt, setDismissedAt] = useState(() => {
    try {
      const ts = localStorage.getItem('starter-warning-dismissed-at');
      return ts ? parseInt(ts, 10) : 0;
    } catch(e) { return 0; }
  });
  // Migrate old boolean key -> timestamp key (one-time cleanup)
  useEffect(() => {
    try {
      if (localStorage.getItem('starter-warning-dismissed')) {
        localStorage.removeItem('starter-warning-dismissed');
      }
    } catch(e) {}
  }, []);
  const starterWarningDismissed = dismissedAt && (Date.now() - dismissedAt < DISMISSAL_COOLDOWN_MS);
  const dismissStarterWarning = () => {
    const now = Date.now();
    setDismissedAt(now);
    try { localStorage.setItem('starter-warning-dismissed-at', String(now)); } catch(e) {}
  };

  const topStocks = useMemo(() => {
    return [...stocks]
      .filter(s => s.weeklyYield >= 0.01 && s.delta <= 0.35)
      .sort((a, b) => b.wheelScore - a.wheelScore)
      .slice(0, 20);
  }, [stocks]);

  // Assigned positions needing covered calls — read from localStorage
  const assignedPositions = useMemo(() => {
    const positions = Storage.get('positions', []);
    return positions.filter(p => p.isAssigned || p.wheelStage === 'assigned' || p.wheelStage === 'selling_calls');
  }, []);

  // For each assigned position, compute the best conservative CC rec
  const assignedWithRecs = useMemo(() => {
    return assignedPositions.map(p => {
      const stock = stocks.find(s => s.symbol === p.symbol);
      const costBasis = p.assignmentCostBasis || p.costBasis || (p.strike - p.premium);
      const recs = CoveredCallHelper.generateRecs(stock, costBasis, p.contracts || 1);
      const bestConservative = recs.conservative[0] || null;
      const bestAggressive = recs.aggressive[0] || null;
      return { ...p, stock, costBasis, bestConservative, bestAggressive, currentPrice: stock?.price || p.currentPrice || costBasis };
    });
  }, [assignedPositions, stocks]);

  // NEW: Recommended puts — only SELL_PUT with HIGH or MEDIUM confidence
  const recommendedPuts = useMemo(() => {
    const tier = CAPITAL_TIERS[capitalTier] || CAPITAL_TIERS.all;
    return [...stocks]
      .filter(s => s.recommendation && s.recommendation.type === 'SELL_PUT' && (s.recommendation.confidence === 'HIGH' || s.recommendation.confidence === 'MEDIUM'))
      // Exclude sub-$5 stocks/strikes (defense in depth — universe should already filter)
      .filter(s => (s.price || 0) >= 5 && (s.strikePrice || 0) >= 5)
      // Apply capital tier filter based on cash required (strike * 100)
      .filter(s => {
        if (!tier.upper && !tier.lower) return true; // "all"
        const cashReq = (s.strikePrice || 0) * 100;
        if (tier.upper != null && cashReq > tier.upper) return false;
        if (tier.lower != null && capitalTier === 'full' && cashReq <= tier.lower) return false;
        if (tier.lower != null && capitalTier === 'builder' && cashReq <= tier.lower) return false;
        return true;
      })
      .sort((a, b) => {
        // HIGH confidence first, then by score
        if (a.recommendation.confidence === 'HIGH' && b.recommendation.confidence !== 'HIGH') return -1;
        if (b.recommendation.confidence === 'HIGH' && a.recommendation.confidence !== 'HIGH') return 1;
        return b.wheelScore - a.wheelScore;
      });
  }, [stocks, capitalTier]);

  // Per-stock concentration check: cashReq as % of tier upper cap
  // Delegates to module-level helpers so Top Candidates / Screener share the logic.
  const getConcentrationPct = (stock) => getConcentrationPctFor(stock, capitalTier);
  const isHighConcentration = (stock) => isHighConcentrationFor(stock, capitalTier);

  const avgScore = useMemo(() => {
    if (topStocks.length === 0) return 0;
    return Math.round(topStocks.reduce((s, t) => s + t.wheelScore, 0) / topStocks.length);
  }, [topStocks]);

  const avgYield = useMemo(() => {
    if (topStocks.length === 0) return 0;
    return +(topStocks.reduce((s, t) => s + t.annualizedYield, 0) / topStocks.length).toFixed(1);
  }, [topStocks]);

  const bullishCount = stocks.filter(s => s.technicalSignal > 0.2).length;
  const bearishCount = stocks.filter(s => s.technicalSignal < -0.2).length;

  // v2.5: Capital Allocation
  const totalCashNeeded = useMemo(() => {
    return recommendedPuts.reduce((sum, s) => sum + (s.cashRequired || Math.round(s.strikePrice * 100)), 0);
  }, [recommendedPuts]);
  const avgCashPerTrade = recommendedPuts.length > 0 ? Math.round(totalCashNeeded / recommendedPuts.length) : 0;

  // Split-table refs for frozen Symbol columns
  const recSplit = useSplitTable([recommendedPuts]);
  const candSplit = useSplitTable([topStocks]);

  // Responsive: swap main Recommended Puts table for stacked cards on narrow/portrait
  const layout = useResponsiveLayout();

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-green)'}}>
          <div className="stat-label">Recommended Puts</div>
          <div className="stat-value" style={{color:'var(--accent-green)'}}>{recommendedPuts.length}</div>
          <div className="stat-change positive">{recommendedPuts.filter(s=>s.recommendation.confidence==='HIGH').length} high confidence</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Top Wheel Score</div>
          <div className="stat-value" style={{color:'var(--accent-blue)'}}>{topStocks[0]?.wheelScore || 0}</div>
          <div className="stat-change positive">{topStocks[0]?.symbol}</div>
        </div>
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-amber)'}}>
          <div className="stat-label">Capital Needed (All Recs)</div>
          <div className="stat-value" style={{color:'var(--accent-amber)'}}>${totalCashNeeded.toLocaleString()}</div>
          <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>~${avgCashPerTrade.toLocaleString()} avg/trade</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Market Sentiment</div>
          <div className="stat-value" style={{color: bullishCount > bearishCount ? 'var(--accent-green)' : 'var(--accent-red)'}}>
            {bullishCount > bearishCount ? '●' : '●'}
          </div>
          <div className="stat-change" style={{color:'var(--text-muted)',background:'none'}}>
            {bullishCount}↑ / {bearishCount}↓
          </div>
        </div>
      </div>

      {/* Capital tier: Starter concentration advisory (dismissible) */}
      {capitalTier === 'starter' && !starterWarningDismissed && (
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
          padding:'10px 14px', marginBottom:'16px',
          background:'rgba(245,158,11,0.08)',
          border:'1px solid rgba(245,158,11,0.25)',
          borderRadius:'var(--radius-sm)',
          boxShadow:'0 0 12px var(--accent-amber-glow, rgba(245,158,11,0.12))',
          fontSize:'12px', color:'var(--accent-amber)'
        }}>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{fontSize:14}}>⚠</span>
            <span><strong>Starter Tier:</strong> Single-trade concentration increases risk. Consider spreading capital across multiple trades as your account grows.</span>
          </div>
          <button
            onClick={dismissStarterWarning}
            aria-label="Dismiss starter tier warning"
            style={{background:'none', border:'none', color:'var(--accent-amber)', cursor:'pointer', fontSize:'14px', lineHeight:1, padding:'2px 6px', opacity:0.75}}
            title="Dismiss"
          >✕</button>
        </div>
      )}

      {/* ===== RECOMMENDED TRADES PANEL ===== */}
      {recommendedPuts.length > 0 && (
        <div className="data-table-container" style={{marginBottom:'24px', border:'1px solid rgba(30,166,81,0.15)', background:'var(--bg-card)'}}>
          <div className="data-table-header" style={{borderBottom:'1px solid rgba(30,166,81,0.1)'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
              <div>
                <h3 style={{color:'var(--accent-green)', margin:0}}>Recommended Puts to Sell</h3>
                <span style={{fontSize:'11px', color:'var(--text-muted)'}}>These options pass all screening criteria — sorted by confidence then score</span>
              </div>
            </div>
            <span style={{padding:'2px 8px', borderRadius:'3px', fontSize:'11px', fontWeight:600, background:'rgba(30,166,81,0.06)', color:'var(--accent-green)', border:'1px solid rgba(30,166,81,0.15)', fontFamily:'var(--font-mono)', letterSpacing:'0.3px'}}>
              {recommendedPuts.length} Active Signal{recommendedPuts.length !== 1 ? 's' : ''}
            </span>
          </div>
          {layout === 'cards' ? (
            <div className="stock-card-list responsive-layout-fade" key="rec-cards">
              {recommendedPuts.map(stock => {
                const highConc = isHighConcentration(stock);
                const pct = Math.round(getConcentrationPct(stock));
                const tierLabel = CAPITAL_TIERS[capitalTier]?.label?.split(' (')[0] || '';
                return (
                  <div key={stock.symbol} style={{position:'relative'}}>
                    {highConc && (
                      <div style={{
                        display:'flex', alignItems:'center', gap:6,
                        padding:'6px 10px', marginBottom:6,
                        background:'rgba(245,158,11,0.1)',
                        border:'1px solid rgba(245,158,11,0.3)',
                        borderRadius:'var(--radius-sm)',
                        boxShadow:'0 0 8px var(--accent-amber-glow, rgba(245,158,11,0.15))',
                        fontSize:'11px', color:'var(--accent-amber)', fontWeight:600
                      }}>
                        <span>⚠</span>
                        <span>Uses ~{pct}% of your {tierLabel} capital — consider position size</span>
                      </div>
                    )}
                    <StockCard stock={stock} onClick={onSelectStock} />
                  </div>
                );
              })}
            </div>
          ) : (
          <div className="split-table-wrapper responsive-layout-fade" key="rec-table">
            {/* FIXED: Symbol column */}
            <div className="split-table-fixed" ref={recSplit.fixedRef}>
              <table className="data-table">
                <thead>
                  <tr><th scope="col">Symbol</th></tr>
                </thead>
                <tbody>
                  {recommendedPuts.map((stock, i) => {
                    const highConc = isHighConcentration(stock);
                    return (
                    <tr key={stock.symbol} style={{animation: `slideIn 0.3s ease-out ${i * 0.04}s both`, background: highConc ? 'rgba(245,158,11,0.06)' : (stock.recommendation.confidence === 'HIGH' ? 'rgba(16,185,129,0.03)' : 'transparent')}}>
                      <td style={{background: highConc ? 'rgba(245,158,11,0.08)' : (stock.recommendation.confidence === 'HIGH' ? '#0e1a2e' : '#0d1526'), borderLeft: highConc ? '2px solid var(--accent-amber)' : undefined}}>
                        <div className="ticker" style={{cursor:'pointer'}} role="button" tabIndex={0} aria-label={`View ${stock.symbol} details`} onClick={() => onSelectStock && onSelectStock(stock)} onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelectStock && onSelectStock(stock); } }}>
                          {highConc && <span title={`Uses ~${Math.round(getConcentrationPct(stock))}% of your ${CAPITAL_TIERS[capitalTier]?.label || ''} capital`} style={{color:'var(--accent-amber)', marginRight:4}}>⚠</span>}
                          {stock.symbol}
                        </div>
                        <div className="fixed-col-subtext" style={{fontSize:'10px', color:'var(--text-muted)'}}>{stock.name}</div>
                      </td>
                    </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* SCROLLABLE: all other columns */}
            <div className="split-table-scroll" ref={recSplit.scrollRef}>
              <table className="data-table">
                <thead>
                  <tr>
                    <th scope="col">Confidence</th>
                    <th scope="col">Price</th>
                    <th scope="col">Strike</th>
                    <th scope="col">Support</th>
                    <th scope="col">Resistance</th>
                    <th scope="col">Exp Date</th>
                    <th scope="col">Premium</th>
                    <th scope="col">Wk Yield</th>
                    <th scope="col">Mo. Yield</th>
                    <th scope="col">Theta/Day</th>
                    <th scope="col">Delta</th>
                    <th scope="col">P.O.P.</th>
                    <th scope="col">Cash Req.</th>
                    <th scope="col">Max Loss</th>
                    <th scope="col">IV %ile</th>
                    <th scope="col">P/C Ratio</th>
                    <th scope="col">Bid-Ask</th>
                    <th scope="col">Earnings</th>
                    <th scope="col">Ex-Div</th>
                    <th scope="col">Score</th>
                    <th scope="col">Reason</th>
                  </tr>
                </thead>
                <tbody>
                  {recommendedPuts.map((stock, i) => {
                    const confStyle = WheelScoring.getConfidenceStyle(stock.recommendation.confidence);
                    const pop = stock.probOfProfit || WheelScoring.getProbOfProfit(stock.delta);
                    const cashReq = stock.cashRequired || WheelScoring.getCashRequired(stock.strikePrice);
                    const maxLoss = stock.maxLoss || Math.round((stock.strikePrice - stock.premium) * 100);
                    const highConc = isHighConcentration(stock);
                    return (
                      <tr key={stock.symbol} style={{animation: `slideIn 0.3s ease-out ${i * 0.04}s both`, background: highConc ? 'rgba(245,158,11,0.06)' : (stock.recommendation.confidence === 'HIGH' ? 'rgba(16,185,129,0.03)' : 'transparent')}}>
                        <td>
                          <span style={{padding:'2px 7px', borderRadius:'3px', fontSize:'10px', fontWeight:600, background:confStyle.bg, color:confStyle.color, border:confStyle.border, letterSpacing:'0.5px', fontFamily:'var(--font-mono)'}}>
                            {stock.recommendation.confidence}
                          </span>
                        </td>
                        <td style={{fontFamily:'var(--font-mono)', fontWeight:600}}>${stock.price.toFixed(2)}</td>
                        <td style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-blue)'}}>
                          ${stock.strikePrice.toFixed(2)}
                          <div style={{fontSize:'10px', color:'var(--text-muted)'}}>{((1 - stock.strikePrice/stock.price)*100).toFixed(1)}% OTM</div>
                        </td>
                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color: stock.strikePrice < (stock.supportLevel||0) ? 'var(--accent-green)' : 'var(--accent-amber)'}}>
                          ${(stock.supportLevel||0).toFixed(2)}
                          {stock.strikePrice < (stock.supportLevel||0) && <div style={{fontSize:'9px',color:'var(--accent-green)'}}>✓ Below</div>}
                        </td>
                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--text-muted)'}}>
                          ${(stock.resistanceLevel||0).toFixed(2)}
                        </td>
                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>{stock.expDateStr || `${stock.daysToExpiry}d`}</td>
                        <td style={{fontFamily:'var(--font-mono)', color:'var(--accent-green)', fontWeight:700}}>${stock.premium.toFixed(2)}</td>
                        <td style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-blue)'}}>
                          {(stock.weeklyYield * 100).toFixed(2)}%
                        </td>
                        <td>
                          <Tip text={`MONTHLY YIELD: ${(stock.weeklyYield * (stock.daysToExpiry || 7) / 30 * 100).toFixed(2)}%\n= Weekly yield × (${stock.daysToExpiry || 7} DTE ÷ 30)\nThis is your actual expected return\nfor this specific contract period.`}>
                          <span style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-purple)'}}>
                            {(stock.weeklyYield * (stock.daysToExpiry || 7) / 30 * 100).toFixed(2)}%
                          </span>
                          </Tip>
                        </td>
                        <td>
                          <Tip text={`THETA DECAY: $${(stock.thetaPerDay || (stock.premium * 100 / (stock.daysToExpiry || 7))).toFixed(2)}/day\nThis is how much the option loses in value each day — money that flows to you as the seller.\n\nProjected income from theta:\nPer week: $${(stock.thetaPerWeek || (stock.premium * 100 / (stock.daysToExpiry || 7) * 5)).toFixed(2)}\nPer month: $${((stock.thetaPerDay || (stock.premium * 100 / (stock.daysToExpiry || 7))) * 21).toFixed(2)}\nPer year: $${((stock.thetaPerDay || (stock.premium * 100 / (stock.daysToExpiry || 7))) * 252).toFixed(0)} (if repeated)\n\n${stock.gammaRisk === 'HIGH' ? 'HIGH gamma risk — delta can change rapidly on short DTE' : stock.gammaRisk === 'ELEVATED' ? 'Elevated gamma — monitor position closely' : 'Normal gamma risk'}`}>
                          <span style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-green)'}}>
                            ${(stock.thetaPerDay || (stock.premium * 100 / (stock.daysToExpiry || 7))).toFixed(2)}
                          </span>
                          </Tip>
                        </td>
                        <td>
                          <Tip text={TipText.delta(stock)}>
                          <span className={`indicator-pill ${stock.delta <= 0.20 ? 'pill-green' : stock.delta <= 0.28 ? 'pill-amber' : 'pill-red'}`}>
                            {stock.delta.toFixed(2)}
                          </span>
                          </Tip>
                        </td>
                        <td>
                          <Tip text={TipText.pop(stock)}>
                          <span style={{fontFamily:'var(--font-mono)', fontWeight:600, color: pop >= 80 ? 'var(--accent-green)' : pop >= 70 ? 'var(--accent-amber)' : 'var(--accent-red)'}}>
                          {pop}%
                          </span>
                          </Tip>
                        </td>
                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>${cashReq.toLocaleString()}</td>
                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--accent-red)'}}>${maxLoss.toLocaleString()}</td>
                        <td>
                          <span className={`indicator-pill ${(stock.ivPercentile||50) >= 50 ? 'pill-green' : 'pill-amber'}`}>
                            {stock.ivPercentile || 50}%
                          </span>
                        </td>
                        <td style={{fontFamily:'var(--font-mono)', fontSize:'11px', color: (stock.putCallRatio||1) > 1.2 ? 'var(--accent-red)' : (stock.putCallRatio||1) < 0.8 ? 'var(--accent-green)' : 'var(--text-muted)'}}>
                          {(stock.putCallRatio||1).toFixed(2)}
                          <div style={{fontSize:'9px', color:'var(--text-muted)'}}>{(stock.putCallRatio||1) > 1.2 ? 'Bearish' : (stock.putCallRatio||1) < 0.8 ? 'Bullish' : 'Neutral'}</div>
                        </td>
                        <td>
                          <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color: stock.bidAskSpread <= 0.05 ? 'var(--accent-green)' : stock.bidAskSpread <= 0.10 ? 'var(--text-secondary)' : 'var(--accent-amber)'}}>
                            ${stock.bidAskSpread.toFixed(2)}
                          </span>
                        </td>
                        <td>
                          {stock.earningsIn != null && stock.earningsIn <= 14 && stock.earningsConfirmed !== false ? (
                            <span style={{fontSize:'11px', padding:'2px 6px', borderRadius:'4px', background:'rgba(239,68,68,0.15)', color:'var(--accent-red)'}}>
                              ⚠ {stock.earningsDateStr || (stock.earningsIn + 'd')}
                            </span>
                          ) : stock.earningsConfirmed === false ? (
                            <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{stock.earningsIn == null ? '—' : '~' + (stock.earningsDateStr || (stock.earningsIn + 'd'))}</span>
                          ) : (
                            <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{stock.earningsIn == null ? '—' : (stock.earningsDateStr || (stock.earningsIn + 'd'))}</span>
                          )}
                        </td>
                        <td>
                          {stock.exDivBeforeExpiry ? (
                            <span style={{fontSize:'11px', padding:'2px 6px', borderRadius:'4px', background:'rgba(245,158,11,0.15)', color:'var(--accent-amber)'}}>
                              ⚠ {stock.exDivDateStr}
                            </span>
                          ) : stock.exDivDateStr ? (
                            <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{stock.exDivDateStr}</span>
                          ) : (
                            <span style={{fontSize:'11px', color:'var(--text-muted)'}}>—</span>
                          )}
                        </td>
                        <td>
                          <Tip text={TipText.score(stock)}>
                          <span className={`score-badge ${stock.wheelScore >= 75 ? 'score-high' : stock.wheelScore >= 50 ? 'score-mid' : 'score-low'}`}>
                            {stock.wheelScore}
                          </span>
                          </Tip>
                        </td>
                        <td style={{fontSize:'12px', color:'var(--text-secondary)', maxWidth:'160px', lineHeight:1.4}}>{stock.recommendation.reason}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          )}
        </div>
      )}

      {recommendedPuts.length === 0 && (
        <div className="data-table-container" style={{marginBottom:'24px', border:'1px solid rgba(100,116,139,0.2)'}}>
          <div style={{padding:'32px 24px', textAlign:'center'}}>
            <div style={{fontSize:'28px', marginBottom:'12px'}}>🌙</div>
            <div style={{fontWeight:600, fontSize:'15px', color:'var(--text-primary)', marginBottom:'8px'}}>
              {capitalTier !== 'all' ? 'No recommendations match this capital tier' : 'No active put signals right now'}
            </div>
            <div style={{fontSize:'13px', color:'var(--text-muted)', maxWidth:460, margin:'0 auto', lineHeight:1.6}}>
              {capitalTier !== 'all'
                ? <>No recommendations match the <strong>{CAPITAL_TIERS[capitalTier]?.label}</strong> tier right now. Try <em>All Capital Levels</em> to see every trade, or check back after the next market data refresh.</>
                : 'Market may be closed or no options currently meet all screening criteria. Showing last available screening data — signals will refresh on the next market session.'}
            </div>
          </div>
        </div>
      )}

      {/* ===== COVERED CALLS PANEL ===== */}
      {assignedWithRecs.length > 0 && (
        <div className="data-table-container" style={{marginBottom:'24px', border:'1px solid rgba(201,168,76,0.25)', background:'linear-gradient(145deg, rgba(201,168,76,0.04) 0%, var(--bg-card) 100%)'}}>
          <div className="data-table-header" style={{borderBottom:'1px solid rgba(201,168,76,0.15)'}}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <div>
                <h3 style={{color:'var(--accent-gold)', margin:0}}>Covered Calls — Assigned Positions</h3>
                <span style={{fontSize:'11px', color:'var(--text-muted)'}}>You own shares on these positions — sell covered calls to generate income while holding</span>
              </div>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{padding:'4px 12px', borderRadius:'20px', fontSize:'12px', fontWeight:600, background:'rgba(201,168,76,0.12)', color:'var(--accent-gold)', border:'1px solid rgba(201,168,76,0.25)'}}>
                {assignedWithRecs.length} Assigned Position{assignedWithRecs.length !== 1 ? 's' : ''}
              </span>
              {onSetPage && (
                <button className="btn btn-sm btn-secondary" onClick={() => onSetPage('portfolio')} style={{fontSize:11}}>
                  View Portfolio →
                </button>
              )}
            </div>
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:16, padding:20}}>
            {assignedWithRecs.map(p => {
              const rec = p.bestConservative;
              const unrealized = (p.currentPrice - p.costBasis) * (p.shares || p.contracts * 100);
              const stageInfo = CoveredCallHelper.getStageInfo(p.wheelStage || 'assigned');
              return (
                <div key={p.id} className="cc-dashboard-card">

                      <span style={{fontFamily:'var(--font-mono)', fontSize:'18px', fontWeight:700, color:'var(--accent-gold)'}}>{p.symbol}</span>
                      <span className={`wheel-stage-badge ${stageInfo.cls}`}>{stageInfo.icon} {stageInfo.label}</span>
                    </div>
                    <span style={{fontFamily:'var(--font-mono)', fontSize:'13px', fontWeight:600, color: unrealized >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                      {unrealized >= 0 ? '+' : ''}${Math.abs(unrealized).toFixed(0)}
                    </span>
                  </div>

                  {/* Price vs Cost Basis */}
                  <div style={{display:'flex', gap:8, marginBottom:12}}>
                    <div style={{flex:1, background:'var(--bg-primary)', borderRadius:'var(--radius-sm)', padding:'8px 10px'}}>
                      <div style={{fontSize:'10px', color:'var(--text-muted)', marginBottom:2}}>Price</div>
                      <div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px'}}>${p.currentPrice.toFixed(2)}</div>
                    </div>
                    <div style={{flex:1, background:'var(--bg-primary)', borderRadius:'var(--radius-sm)', padding:'8px 10px'}}>
                      <div style={{fontSize:'10px', color:'var(--text-muted)', marginBottom:2}}>Cost Basis</div>
                      <div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px', color:'var(--accent-amber)'}}>${p.costBasis.toFixed(2)}</div>
                    </div>
                    <div style={{flex:1, background:'var(--bg-primary)', borderRadius:'var(--radius-sm)', padding:'8px 10px'}}>
                      <div style={{fontSize:'10px', color:'var(--text-muted)', marginBottom:2}}>Shares</div>
                      <div style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'14px'}}>{p.shares || p.contracts * 100}</div>
                    </div>
                  </div>

                  {/* Best CC Recommendation */}
                  {rec ? (
                    <div style={{background:'rgba(201,168,76,0.06)', border:'1px solid rgba(201,168,76,0.15)', borderRadius:'var(--radius-sm)', padding:'10px 12px', marginBottom:10}}>
                      <div style={{fontSize:'10px', color:'var(--accent-gold)', fontWeight:700, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.5px'}}>Best Conservative Call</div>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <div>
                          <span style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'15px'}}>${rec.strike.toFixed(2)}</span>
                          <span style={{fontSize:'11px', color:'var(--text-muted)', marginLeft:6}}>{rec.expDate} · {rec.dte}d</span>
                        </div>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-green)', fontSize:'14px'}}>${rec.totalPremium}</div>
                          <div style={{fontSize:'10px', color:'var(--text-muted)'}}>{rec.annualizedYield}% ann.</div>
                        </div>
                      </div>
                      <div style={{fontSize:'11px', color: rec.distFromCostBasis >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', marginTop:4}}>
                        {rec.distFromCostBasis >= 0 ? '✓' : '⚠'} Strike is {rec.distFromCostBasis >= 0 ? '+' : ''}{rec.distFromCostBasis.toFixed(1)}% {rec.distFromCostBasis >= 0 ? 'above' : 'below'} cost basis
                      </div>
                    </div>
                  ) : (
                    <div style={{fontSize:'12px', color:'var(--text-muted)', padding:'8px 0'}}>No recommendation available</div>

                  <div style={{fontSize:'11px', color:'var(--text-muted)', textAlign:'center'}}>
                    Go to Portfolio → Sell Covered Call for full analysis
                  </div>
                </div>

            })}
          </div>
        </div>
      )}

      {/* ===== POSITION SIZE CALCULATOR ===== */}
      <PositionSizeCalculator />

      {/* ===== FULL CANDIDATE TABLE ===== */}
      <div className="data-table-container">
        <div className="data-table-header">
          <h3>All Wheel Strategy Candidates</h3>
          <div style={{display:'flex', gap:12, alignItems:'center'}}>
            <button className="btn btn-sm btn-secondary" onClick={() => exportCSV(topStocks, `wheelpro-candidates-${new Date().toISOString().slice(0,10)}.csv`)} style={{fontSize:11}}>Export CSV</button>
            <span style={{fontSize:'12px', color:'var(--text-muted)'}}>Sorted by Wheel Score · {topStocks.length} stocks</span>
          </div>
        </div>
        {layout === 'cards' ? (
          <div className="stock-card-list responsive-layout-fade" key="cand-cards">
            {topStocks.map(stock => {
              const highConc = isHighConcentration(stock);

                  <th scope="col">Action</th>
                  <th scope="col">Strike</th>

                  <th scope="col">Resist.</th>
                  <th scope="col">Exp Date</th>
                  <th scope="col">Premium</th>
                  <th scope="col">Wk Yield</th>
                  <th scope="col">Ann. Yield</th>
                  <th scope="col">Delta</th>
                  <th scope="col">P.O.P.</th>
                  <th scope="col">Cash Req.</th>
                  <th scope="col">Max Loss</th>
                  <th scope="col">RSI</th>
                  <th scope="col">Signal</th>
                  <th scope="col">IV %ile</th>
                  <th scope="col">P/C Ratio</th>
                  <th scope="col">Earnings</th>
                  <th scope="col">Ex-Div</th>
                  <th scope="col">Trend</th>
                  <th scope="col">IV Rank</th>
                </tr>
              </thead>
              <tbody>
                {topStocks.map((stock, i) => {
                  const isRecommended = stock.recommendation && stock.recommendation.type === 'SELL_PUT' && (stock.recommendation.confidence === 'HIGH' || stock.recommendation.confidence === 'MEDIUM');
                  const pop = stock.probOfProfit || WheelScoring.getProbOfProfit(stock.delta);
                  const cashReq = stock.cashRequired || WheelScoring.getCashRequired(stock.strikePrice);
                  const maxLoss = stock.maxLoss || Math.round((stock.strikePrice - stock.premium) * 100);
                  const highConc = isHighConcentration(stock);
                  return (
                  <tr key={stock.symbol} style={{animation: `slideIn 0.3s ease-out ${i * 0.03}s both`, borderLeft: highConc ? '3px solid var(--accent-amber)' : (isRecommended ? '3px solid var(--accent-green)' : '3px solid transparent'), background: highConc ? 'rgba(245,158,11,0.06)' : 'transparent'}}>
                    <td>
                      <div style={{fontFamily:'var(--font-mono)', fontWeight:600}}>${stock.price.toFixed(2)}</div>
                      <div style={{fontSize:'11px', color: stock.change >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>{stock.change >= 0 ? '+' : ''}{stock.changePct}%</div>
                    </td>
                    <td>
                      <Tip text={TipText.score(stock)}>
                      <span className={`score-badge ${stock.wheelScore >= 75 ? 'score-high' : stock.wheelScore >= 50 ? 'score-mid' : 'score-low'}`}>
                        {stock.wheelScore}
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.action(stock)}>
                      <span className={`signal-badge signal-${stock.recommendation.color === 'green' ? 'bullish' : stock.recommendation.color === 'amber' ? 'neutral' : 'bearish'}`}>
                        {stock.recommendation.label}
                      </span>
                      </Tip>
                    </td>
                    <td style={{fontFamily:'var(--font-mono)'}}>
                      <Tip text={TipText.strike(stock)}>
                      <span>${stock.strikePrice.toFixed(2)}
                      <div style={{fontSize:'10px',color:'var(--text-muted)'}}>{((1 - stock.strikePrice/stock.price)*100).toFixed(1)}% OTM</div>
                      </span>
                      </Tip>
                    </td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color: stock.strikePrice < (stock.supportLevel||0) ? 'var(--accent-green)' : 'var(--text-muted)'}}>
                      ${(stock.supportLevel||0).toFixed(2)}
                    </td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--text-muted)'}}>
                      ${(stock.resistanceLevel||0).toFixed(2)}
                    </td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>{stock.expDateStr || `${stock.daysToExpiry}d`}</td>
                    <td style={{fontFamily:'var(--font-mono)', color:'var(--accent-green)'}}>${stock.premium.toFixed(2)}</td>
                    <td>
                      <Tip text={TipText.yield(stock)}>
                      <span style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-blue)'}}>
                      {(stock.weeklyYield * 100).toFixed(2)}%
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.annYield(stock)}>
                      <span style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-green)'}}>
                      {stock.annualizedYield}%
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.delta(stock)}>
                      <span className={`indicator-pill ${stock.delta <= 0.20 ? 'pill-green' : stock.delta <= 0.28 ? 'pill-amber' : 'pill-red'}`}>
                        {stock.delta.toFixed(2)}
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.pop(stock)}>
                      <span style={{fontFamily:'var(--font-mono)', fontSize:'12px', color: pop >= 80 ? 'var(--accent-green)' : pop >= 70 ? 'var(--text-secondary)' : 'var(--accent-red)'}}>
                      {pop}%
                      </span>
                      </Tip>
                    </td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>${cashReq.toLocaleString()}</td>
                    <td>
                      <Tip text={TipText.maxLoss(stock)}>
                      <span style={{fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--accent-red)'}}>${maxLoss.toLocaleString()}</span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.rsi(stock)}>
                      <span className={`indicator-pill ${stock.rsi < 35 ? 'pill-green' : stock.rsi > 65 ? 'pill-red' : 'pill-amber'}`}>
                        {stock.rsi}
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.signal(stock)}>
                      <span className={`signal-badge ${stock.technicalSignal > 0.2 ? 'signal-bullish' : stock.technicalSignal < -0.2 ? 'signal-bearish' : 'signal-neutral'}`}>
                        {stock.technicalSignal > 0.2 ? '↑ Bull' : stock.technicalSignal < -0.2 ? '↓ Bear' : '— Neutral'}
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.iv(stock)}>
                      <span className={`indicator-pill ${(stock.ivPercentile||50) >= 50 ? 'pill-green' : 'pill-amber'}`}>
                        {stock.ivPercentile || 50}%
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.pcRatio(stock)}>
                      <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color: (stock.putCallRatio||1) > 1.2 ? 'var(--accent-red)' : (stock.putCallRatio||1) < 0.8 ? 'var(--accent-green)' : 'var(--text-muted)'}}>
                      {(stock.putCallRatio||1).toFixed(2)}
                      </span>

                    <td>

                      {stock.earningsIn != null && stock.earningsIn <= 14 && stock.earningsConfirmed !== false ? (

                          ⚠ {stock.earningsDateStr || (stock.earningsIn + 'd')}
                        </span>
                      ) : stock.earningsConfirmed === false ? (
                        <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{stock.earningsIn == null ? '—' : '~' + (stock.earningsDateStr || (stock.earningsIn + 'd'))}</span>
                      ) : (
                        <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{stock.earningsIn == null ? '—' : (stock.earningsDateStr || (stock.earningsIn + 'd'))}</span>
                      )}
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.exDiv(stock)}>
                      {stock.exDivBeforeExpiry ? (
                        <span style={{fontSize:'11px', padding:'2px 6px', borderRadius:'4px', background:'rgba(245,158,11,0.15)', color:'var(--accent-amber)'}}>⚠ {stock.exDivDateStr}</span>
                      ) : stock.exDivDateStr ? (
                        <span style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{stock.exDivDateStr}</span>

        </div>
        )}
