function BacktestPage({ user, subscriptionTier }) {
  const [symbol, setSymbol] = useState('');
  const [params, setParams] = useState({ months: 6, capital: 50000, maxPositions: 5, maxPerStock: 20, minScore: 75, maxDelta: 0.25 });
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const tierLimits = CONFIG.TIER_LIMITS[subscriptionTier || 'free'];
  if (!tierLimits.journal && !user?.isOwner) {
    return (
      <div className="loading-state" style={{gap:20}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:'var(--bg-elevated)',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <h3 style={{color:'var(--text-primary)', margin:0}}>Strategy Backtester</h3>
        <p style={{maxWidth:400, textAlign:'center', lineHeight:1.7}}>Simulate the Wheel strategy over historical data to see returns, win rate, and drawdown. Available on Pro and Elite plans.</p>
        <button className="btn btn-primary" style={{marginTop:8}}>Upgrade to Pro — $79/mo</button>
      </div>
    );
  }

  const runBacktest = async () => {
    if (window.posthog) window.posthog.capture('backtest_run', {
      symbol: symbol.trim().toUpperCase() || 'all',
      months: params.months,
      capital: params.capital,
    });
    setLoading(true);
    setError('');
    try {
      // API expects ?period=Nm (months) or Ny (years). Convert months > 11 to years for cleaner range strings.
      const period = params.months >= 12 && params.months % 12 === 0 ? `${params.months / 12}y` : `${params.months}m`;
      const qs = `period=${period}&capital=${params.capital}&maxPositions=${params.maxPositions}&maxPerStock=${params.maxPerStock/100}&minScore=${params.minScore}&maxDelta=${params.maxDelta}`;
      const endpoint = symbol.trim() ? `${CONFIG.API_BASE_URL}/api/backtest/${encodeURIComponent(symbol.trim().toUpperCase())}?${qs}` : `${CONFIG.API_BASE_URL}/api/backtest?${qs}`;
      const res = await fetch(endpoint);
      if (!res.ok) throw new Error(`API returned ${res.status}`);
      const data = await res.json();
      if (data.success) setResults(data);
      else throw new Error(data.error || 'Backtest failed');
    } catch (err) {
      setError(err.message || 'An unexpected error occurred');
      // Demo results for UI preview — so screen never goes blank
      try { setResults(getDemoBacktestResults(params)); } catch(e) { console.error('[WheelPro] Demo backtest failed:', e); }
    } finally {
      setLoading(false);
    }
  };

  // Demo results generator for when API isn't connected yet
  function getDemoBacktestResults(p) {
    const weeks = p.months * 4.33;
    const trades = [];
    let equity = p.capital;
    const curve = [{ date: new Date(Date.now() - p.months * 30 * 86400000).toISOString().slice(0,10), equity: p.capital, pnl: 0 }];
    const symbols = ['AAPL','MSFT','NVDA','AMZN','GOOGL','META','AMD','JPM','V','COST','CRM','PYPL','UBER','SHOP','QCOM'];
    let maxEquity = p.capital;
    let maxDrawdown = 0;
    for (let w = 0; w < Math.floor(weeks); w++) {
      const numTrades = Math.min(Math.floor(Math.random() * 3) + 1, p.maxPositions);
      for (let t = 0; t < numTrades; t++) {
        const sym = symbols[Math.floor(Math.random() * symbols.length)];
        const win = Math.random() < 0.78; // ~78% win rate for wheel
        const pnl = win ? Math.floor(Math.random() * 400 + 100) : -Math.floor(Math.random() * 2000 + 500);
        equity += pnl;
        trades.push({ symbol: sym, openDate: new Date(Date.now() - (weeks - w) * 7 * 86400000).toISOString().slice(0,10), closeDate: new Date(Date.now() - (weeks - w - 1) * 7 * 86400000).toISOString().slice(0,10), outcome: win ? 'expired' : 'assigned', pnl, capitalAtOpen: equity - pnl });
      }
      maxEquity = Math.max(maxEquity, equity);
      maxDrawdown = Math.max(maxDrawdown, (maxEquity - equity) / maxEquity * 100);
      curve.push({ date: new Date(Date.now() - (weeks - w - 1) * 7 * 86400000).toISOString().slice(0,10), equity, pnl: equity - p.capital });
    }
    const wins = trades.filter(t => t.pnl > 0);
    const losses = trades.filter(t => t.pnl <= 0);
    return {
      success: true, demo: true,
      summary: { totalTrades: trades.length, wins: wins.length, losses: losses.length, winRate: Math.round(wins.length / trades.length * 100), totalPnl: equity - p.capital, totalReturn: ((equity - p.capital) / p.capital * 100).toFixed(1), maxDrawdown: maxDrawdown.toFixed(1), sharpeRatio: (1.2 + Math.random() * 0.8).toFixed(2), avgWinAmount: Math.round(wins.reduce((s,t) => s + t.pnl, 0) / (wins.length||1)), avgLossAmount: Math.round(losses.reduce((s,t) => s + t.pnl, 0) / (losses.length||1)), startingCapital: p.capital, endingCapital: equity },
      equityCurve: curve,
      trades,
      parameters: p
    };
  }

  // Simple equity curve chart using SVG
  function EquityChart({ data }) {
    if (!data || data.length < 2) return null;
    const w = 700, h = 200, pad = 40;
    const equities = data.map(d => d.equity);
    const minE = Math.min(...equities) * 0.98;
    const maxE = Math.max(...equities) * 1.02;
    const rangeE = maxE - minE || 1;
    const points = data.map((d, i) => {
      const x = pad + (i / (data.length - 1)) * (w - pad * 2);
      const y = h - pad - ((d.equity - minE) / rangeE) * (h - pad * 2);
      return `${x},${y}`;
    }).join(' ');
    const startLine = h - pad - ((data[0].equity - minE) / rangeE) * (h - pad * 2);
    const isPositive = equities[equities.length - 1] >= equities[0];
    return (
      <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} style={{maxWidth:w}}>
        <line x1={pad} y1={startLine} x2={w-pad} y2={startLine} stroke="rgba(100,116,139,0.3)" strokeDasharray="4"/>
        <polyline points={points} fill="none" stroke={isPositive ? '#10b981' : '#ef4444'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <text x={pad} y={h - 8} fill="#64748b" fontSize="10" fontFamily="var(--font-mono)">{data[0].date}</text>
        <text x={w - pad} y={h - 8} fill="#64748b" fontSize="10" fontFamily="var(--font-mono)" textAnchor="end">{data[data.length-1].date}</text>
        <text x={pad - 4} y={startLine + 3} fill="#64748b" fontSize="10" fontFamily="var(--font-mono)" textAnchor="end">${(data[0].equity/1000).toFixed(0)}K</text>
        <text x={pad - 4} y={pad + 4} fill="#64748b" fontSize="10" fontFamily="var(--font-mono)" textAnchor="end">${(maxE/1000).toFixed(0)}K</text>
      </svg>
    );
  }

  return (
    <div>
      {/* Parameter Controls */}
      <div className="data-table-container" style={{marginBottom:24}}>
        <div className="data-table-header">
          <h3>⚙️ Backtest Parameters</h3>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={{display:'flex', flexDirection:'column', gap:4}}>
              <label htmlFor="backtest-symbol" style={{fontSize:'11px', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'1px'}}>Stock Symbol (optional)</label>
              <input
                id="backtest-symbol"
                className="filter-input"
                placeholder="e.g. TSLA"
                value={symbol}
                onChange={e => setSymbol(e.target.value.toUpperCase())}
                onKeyDown={e => e.key === 'Enter' && runBacktest()}
                style={{width:120, fontFamily:'var(--font-mono)', fontWeight:600, letterSpacing:'1px'}}
              />
            </div>
            <button className="btn btn-sm btn-primary" onClick={runBacktest} disabled={loading} style={{display:'flex',alignItems:'center',gap:6,alignSelf:'flex-end'}}>
              {loading ? <span className="spinner" style={{width:14,height:14,borderWidth:2}}></span> : '▶'} {loading ? 'Running...' : 'Run Backtest'}
            </button>
          </div>
        </div>
        <div style={{padding:'20px', display:'flex', flexWrap:'wrap', gap:'20px'}}>
          {[
            { key: 'months', label: 'Lookback', min: 1, max: 60, step: 1 },
            { key: 'capital', label: 'Starting Capital ($)', min: 10000, max: 500000, step: 5000 },
            { key: 'maxPositions', label: 'Max Positions', min: 1, max: 20, step: 1 },
            { key: 'maxPerStock', label: 'Max per Stock (%)', min: 5, max: 50, step: 5 },
            { key: 'minScore', label: 'Min Score', min: 50, max: 95, step: 5 },
            { key: 'maxDelta', label: 'Max Delta', min: 0.10, max: 0.40, step: 0.05 },
          ].map(f => (
            <div key={f.key} style={{minWidth:140}}>
              <div style={{fontSize:'11px', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'1px', marginBottom:6}}>{f.label}</div>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <input aria-label={f.label} type="range" className="range-slider" min={f.min} max={f.max} step={f.step} value={params[f.key]}
                  onChange={e => setParams(p => ({...p, [f.key]: +e.target.value}))} style={{width:100}} />
                <span style={{fontFamily:'var(--font-mono)', fontSize:'14px', fontWeight:600, minWidth:50}}>
                  {f.key === 'capital' ? `$${(params[f.key]/1000).toFixed(0)}K` :
                   f.key === 'maxPerStock' ? `${params[f.key]}%` :
                   f.key === 'maxDelta' ? params[f.key].toFixed(2) :
                   f.key === 'months' ?
                     (params.months >= 12 && params.months % 12 === 0 ? `${params.months / 12}y` :
                      params.months >= 12 ? `${(params.months / 12).toFixed(1)}y` :
                      `${params.months}mo`) :
                   params[f.key]}
                </span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {error && !results?.demo && <div style={{padding:'12px 20px', background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:'var(--radius-md)', color:'var(--accent-red)', fontSize:'13px', marginBottom:16}}>API Error: {error}. Showing demo results below.</div>}
      {results?.demo && <div style={{padding:'12px 20px', background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:'var(--radius-md)', color:'var(--accent-amber)', fontSize:'13px', marginBottom:16}}>Showing simulated backtest results based on current market data.</div>}

      {results && (
        <>
          {/* Summary Stats */}
          <div className="stats-grid" style={{marginBottom:24}}>
            <div className="stat-card" style={{borderLeft: results.summary.totalPnl >= 0 ? '3px solid var(--accent-green)' : '3px solid var(--accent-red)'}}>
              <div className="stat-label">Total Return</div>
              <div className="stat-value" style={{color: results.summary.totalPnl >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                {results.summary.totalReturn}%
              </div>
              <div className="stat-change" style={{color: results.summary.totalPnl >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', background: results.summary.totalPnl >= 0 ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'}}>
                {(results.summary.totalPnl ?? 0) >= 0 ? '+' : ''}${(results.summary.totalPnl ?? 0).toLocaleString()}
              </div>
            </div>
            <div className="stat-card" style={{borderLeft:'3px solid var(--accent-blue)'}}>
              <div className="stat-label">Win Rate</div>
              <div className="stat-value" style={{color:'var(--accent-blue)'}}>{results.summary.winRate}%</div>
              <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>{results.summary.wins}W / {results.summary.losses}L ({results.summary.totalTrades} total)</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Sharpe Ratio</div>
              <div className="stat-value" style={{color: results.summary.sharpeRatio >= 1.5 ? 'var(--accent-green)' : results.summary.sharpeRatio >= 1 ? 'var(--accent-amber)' : 'var(--accent-red)'}}>{results.summary.sharpeRatio}</div>
              <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>{results.summary.sharpeRatio >= 1.5 ? 'Excellent' : results.summary.sharpeRatio >= 1 ? 'Good' : 'Needs work'}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Max Drawdown</div>
              <div className="stat-value" style={{color:'var(--accent-red)'}}>{results.summary.maxDrawdown}%</div>
              <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>Avg win: +${results.summary.avgWinAmount} / Avg loss: ${results.summary.avgLossAmount}</div>
            </div>
          </div>

          {/* Equity Curve */}
          <div className="data-table-container" style={{marginBottom:24}}>
            <div className="data-table-header">
              <h3>Equity Curve</h3>
              <span style={{fontFamily:'var(--font-mono)', fontSize:'13px', color: results.summary.totalPnl >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                ${(results.summary.startingCapital/1000).toFixed(0)}K → ${(results.summary.endingCapital/1000).toFixed(0)}K
              </span>
            </div>
            <div style={{padding:'20px', display:'flex', justifyContent:'center'}}>
              <EquityChart data={results.equityCurve} />
            </div>
          </div>

          {/* Trade Log */}
          <div className="data-table-container">
            <div className="data-table-header">
              <h3>Trade Log ({results.trades.length} trades)</h3>
            </div>
            <div className="table-scroll" style={{maxHeight:400, overflowY:'auto'}}>
              <table className="data-table">
                <thead><tr>
                  <th scope="col">Open</th><th scope="col">Close</th><th scope="col">Symbol</th><th scope="col">Outcome</th><th scope="col">P&L</th>
                </tr></thead>
                <tbody>
                  {results.trades.slice().reverse().map((t, i) => (
                    <tr key={i} style={{borderLeft: t.pnl >= 0 ? '3px solid var(--accent-green)' : '3px solid var(--accent-red)'}}>
                      <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--text-muted)'}}>{t.openDate}</td>
                      <td style={{fontFamily:'var(--font-mono)', fontSize:'12px', color:'var(--text-muted)'}}>{t.closeDate}</td>
                      <td><span className="ticker">{t.symbol}</span></td>
                      <td><span style={{fontSize:'11px', padding:'2px 8px', borderRadius:'10px', fontWeight:600, background: t.outcome === 'expired' ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)', color: t.outcome === 'expired' ? 'var(--accent-green)' : 'var(--accent-red)'}}>{t.outcome === 'expired' ? '✓ Expired' : '⚠ Assigned'}</span></td>
                      <td style={{fontFamily:'var(--font-mono)', fontWeight:700, color: t.pnl >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>{t.pnl >= 0 ? '+' : ''}${t.pnl.toLocaleString()}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

      {!results && !loading && (
        <div className="loading-state" style={{gap:20, padding:80}}>
          <div style={{width:48,height:48,borderRadius:'50%',background:'var(--bg-elevated)',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9c0-1.105.895-2 2-2h8c1.105 0 2 .895 2 2v8c0 1.105-.895 2-2 2H8c-1.105 0-2-.895-2-2V9z"/><path d="M9 5v2M15 5v2M6 15h12"/></svg></div>
          <h3 style={{color:'var(--text-primary)', margin:0}}>Backtest Your Strategy</h3>
          <p style={{maxWidth:480, textAlign:'center', lineHeight:1.7, color:'var(--text-secondary)'}}>
            Set your parameters above and click Run Backtest to see how WheelPro's recommendations would have performed historically. Uses Polygon.io data when connected, or simulated results for preview.
          </p>
        </div>
      )}
    </div>
  );
}

// ===== CSV EXPORT HELPER =====
function exportCSV(stocks, filename) {
  if (window.posthog) window.posthog.capture('csv_export', { row_count: stocks.length, filename: filename || 'wheelpro-export.csv' });
  const headers = ['Symbol','Name','Sector','Price','Change%','Score','Action','Confidence','Strike','OTM%','Premium','Wk Yield','Mo Yield','Ann Yield','Delta','POP','Cash Req','Max Loss','RSI','Signal','IV','IV%ile','P/C Ratio','Earnings','DTE'];
  const rows = stocks.map(s => [
    s.symbol, s.name, s.sector, s.price.toFixed(2), s.changePct,
    s.wheelScore, s.recommendation?.type || '', s.recommendation?.confidence || '',
    s.strikePrice.toFixed(2), ((1-s.strikePrice/s.price)*100).toFixed(1),
    s.premium.toFixed(2), (s.weeklyYield*100).toFixed(2),
    (s.weeklyYield*(s.daysToExpiry||7)/30*100).toFixed(2), s.annualizedYield,
    s.delta.toFixed(2), Math.round((1-s.delta)*100),
    Math.round(s.strikePrice*100), Math.round((s.strikePrice-s.premium)*100),
    s.rsi?.toFixed(1) || '', s.technicalSignal?.toFixed(2) || '',
    s.iv, s.ivPercentile || 50, (s.putCallRatio||1).toFixed(2),
    s.earningsDateStr || s.earningsIn+'d', s.daysToExpiry
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename || 'wheelpro-export.csv';
  a.click(); URL.revokeObjectURL(url);
}

function Tip({ children, text }) {
  const [show, setShow] = React.useState(false);
  const [tipStyle, setTipStyle] = React.useState({});
  const [below, setBelow] = React.useState(false);
  const ref = React.useRef(null);

  const onEnter = () => {
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const isBelow = r.top < 120;
    setBelow(isBelow);
    let left = r.left + r.width / 2;
    left = Math.max(160, Math.min(window.innerWidth - 160, left));
    setTipStyle({
      left: left + 'px',
      top: isBelow ? (r.bottom + 8) + 'px' : (r.top - 8) + 'px',
      transform: isBelow ? 'translateX(-50%)' : 'translateX(-50%) translateY(-100%)',
    });
    setShow(true);
  };

  // Portal the tooltip to document.body so it escapes any ancestor stacking
  // context (e.g. the sticky/frozen Symbol column's z-index:10 panel) and any
  // ancestor overflow clipping. Without this, tooltips inside the scrollable
  // split-table panel render below the frozen panel.
  const tipNode = show && ReactDOM.createPortal(
    React.createElement('span', {
      className: 'tip-box tip-portal' + (below ? ' tip-below' : ''),
      style: tipStyle,
    }, text),
    document.body
  );

  return React.createElement('span', {
    className: 'tip-wrap',
    ref,
    onMouseEnter: onEnter,
    onMouseLeave: () => setShow(false),
  },
    children,
    tipNode
  );
}

// Smart tooltip generators — explain the "why" behind every number
const TipText = {
  score(stock) {
    const s = stock.wheelScore;
    const wy = stock.weeklyYield || 0;
    const d = stock.delta || 0.3;
    const ov = stock.optionVolume || 0;
    const ivr = stock.ivRank || 50;
    // Show factor quality ratings without revealing exact weights or thresholds
    const yieldRating = wy >= 0.02 ? 'Strong' : wy >= 0.015 ? 'Good' : wy >= 0.01 ? 'Fair' : 'Low';
    const deltaRating = d <= 0.20 ? 'Safe' : d <= 0.25 ? 'Moderate' : d <= 0.30 ? 'Elevated' : 'High';
    const liqRating = ov >= 5000 ? 'High' : ov >= 1000 ? 'Good' : 'Low';
    const ivRating = ivr >= 50 ? 'Favorable' : ivr >= 30 ? 'Moderate' : 'Low';
    return `WHEEL SCORE: ${s}/100\n` +
      `Premium yield: ${yieldRating} (${(wy*100).toFixed(2)}% weekly)\n` +
      `Delta safety: ${deltaRating} (${d.toFixed(2)})\n` +
      `Technical signals: ${stock.technicalSignal > 0.2 ? 'Bullish' : stock.technicalSignal < -0.2 ? 'Bearish' : 'Neutral'}\n` +
      `Liquidity: ${liqRating} (${ov.toLocaleString()} vol)\n` +
      `IV conditions: ${ivRating} (${ivr}%)\n` +
      (s >= 75 ? 'Strong candidate' : s >= 50 ? 'Moderate — check details' : 'Below threshold');
  },
  action(stock) {
    const r = stock.recommendation;
    if (!r) return 'No recommendation data';
    let text = r.type === 'SELL_PUT' ? `SELL PUT — ${r.confidence} confidence\n` :
               r.type === 'SELL_CALL' ? 'SELL CALL — Bearish setup\n' : 'WAIT — Not recommended now\n';
    text += r.reason || '';
    if (r.type === 'SELL_PUT' && r.confidence === 'HIGH') text += '\n✅ Meets all criteria: score, yield, delta';
    if (stock.earningsIn != null && stock.earningsIn <= 14 && stock.earningsConfirmed) text += '\n🚫 Blocked: earnings within 14 days';
    return text;
  },
  delta(stock) {
    const d = stock.delta;
    const pct = Math.round(d * 100);
    return `DELTA: ${d.toFixed(2)} (${pct}% assignment chance)\n` +
      `You have a ${100-pct}% chance of keeping the premium.\n` +
      (d <= 0.15 ? 'Very safe — low assignment risk' :
       d <= 0.20 ? 'Safe — conservative pick' :
       d <= 0.25 ? 'Moderate — standard risk level' :
       d <= 0.30 ? 'Higher risk — more premium, more chance of assignment' :
       'Aggressive — high assignment probability');
  },
  rsi(stock) {
    const r = stock.rsi;
    return `RSI: ${r.toFixed(1)} (momentum indicator)\n` +
      (r < 30 ? 'Oversold — stock may bounce up. Good time to sell puts.' :
       r < 40 ? 'Leaning oversold — slightly favorable for puts.' :
       r < 60 ? 'Neutral — no strong momentum signal.' :
       r < 70 ? 'Leaning overbought — caution for new puts.' :
       'Overbought — stock may pull back. Risky for puts.');
  },
  iv(stock) {
    const ivp = stock.ivPercentile || 50;
    return `IV PERCENTILE: ${ivp}%\n` +
      `Options are ${ivp >= 70 ? 'expensive' : ivp >= 50 ? 'moderately priced' : ivp >= 30 ? 'fairly priced' : 'cheap'} vs recent history.\n` +
      (ivp >= 50 ? 'Above average — you collect richer premiums. Good time to sell.' :
       'Below average — premiums are thinner. Consider waiting for higher IV.');
  },
  pcRatio(stock) {
    const r = stock.putCallRatio || 1;
    return `PUT/CALL RATIO: ${r.toFixed(2)}\n` +
      `Put OI ÷ Call OI across the full option chain.\n` +
      (r > 1.5 ? 'Very bearish sentiment — heavy put buying (hedging/fear).' :
       r > 1.2 ? 'Mildly bearish — more puts than calls being held.' :
       r > 0.8 ? 'Neutral — balanced put/call activity.' :
       r > 0.5 ? 'Mildly bullish — more calls than puts.' :
       'Very bullish — heavy call buying (optimism).');
  },
  yield(stock) {
    return `WEEKLY YIELD: ${(stock.weeklyYield*100).toFixed(2)}%\n` +
      `= $${stock.premium.toFixed(2)} premium ÷ $${stock.strikePrice.toFixed(2)} strike\n` +
      `You collect $${(stock.premium * 100).toFixed(0)} per contract.\n` +
      (stock.weeklyYield >= 0.02 ? 'Meets 2%+ target' :
       stock.weeklyYield >= 0.015 ? 'Below 2% target but acceptable' :
       'Below minimum yield threshold');
  },
  annYield(stock) {
    return `ANNUALIZED: ${stock.annualizedYield}%\n` +
      `= ${(stock.weeklyYield*100).toFixed(2)}% × (365 ÷ ${stock.daysToExpiry} DTE)\n` +
      `Assumes continuous reinvestment at this rate.\n` +
      `Actual returns will be lower due to gaps between trades.`;
  },
  pop(stock) {
    const pop = stock.probOfProfit || Math.round((1 - stock.delta) * 100);
    return `P.O.P.: ${pop}% probability of profit\n` +
      `= (1 - ${stock.delta.toFixed(2)} delta) × 100\n` +
      `${pop}% chance the option expires worthless and you keep 100% of the premium.\n` +
      (pop >= 85 ? 'Very high probability trade' :
       pop >= 75 ? 'Good probability' :
       pop >= 65 ? 'Moderate — more premium but more risk' :
       'Low probability — aggressive trade');
  },
  signal(stock) {
    const s = stock.technicalSignal;
    const dir = s > 0.2 ? 'Bullish' : s < -0.2 ? 'Bearish' : 'Neutral';
    let text = `SIGNAL: ${dir} (${s.toFixed(2)})\nComposite of 5 indicators:\n`;
    if (stock.rsi) text += `• RSI ${stock.rsi.toFixed(0)}: ${stock.rsi < 30 ? 'Oversold ↑' : stock.rsi > 70 ? 'Overbought ↓' : 'Neutral'}\n`;
    if (stock.macd) text += `• MACD: ${stock.macd.histogram > 0 ? 'Bullish ↑' : 'Bearish ↓'}\n`;
    if (stock.ema9 && stock.ema21) text += `• EMA 9/21: ${stock.ema9 > stock.ema21 ? 'Golden cross ↑' : 'Death cross ↓'}\n`;
    text += dir === 'Bullish' ? 'Uptrend favors selling puts' : dir === 'Bearish' ? 'Downtrend — caution with puts' : 'No strong trend';
    return text;
  },
  earnings(stock) {
    if (stock.earningsIn != null && stock.earningsIn <= 14 && stock.earningsConfirmed) {
      return `EARNINGS IN ${stock.earningsIn} DAYS (${stock.earningsDateStr})\n` +
        `Confirmed date from Yahoo Finance.\n` +
        `🚫 DO NOT sell puts through earnings!\n` +
        `Stocks can drop 20-30% on bad results.`;
    }
    if (stock.earningsConfirmed && stock.earningsDateStr && stock.earningsDateStr !== '—') {
      return `EARNINGS: ${stock.earningsDateStr} (${stock.earningsIn} days)\n` +
        `Confirmed date from Yahoo Finance.\n` +
        `✅ Far enough out — safe to trade.`;
    }
    return `EARNINGS: No confirmed date\n` +
      `Yahoo has no earnings date for this stock.\n` +
      `Do your own research before trading.`;
  },
  exDiv(stock) {
    if (stock.exDivBeforeExpiry) {
      return `EX-DIVIDEND: ${stock.exDivDateStr}\n` +
        `Falls BEFORE option expires on ${stock.expDateStr}.\n` +
        `Risk: Early assignment — someone may exercise\n` +
        `your put to capture the dividend.\n` +
        `Consider a later expiration date.`;
    }
    if (stock.hasDividend && stock.exDivDateStr) {
      return `EX-DIVIDEND: ${stock.exDivDateStr}\n` +
        `Falls AFTER option expiry — no early assignment risk.\n` +
        `✅ Safe to trade.`;
    }
    if (stock.hasDividend) return `This stock pays a dividend.\nNo upcoming ex-div date affects this trade.`;
    return `No dividend — no early assignment risk from dividends.`;
  },
  strike(stock) {
    const otm = ((1 - stock.strikePrice/stock.price)*100).toFixed(1);
    const belowSupport = stock.strikePrice < (stock.supportLevel||0);
    return `STRIKE: $${stock.strikePrice.toFixed(2)} (${otm}% below price)\n` +
      `You promise to buy 100 shares at this price.\n` +
      (belowSupport ? `Below support ($${(stock.supportLevel||0).toFixed(2)}) — extra cushion` :
       `Above support ($${(stock.supportLevel||0).toFixed(2)})`) + `\n` +
      `Cash needed: $${(stock.strikePrice * 100).toLocaleString()}`;
  },
  maxLoss(stock) {
    const ml = stock.maxLoss || Math.round((stock.strikePrice - stock.premium) * 100);
    return `MAX LOSS: $${ml.toLocaleString()}\n` +
      `= ($${stock.strikePrice.toFixed(2)} strike - $${stock.premium.toFixed(2)} premium) × 100\n` +
      `Worst case if stock goes to $0.\n` +
      `Extremely rare — but always know your risk.`;
  }
};

  // Auto-refresh: live countdown to next poll. null = paused (tab hidden / autoRefresh off).
  // Updated every second by the countdown ticker; reset to interval after each fetch.
  const [refreshCountdown, setRefreshCountdown] = useState(null);
  // Tracks last user scroll within the data table area. We skip the next auto-refresh tick
  // if the user scrolled within the last 8s, so reading isn't disrupted by a row reflow.
  const lastScrollAtRef = useRef(0);
  // Mirrors `selectedStock` so the auto-refresh tick (which intentionally doesn't depend
  // on it) can read the live value without re-creating the polling cycle every modal open.
  const selectedStockRef = useRef(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  // v2.5: New features
  const [watchlist, setWatchlist] = useState(() => Storage.get('watchlist', []));
  const [selectedStock, setSelectedStock] = useState(null); // For detail modal
  // Keep the ref in sync so the auto-refresh tick can check "is a modal open?" without
  // re-subscribing the polling cycle every time the user opens/closes a row detail.
  useEffect(() => { selectedStockRef.current = selectedStock; }, [selectedStock]);
  // Global scroll listener: any user scroll updates lastScrollAtRef so the next auto-refresh
  // tick within 8s skips itself (passive listener — zero scroll-perf cost).
  useEffect(() => {
    const onScroll = () => { lastScrollAtRef.current = Date.now(); };
    window.addEventListener('scroll', onScroll, { passive: true, capture: true });
    return () => window.removeEventListener('scroll', onScroll, { capture: true });
  }, []);
  const [showTour, setShowTour] = useState(false); // Onboarding tour
  const [dteFilter, setDteFilter] = useState('monthly'); // DTE preference: weekly | biweekly | monthly | all
  const [capitalTier, setCapitalTier] = useState(() => {
    try { return localStorage.getItem('capitalTier') || 'all'; } catch(e) { return 'all'; }
  });
  // Guard flag so hydration from Firestore doesn't immediately trigger a write-back
  const capitalTierHydratedRef = useRef(false);
  useEffect(() => {
    // Always write to localStorage (fallback when signed out, and for fast initial render)
    try { localStorage.setItem('capitalTier', capitalTier); } catch(e) {}
    // Sync to Firestore when signed in, but skip the first run that follows hydration
    if (!capitalTierHydratedRef.current) return;
    if (!user || !user.uid || typeof firebaseDb === 'undefined') return;
    firebaseDb.collection('users').doc(user.uid)
      .collection('settings').doc('preferences')
      .set({ capitalTier, updatedAt: new Date().toISOString() }, { merge: true })
      .catch(e => console.warn('[preferences] save failed', e));
  }, [capitalTier, user && user.uid]);
  useEffect(() => { Storage.set('watchlist', watchlist); }, [watchlist]);
  const toggleWatchlist = (symbol) => setWatchlist(prev => prev.includes(symbol) ? prev.filter(s => s !== symbol) : [...prev, symbol]);

  // Re-score all stocks when gate thresholds change (dispatched from AdvancedGateThresholdsCard)
  useEffect(() => {
    const handler = () => {
      setStocks(prev => prev.map(s => {
        const next = { ...s };
        next.recommendation = WheelScoring.getRecommendation(next);
        return next;
      }));
    };
    window.addEventListener('rescore-stocks', handler);
    return () => window.removeEventListener('rescore-stocks', handler);
  }, []);
  const [settings, setSettings] = useState(Storage.get('settings', {
    minYield: 1.5,
    maxDelta: 0.30,
    minScore: 40,
    useRSI: true,
    useMACD: true,
    useBB: true,
    useEMA: true,
    useSMA50: true,
    alertHighScore: true,
    alertEarnings: true,
    alertSignal: false,
    autoRefresh: true,
    showSparklines: true,
  }));

  // Save settings
  useEffect(() => { Storage.set('settings', settings); }, [settings]);

  // Load/refresh data from Railway backend API.
  // CRITICAL: This dashboard surfaces real-money options trades. We never substitute
  // synthesized prices when the API hiccups — a fake price shown as live is a credibility
  // violation. On any failure we set an explicit `loadingState` and the UI shows a status
  // card; we never call any kind of fixture/mock generator.
  const loadData = useCallback(async (opts) => {
    // `silent: true` is used by the auto-refresh tick. On transient failures we keep the
    // existing rendered data + loadingState intact rather than swapping the table for a
    // warming/error card. The owner saw the dashboard looking "broken" mid-session because
    // a single 202 from the backend nuked good live data — never again on a routine poll.
    const silent = !!(opts && opts.silent);
    if (!silent) setLoading(true);

    // Cancel any pending warming auto-retry — a fresh load supersedes it.
    if (warmingRetryRef.current) {
      clearTimeout(warmingRetryRef.current);
      warmingRetryRef.current = null;
    }

    // Surface progress immediately so the UI flips off any stale state.
    if (!silent) setLoadingState({ status: 'loading' });

    // API URL is required. If unset (dev misconfig), surface as an error — never fall back to fake data.
    const apiConfigured = CONFIG.API_BASE_URL && !CONFIG.API_BASE_URL.includes('YOUR-RAILWAY-URL');
    if (!apiConfigured) {
      console.error('[WheelPro] CONFIG.API_BASE_URL is not configured.');
      if (!silent) {
        setStocks([]);
        setLoading(false);
        setLoadingState({ status: 'error', message: 'Market data API is not configured. Please contact support.' });
      }
      return;
    }

    let response;
    try {
      response = await fetch(`${CONFIG.API_BASE_URL}/api/stocks?dte=${dteFilter}`, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' },
      });
    } catch (err) {
      // Network error / fetch reject — surface, do NOT show fake prices.
      console.warn('[WheelPro] Network error fetching market data:', err.message);
      if (!silent) {
        setStocks([]);
        setLoading(false);
        setLoadingState({ status: 'error', message: err.message || 'Network error reaching market data.' });
      }
      return;
    }

    // 202 = backend warming (cold-start cache fill). Parse progress + retry hint, schedule auto-retry.
    if (response.status === 202) {
      let payload = {};
      try { payload = await response.json(); } catch(e) {}
      const progress = payload.progress || null;
      const retryAfterSeconds = Math.max(2, Number(payload.retryAfterSeconds) || 30);
      const message = payload.message || 'Tradier feed warming up — refreshing automatically';
      if (!silent) {
        setStocks([]);
        setLoading(false);
        setLoadingState({ status: 'warming', progress, retryAfterSeconds, message });
        warmingRetryRef.current = setTimeout(() => {
          warmingRetryRef.current = null;
          loadData();
        }, retryAfterSeconds * 1000);
      }
      return;
    }

    if (!response.ok) {
      // 4xx/5xx — surface, do NOT show fake prices.
      let detail = '';
      try { const j = await response.json(); detail = j.message || j.error || ''; } catch(e) {}
      const message = `Market data API returned ${response.status}${detail ? ` — ${detail}` : ''}.`;
      console.warn('[WheelPro]', message);
      if (!silent) {
        setStocks([]);
        setLoading(false);
        setLoadingState({ status: 'error', message });
      }
      return;
    }

    let result;
    try {
      result = await response.json();
    } catch (err) {
      if (!silent) {
        setStocks([]);
        setLoading(false);
        setLoadingState({ status: 'error', message: 'Market data response was not valid JSON.' });
      }
      return;
    }

    // Some shapes still arrive with success:false even at 200 (legacy warming). Treat as error.
    if (!result.success || !Array.isArray(result.data)) {
      const message = result.message || 'Market data API returned an unexpected response.';
      if (!silent) {
        setStocks([]);
        setLoading(false);
        setLoadingState({ status: 'error', message });
      }
      return;
    }

    if (result.data.length === 0) {
      if (!silent) {
        setStocks([]);
        setLastRefresh(new Date());
        setLoading(false);
        setLoadingState({ status: 'empty' });
      }
      return;
    }

    // Happy path: enrich and render. (Identical to prior post-processing — preserved verbatim.)
    const enrichedData = result.data.map(stock => {
      // Tag as live data (backend confirmed)
      stock.dataSource = 'yahoo-finance';
      // Calculate OTM percent if not provided
      if (!stock.otmPercent && stock.price && stock.strikePrice) {
        stock.otmPercent = Math.max(0, (stock.price - stock.strikePrice) / stock.price);
      }
      // Calculate expiration date string if not provided
      if (!stock.expDateStr && stock.daysToExpiry) {
        const expDate = new Date(Date.now() + stock.daysToExpiry * 86400000);
        stock.expDateStr = `${(expDate.getMonth()+1).toString().padStart(2,'0')}/${expDate.getDate().toString().padStart(2,'0')}/${expDate.getFullYear().toString().slice(-2)}`;
      }
      // Cash required
      if (!stock.cashRequired && stock.strikePrice) {
        stock.cashRequired = Math.round(stock.strikePrice * 100);
      }
      // Probability of profit
      if (!stock.probOfProfit && stock.delta) {
        stock.probOfProfit = Math.round((1 - stock.delta) * 100);
      }
      // Max loss per contract
      if (!stock.maxLoss && stock.strikePrice && stock.premium) {
        stock.maxLoss = Math.round((stock.strikePrice - stock.premium) * 100);
      }
      // Support & Resistance from historical data
      if (!stock.supportLevel && stock.lows) {
        stock.supportLevel = TechnicalAnalysis.SupportLevel(stock.lows, stock.closes);
      }
      if (!stock.resistanceLevel && stock.highs) {
        stock.resistanceLevel = TechnicalAnalysis.ResistanceLevel(stock.highs, stock.closes);
      }
      // IV Percentile
      if (!stock.ivPercentile && stock.closes && stock.iv) {
        stock.ivPercentile = TechnicalAnalysis.IVPercentile(stock.closes, stock.iv);
      }
      // v2.4.0: Earnings — backend now sends earningsConfirmed: true when real
      // If backend didn't send the field at all, default to NOT confirmed
      if (stock.earningsConfirmed === undefined || stock.earningsConfirmed === null) {
        stock.earningsConfirmed = false;
      }
      // v3.3.0: Backend now sends null for unknown earnings (was 999 sentinel)
      // Normalize: treat null/undefined/>=900 as "no known earnings" (null)
      if (stock.earningsIn != null && stock.earningsIn < 900) {
        // Have a real day count — derive display string if missing
        if (!stock.earningsDateStr) {
          const eDate = new Date(Date.now() + stock.earningsIn * 86400000);
          stock.earningsDateStr = `${(eDate.getMonth()+1).toString().padStart(2,'0')}/${eDate.getDate().toString().padStart(2,'0')}`;
        }
      } else {
        // null, undefined, or legacy 999 → no known earnings
        stock.earningsIn = null;
        if (!stock.earningsConfirmed && !stock.earningsDateStr) stock.earningsDateStr = '—';
      }
      // v2.4.0: Put/Call ratio — backend now sends real ratio
      if (!stock.putCallRatio && stock.putCallRatio !== 0) stock.putCallRatio = 1.0;
      // v2.4.0: Ex-dividend — backend now sends real data
      if (stock.exDivBeforeExpiry === undefined) stock.exDivBeforeExpiry = false;
      if (stock.hasDividend === undefined) stock.hasDividend = false;
      // Use server-side scoring if available (IP protection — algorithm runs on backend)
      // Only fall back to client-side if server didn't send scores
      if (!stock.wheelScore) stock.wheelScore = WheelScoring.calculateScore(stock);
      if (!stock.recommendation) stock.recommendation = WheelScoring.getRecommendation(stock);
      return stock;
    });
    // Successful render — both manual and silent refreshes always update the table.
    // Silent success also flips state to 'ready' so a previous error/warming card clears.
    setStocks(enrichedData);
    setLastRefresh(new Date());
    if (!silent) setLoading(false);
    setLoadingState({ status: 'ready' });
    // Capture data-source caveats so the UI can show an amber banner when
    // the backend served monthly priority data for a non-monthly DTE filter
    // (i.e. requested DTE bucket isn't warm yet). Always real Tradier data —
    // the banner is purely informational.
    setDataSourceInfo(result.dataLimitedToMonthly ? {
      dataLimitedToMonthly: true,
      requestedDte: result.requestedDte,
      dteRange: result.dteRange,
    } : null);
    console.log(`[WheelPro] Loaded ${enrichedData.length} stocks from API (cached: ${result.cached}${result.dataLimitedToMonthly ? `, dataLimitedToMonthly for ${result.requestedDte}` : ''}${silent ? ', silent' : ''})`);
  }, [dteFilter]);

  // Cancel any pending warming-retry timer when this component unmounts.
  useEffect(() => () => {
    if (warmingRetryRef.current) {
      clearTimeout(warmingRetryRef.current);
      warmingRetryRef.current = null;
    }
  }, []);

  // Fetch Stripe subscription tier and update state
  const fetchSubscriptionTier = useCallback(async (email, isOwner) => {
    if (isOwner) { setSubscriptionTier('elite'); setSubscriptionStatus('active'); return; }
    if (!email) { setSubscriptionTier('free'); setSubscriptionStatus('free'); return; }
    try {
      const res = await fetch(`${CONFIG.API_BASE_URL}/api/subscription/status?email=${encodeURIComponent(email)}`);
      const data = await res.json();
      const status = data.status || 'free';
      if (status === 'active' || status === 'trialing') {
        setSubscriptionTier(STRIPE_PRICE_TIERS[data.plan] || 'free');
        setSubscriptionStatus(status);
      } else {
        setSubscriptionTier('free');
        setSubscriptionStatus('free');
      }
    } catch (err) {
      console.warn('[WheelPro] Subscription fetch failed:', err);
      setSubscriptionTier('free');
      setSubscriptionStatus('free');
    }
  }, []);

  // Auto-refresh orchestrator.
  // - Initial load on sign-in.
  // - Polls at 30s during market hours (9:30–16:00 ET, M–F), 5min outside.
  // - Pauses entirely while document.hidden; resumes + immediately fetches on visibility-restore.
  // - Skips a tick if user scrolled within the last 8s OR a detail modal is open.
  // - Silent fetches: transient failures don't blow away rendered data / loadingState.
  // - Countdown text in topbar updates every 1s and resets after each successful fetch.
  useEffect(() => {
    if (!user) return;
    // Initial load is NOT silent — first paint should be allowed to show warming/error UI.
    loadData();
    if (!settings.autoRefresh) {
      setRefreshCountdown(null);
      return;
    }

    // Compute the polling interval based on US equity market hours.
    const computeIntervalMs = () => {
      const now = new Date();
      const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      const day = et.getDay();
      const mins = et.getHours() * 60 + et.getMinutes();
      const isWeekday = day >= 1 && day <= 5;
      const isOpen = isWeekday && mins >= 570 && mins < 960; // 9:30 AM – 4:00 PM ET
      return isOpen ? 30_000 : 300_000;
    };

    let pollTimer = null;
    let countdownTimer = null;
    let nextAt = Date.now() + computeIntervalMs();

    // Update the visible countdown every second.
    const tickCountdown = () => {
      if (document.hidden) {
        setRefreshCountdown(null);
        return;
      }
      const remaining = Math.max(0, Math.ceil((nextAt - Date.now()) / 1000));
      setRefreshCountdown(remaining);
    };

    // One refresh tick. Reschedules itself; never throws.
    const tick = async () => {
      if (document.hidden) return; // visibilitychange handler will resume
      // Skip while user is reading: recent scroll OR open detail modal.
      const recentlyScrolled = (Date.now() - lastScrollAtRef.current) < 8_000;
      const modalOpen = !!selectedStockRef.current;
      if (recentlyScrolled || modalOpen) {
        // Skip this tick — reschedule one more interval out, leave countdown running.
        nextAt = Date.now() + computeIntervalMs();
        scheduleNext();
        return;
      }
      try {
        await loadData({ silent: true });
      } catch (e) {
        console.warn('[WheelPro] Silent refresh failed:', e && e.message);
      }
      nextAt = Date.now() + computeIntervalMs();
      scheduleNext();
    };

    const scheduleNext = () => {
      if (pollTimer) clearTimeout(pollTimer);
      pollTimer = setTimeout(tick, Math.max(1000, nextAt - Date.now()));
    };

    const onVisibilityChange = () => {
      if (document.hidden) {
        // Pause: clear timers, blank countdown.
        if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
        setRefreshCountdown(null);
      } else {
        // Resume + immediately fetch (silent — page already has data) and reset cycle.
        loadData({ silent: true }).catch(() => {});
        nextAt = Date.now() + computeIntervalMs();
        scheduleNext();
        tickCountdown();
      }
    };

    // Manual refresh (button or 'r' key) dispatches this — reset the cycle so the
    // countdown immediately reflects the user's action instead of stale "Next refresh in 12s".
    const onManualReset = () => {
      nextAt = Date.now() + computeIntervalMs();
      scheduleNext();
      tickCountdown();
    };

    countdownTimer = setInterval(tickCountdown, 1000);
    scheduleNext();
    tickCountdown();
    document.addEventListener('visibilitychange', onVisibilityChange);
    window.addEventListener('wheelpro-refresh-reset', onManualReset);

    return () => {
      if (pollTimer) clearTimeout(pollTimer);
      if (countdownTimer) clearInterval(countdownTimer);
      document.removeEventListener('visibilitychange', onVisibilityChange);
      window.removeEventListener('wheelpro-refresh-reset', onManualReset);
      setRefreshCountdown(null);
    };
  }, [user, loadData, settings.autoRefresh]);

  // Firebase auth state listener — auto-login returning users
  // IMPORTANT: this is also the fix for the Stripe redirect race condition.
  // Firebase (IndexedDB) persists sessions across redirects even in incognito.
  // We always wait for this callback before deciding to show the landing page.
  useEffect(() => {
    const unsubscribe = firebaseAuth.onAuthStateChanged(async (fbUser) => {
      if (fbUser) {
        try {
          let profile = await FirebaseHelper.getProfile(fbUser.uid);
          if (!profile) {
            // Race condition: Firebase auth fires before Firestore profile is written during signup.
            // Wait 1.5s and retry once so the new user isn't sent back to the login screen.
            await new Promise(r => setTimeout(r, 1500));
            profile = await FirebaseHelper.getProfile(fbUser.uid);
          }
          if (profile) {
            // Clear any stale data from a previous user before loading this user's cloud data
            Storage.set('positions', []);
            Storage.set('journal', []);
            // Load cloud data first so PortfolioPage/Journal remount with correct data
            const cloudPortfolio = await FirebaseHelper.loadData(fbUser.uid, 'portfolio');
            Storage.set('positions', cloudPortfolio || []);
            const cloudJournal = await FirebaseHelper.loadData(fbUser.uid, 'journal');
            Storage.set('journal', cloudJournal || []);
            const cloudWatchlist = await FirebaseHelper.loadData(fbUser.uid, 'watchlist');
            if (cloudWatchlist) { Storage.set('watchlist', cloudWatchlist); setWatchlist(cloudWatchlist); }
            const cloudSettings = await FirebaseHelper.loadData(fbUser.uid, 'settings');
            if (cloudSettings) { Storage.set('settings', cloudSettings); setSettings(s => ({...s, ...cloudSettings})); }
            // Load user preferences (capitalTier, etc.) from Firestore — silently fall back to localStorage on failure
            try {
              const prefsDoc = await firebaseDb.collection('users').doc(fbUser.uid)
                .collection('settings').doc('preferences').get();
              if (prefsDoc.exists) {
                const prefs = prefsDoc.data() || {};
                if (prefs.capitalTier && ['starter','builder','full','all'].includes(prefs.capitalTier)) {
                  setCapitalTier(prefs.capitalTier);
                  try { localStorage.setItem('capitalTier', prefs.capitalTier); } catch(e) {}
                }
              }
            } catch (e) { console.warn('[preferences] load failed', e); }
            // Enable Firestore write-back now that cloud hydration is complete
            capitalTierHydratedRef.current = true;
            // Now set user state — PortfolioPage/Journal will remount reading correct localStorage
            setUser(profile);
            Storage.set('user', profile);
            // Identify authenticated user in PostHog so events are tied to their account
            if (window.posthog) window.posthog.identify(fbUser.uid, {
              email: fbUser.email,
              name: profile.name,
              plan: profile.plan,
            });
            // Fetch live Stripe subscription tier
            fetchSubscriptionTier(fbUser.email, profile.isOwner);
            // Detect successful Stripe checkout redirect
            const params = new URLSearchParams(window.location.search);
            if (params.get('session_id')) {
              setPaymentSuccess(true);
              window.history.replaceState({}, '', window.location.pathname);
            }
          }
        } catch (err) { console.warn('[WheelPro] Failed to load profile:', err); }
      } else {
        // No Firebase session — if arriving from Stripe checkout, prompt sign-in
        const params = new URLSearchParams(window.location.search);
        if (params.get('session_id')) {
          setAuthNotice('Please sign in to access your subscription.');
          setShowAuth('login');
        }
      }
      // Always resolve loading state so the app can render
      setAuthLoading(false);
    });
    return () => unsubscribe();
  }, []);

  // Auth handlers
  const handleLogin = async (userData) => {
    Storage.set('user', userData);
    setUser(userData);
    setShowAuth(null);
    // If user clicked a pricing plan before signing up, redirect to Stripe checkout
    if (pendingPlan) {
      const plan = pendingPlan;
      setPendingPlan(null);
      setTimeout(() => StripeHelper.createCheckout(plan, userData.email, userData.uid), 500);
      return; // Skip onboarding tour — they'll see it after checkout
    }
    // Show onboarding tour for first-time users
    if (!Storage.get('tourCompleted', false)) {
      setTimeout(() => setShowTour(true), 1500);
    }
    // Fetch live Stripe subscription tier
    fetchSubscriptionTier(userData.email, userData.isOwner);
    // Check URL params for checkout success
    const params = new URLSearchParams(window.location.search);
    if (params.get('checkout') === 'success') {
      const plan = params.get('plan');
      if (plan) {
        userData.plan = plan;
        setUser({...userData});
        Storage.set('user', userData);
        if (userData.uid) {
          firebaseDb.collection('users').doc(userData.uid).update({ plan }).catch(() => {});
        }
      }
      window.history.replaceState({}, '', window.location.pathname); // Clean URL
    }
  };

  const completeTour = () => {
    setShowTour(false);
    Storage.set('tourCompleted', true);
  };

  const handleLogout = async () => {
    // Save data to cloud before signing out
    if (user?.uid) {
      try {
        await FirebaseHelper.saveData(user.uid, 'portfolio', Storage.get('positions', []));
        await FirebaseHelper.saveData(user.uid, 'journal', Storage.get('journal', []));
        await FirebaseHelper.saveData(user.uid, 'watchlist', watchlist);
        await FirebaseHelper.saveData(user.uid, 'settings', settings);
      } catch (err) { console.warn('[WheelPro] Failed to save data on logout:', err); }
    }
    await FirebaseHelper.signOut();
    Storage.remove('user');
    Storage.remove('positions');
    Storage.remove('journal');
    // Preserve capitalTier in localStorage so next sign-in starts with the last setting.
    // Reset hydration flag so the next sign-in rehydrates from Firestore without triggering a stale write.
    capitalTierHydratedRef.current = false;
    setUser(null);
    setPage('dashboard');
    setStocks([]);
  };

  // Anti-copy protection + dev tools deterrence + keyboard shortcuts
  useEffect(() => {
    const handleContextMenu = (e) => e.preventDefault();
    const handleKeyDown = (e) => {
      // Allow in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      // Block: Ctrl+C, Ctrl+U (view source), Ctrl+S (save), F12 (dev tools), Ctrl+Shift+I/J (dev tools)
      if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'u' || e.key === 's')) {
        e.preventDefault(); return;
      }
      if (e.key === 'F12') { e.preventDefault(); return; }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
        e.preventDefault(); return;
      }
      // v2.5: Keyboard shortcuts
      if (e.key === 'r' || e.key === 'R') { loadData(); window.dispatchEvent(new CustomEvent('wheelpro-refresh-reset')); }
      if (e.key === '1') setPage('dashboard');
      if (e.key === '2') setPage('screener');
      if (e.key === '3') setPage('portfolio');
      if (e.key === '4') setPage('journal');
      if (e.key === '5') setPage('backtest');
      if (e.key === 'Escape') setSelectedStock(null);
    };
    // Detect dev tools open (debugger detection)
    const devToolsCheck = setInterval(() => {
      const threshold = 160;
      if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
        console.clear();
        console.log('%cWheelPro™ — Proprietary Software', 'font-size:24px;color:#c9a84c;font-weight:bold;');
        console.log('%cUnauthorized inspection, copying, or reverse engineering of this software is prohibited.', 'font-size:14px;color:#dc2626;');
        console.log('%c© WheelPro LLC. All rights reserved. Scoring algorithms run server-side.', 'font-size:12px;color:#5a6b7f;');
      }
    }, 2000);
    document.addEventListener('contextmenu', handleContextMenu);
    document.addEventListener('keydown', handleKeyDown);
    return () => {
      document.removeEventListener('contextmenu', handleContextMenu);
      document.removeEventListener('keydown', handleKeyDown);
      clearInterval(devToolsCheck);
    };
  }, [loadData]);

  // Firebase hasn't resolved the session yet — show a neutral loading screen.
  // This prevents the landing page from flashing for authenticated users whose
  // localStorage is empty (e.g. incognito, Stripe redirect, cross-device).
  if (authLoading && !user) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-primary)'}}>
        <div style={{textAlign:'center'}}>
          <div style={{width:40,height:40,border:'3px solid var(--border)',borderTopColor:'var(--accent-gold)',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 16px'}} />
          <div style={{fontFamily:'var(--font-body)',color:'var(--text-muted)',fontSize:14,letterSpacing:'0.02em'}}>Loading WheelPro…</div>
        </div>
      </div>
    );
  }

  // Not logged in - show landing page
  if (!user) {
    return (
      <AuthContext.Provider value={{ user, handleLogin, handleLogout }}>
        <LandingPage
          onLogin={() => setShowAuth('login')}
          onSignup={() => setShowAuth('signup')}
          onSubscribe={(plan) => {
            if (window.posthog) window.posthog.capture('checkout_click', { plan, logged_in: !!user });
            // If not logged in, store the plan and show signup — checkout happens after account creation
            if (!user) { setPendingPlan(plan); setShowAuth('signup'); return; }
            StripeHelper.createCheckout(plan, user.email, user.uid);
          }}
        />
        {showAuth && (
          <AuthModal
            mode={showAuth}
            notice={authNotice}
            onClose={() => { setShowAuth(null); setAuthNotice(null); }}
            onSubmit={handleLogin}
            onToggle={() => setShowAuth(s => s === 'login' ? 'signup' : 'login')}
          />
        )}
        <div className="watermark">WheelPro™ v{CONFIG.VERSION} · © {CONFIG.OWNER}</div>
      </AuthContext.Provider>
    );
  }

  // Logged in - show dashboard
  const pages = {
    dashboard: { title: 'Dashboard', icon: Icons.dashboard, component: <DashboardPage stocks={stocks} watchlist={watchlist} toggleWatchlist={toggleWatchlist} onSelectStock={setSelectedStock} onSetPage={setPage} capitalTier={capitalTier} /> },
    screener: { title: 'Screener', icon: Icons.screener, component: <ScreenerPage stocks={stocks} user={user} subscriptionTier={subscriptionTier} capitalTier={capitalTier} onSelectStock={setSelectedStock} onExport={(s) => exportCSV(s, `wheelpro-screener-${new Date().toISOString().slice(0,10)}.csv`)} /> },
    portfolio: { title: 'Portfolio', icon: Icons.portfolio, component: <PortfolioPage key={user?.uid || 'guest'} stocks={stocks} /> },
    journal: { title: 'Trade Journal', icon: Icons.journal, component: <TradeJournalPage key={user?.uid || 'guest'} user={user} subscriptionTier={subscriptionTier} /> },
    backtest: { title: 'Backtest', icon: Icons.chart, component: <ErrorBoundary><BacktestPage user={user} subscriptionTier={subscriptionTier} /></ErrorBoundary> },
    settings: { title: 'Settings', icon: Icons.settings, component: <SettingsPage settings={settings} setSettings={setSettings} user={user} /> },
    admin: { title: 'Admin', icon: Icons.admin, component: <AdminPage user={user} authLoading={authLoading} /> },
  };

  return (
    <AuthContext.Provider value={{ user, handleLogin, handleLogout }}>
      <div className="dashboard-layout">
        {/* Sidebar */}
        <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
          <div className="sidebar-header">
            <div className="sidebar-logo">WheelPro™</div>
            <div className="sidebar-logo-sub">Options Dashboard</div>
          </div>
          <nav className="sidebar-nav" aria-label="Primary">
            <div className="sidebar-section-label">Analysis</div>
            {['dashboard', 'screener', 'portfolio', 'journal', 'backtest'].map(key => (
              <a key={key} className={`sidebar-link ${page === key ? 'active' : ''}`}
                role="button" tabIndex={0}
                aria-current={page === key ? 'page' : undefined}
                onClick={() => { setPage(key); setSidebarOpen(false); }}
                onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPage(key); setSidebarOpen(false); } }}>
                <span className="icon">{pages[key].icon}</span>
                {pages[key].title}
              </a>
            ))}
            <div className="sidebar-section-label">Account</div>
            <a className={`sidebar-link ${page === 'settings' ? 'active' : ''}`}
              role="button" tabIndex={0}
              aria-current={page === 'settings' ? 'page' : undefined}
              onClick={() => { setPage('settings'); setSidebarOpen(false); }}
              onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPage('settings'); setSidebarOpen(false); } }}>
              <span className="icon">{Icons.settings}</span>
              Settings
            </a>
            {user.isOwner && (
              <a className={`sidebar-link ${page === 'admin' ? 'active' : ''}`}
                role="button" tabIndex={0}
                aria-current={page === 'admin' ? 'page' : undefined}
                onClick={() => { setPage('admin'); setSidebarOpen(false); }}
                onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setPage('admin'); setSidebarOpen(false); } }}>
                <span className="icon">{Icons.admin}</span>
                Admin Panel
              </a>
            )}
          </nav>
          <div className="sidebar-footer">
            <div className="sidebar-user">
              <div className="sidebar-avatar">{user.name?.charAt(0)?.toUpperCase() || '?'}</div>
              <div className="sidebar-user-info">
                <div className="sidebar-user-name">{user.name}</div>
                <div className="sidebar-user-plan">{user.isOwner ? '👑 Owner' : subscriptionTier === 'elite' ? `⭐ Elite${subscriptionStatus === 'trialing' ? ' Trial' : ''}` : subscriptionTier === 'pro' ? `● Pro${subscriptionStatus === 'trialing' ? ' Trial' : ''}` : subscriptionTier === 'starter' ? `● Starter${subscriptionStatus === 'trialing' ? ' Trial' : ''}` : '○ Free'}</div>
              </div>
            </div>
            <a className="sidebar-link" role="button" tabIndex={0} onClick={handleLogout}
              onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleLogout(); } }}
              style={{marginTop:4, color:'var(--accent-red)'}}>
              <span className="icon">{Icons.logout}</span>
              Sign Out
            </a>
          </div>
        </aside>

        {/* Main */}
        <main className="main-content" id="main-content">
          <header className="topbar">
            <div style={{display:'flex', alignItems:'center', gap:'16px'}}>
              <button onClick={() => setSidebarOpen(!sidebarOpen)}
                aria-label={sidebarOpen ? 'Close navigation menu' : 'Open navigation menu'}
                aria-expanded={sidebarOpen}
                style={{background:'none',border:'none',color:'var(--text-secondary)',cursor:'pointer', display:'none'}}
                className="mobile-menu">
                {Icons.menu}
              </button>
              <h1 className="topbar-title">{pages[page]?.title}</h1>
            </div>
            <div className="topbar-actions">
              {(lastRefresh || loadingState.status !== 'idle') && (() => {
                // Demo-data fallback was permanently removed — only two badge states remain:
                // - 'ready' → green Live Data
                // - everything else (loading / warming / error / empty) → amber Loading market data…
                const isLive = loadingState.status === 'ready';
                // Format countdown as "23s" or "4m 12s". null = paused (tab hidden / off).
                let countdownText = null;
                if (settings.autoRefresh && refreshCountdown !== null && isLive) {
                  const s = refreshCountdown;
                  countdownText = s >= 60 ? `${Math.floor(s/60)}m ${String(s%60).padStart(2,'0')}s` : `${s}s`;
                }
                return (
                  <span style={{fontSize:'12px', color: isLive ? 'var(--accent-green)' : 'var(--accent-amber)', display:'inline-flex', alignItems:'center', gap:'8px'}}>
                    <span>
                      {lastRefresh ? `Updated ${lastRefresh.toLocaleTimeString()}` : 'Awaiting market data'}
                      {isLive ? ' · ● Live Data' : ' · ● Loading market data…'}
                    </span>
                    {countdownText && (
                      <span
                        title="Time until next automatic refresh"
                        style={{fontFamily:'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace', fontSize:'11px', color:'var(--text-muted)', opacity:0.85, whiteSpace:'nowrap'}}
                      >
                        Next refresh in {countdownText}
                      </span>
                    )}
                  </span>
                );
              })()}
              {(() => {
                const now = new Date();
                const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
                const day = et.getDay();
                const h = et.getHours();
                const m = et.getMinutes();
                const mins = h * 60 + m;
                const isWeekday = day >= 1 && day <= 5;
                const isOpen = isWeekday && mins >= 570 && mins < 960; // 9:30 AM - 4:00 PM ET
                const isPreMarket = isWeekday && mins >= 240 && mins < 570; // 4:00 AM - 9:30 AM ET
                const isAfterHours = isWeekday && mins >= 960 && mins < 1200; // 4:00 PM - 8:00 PM ET
                return (
                  <div className="topbar-badge" style={!isOpen ? {background:'rgba(245,158,11,0.1)', borderColor:'rgba(245,158,11,0.2)'} : {}}>
                    <span className="pulse" style={!isOpen ? {background:'var(--accent-amber)', boxShadow:'0 0 8px var(--accent-amber)'} : {}}></span>
                    {isOpen ? 'Market Open' : isPreMarket ? 'Pre-Market' : isAfterHours ? 'After Hours' : 'Market Closed'}
                  </div>
                );
              })()}
              <div style={{display:'flex', alignItems:'center', gap:'6px', borderRight:'1px solid var(--border)', paddingRight:12}}>
                <label htmlFor="dte-filter-select" style={{fontSize:'10px', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.8px', whiteSpace:'nowrap'}}>DTE</label>
                <select
                  id="dte-filter-select"
                  className="dte-filter-select"
                  value={dteFilter}
                  onChange={e => setDteFilter(e.target.value)}
                  title="Filter by Days to Expiration"
                  aria-label="Filter by days to expiration"
                >
                  <option value="weekly">This Week (0–7)</option>
                  <option value="biweekly">2 Weeks (8–14)</option>
                  <option value="monthly">Monthly (25–45)</option>
                  <option value="all">All Expirations</option>
                </select>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:'6px', borderRight:'1px solid var(--border)', paddingRight:12}}>
                <label htmlFor="capital-tier-select" style={{fontSize:'10px', color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.8px', whiteSpace:'nowrap'}}>Capital</label>
                <select
                  id="capital-tier-select"
                  className="dte-filter-select"
                  value={capitalTier}
                  onChange={e => setCapitalTier(e.target.value)}
                  title="Filter by account capital tier (cash required to sell the put)"
                  aria-label="Filter by capital tier"
                  style={{minWidth:170}}
                >
                  <option value="all">All Capital Levels</option>
                  <option value="starter">Starter ($500–$2K)</option>
                  <option value="builder">Builder ($2K–$10K)</option>
                  <option value="full">Full Wheel ($10K+)</option>
                </select>
              </div>
              <button className="btn btn-sm btn-secondary"
                onClick={() => { loadData(); window.dispatchEvent(new CustomEvent('wheelpro-refresh-reset')); }}
                disabled={loading}
                style={{display:'flex', alignItems:'center', gap:'6px'}}>
                {loading ? <span className="spinner" style={{width:14,height:14,borderWidth:2}}></span> : Icons.refresh}
                Refresh
              </button>
            </div>
          </header>

          {paymentSuccess && (
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',padding:'12px 24px',background:'rgba(34,197,94,0.1)',borderBottom:'1px solid rgba(34,197,94,0.2)',color:'var(--accent-green)',fontSize:'14px',fontWeight:500}}>
              <span>🎉 Payment successful! Your subscription is now active. Welcome to WheelPro™.</span>
              <button onClick={() => setPaymentSuccess(false)} aria-label="Dismiss payment success notification" style={{background:'none',border:'none',color:'var(--accent-green)',cursor:'pointer',padding:'2px 6px',fontSize:'16px',lineHeight:1,opacity:0.7}}>✕</button>
            </div>
          )}

          <div className="page-content">
            {loadingState.status === 'warming' ? (
              // Cold-start cache fill from the API (HTTP 202). We auto-retry; the user sees progress.
              // Critical: NEVER render the data table while warming — no fake prices may sneak through.
              <div className="loading-state" style={{minHeight:'60vh'}}>
                <div style={{maxWidth:480, width:'100%', padding:'32px 28px', background:'var(--gradient-card)', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', display:'flex', flexDirection:'column', alignItems:'center', gap:16, textAlign:'center'}}>
                  <div className="spinner" style={{borderTopColor:'var(--accent-amber)'}}></div>
                  <h3 style={{margin:0, fontSize:'18px', color:'var(--text-primary)', fontWeight:600}}>Loading live market data</h3>
                  <p style={{margin:0, fontSize:'13px', color:'var(--text-muted)', lineHeight:1.5}}>
                    {loadingState.message || 'Tradier feed warming up — refreshing automatically'}
                  </p>
                  {loadingState.progress && (
                    <div style={{fontSize:'12px', color:'var(--accent-amber)', fontFamily:'var(--font-mono, monospace)', padding:'6px 12px', background:'rgba(245,158,11,0.08)', border:'1px solid rgba(245,158,11,0.2)', borderRadius:'var(--radius-sm, 6px)'}}>
                      {loadingState.progress} symbols ready
                    </div>
                  )}
                </div>
              </div>
            ) : loadingState.status === 'error' ? (
              // Hard failure (network or non-2xx). NEVER substitute fake prices; show retry.
              <div className="loading-state" style={{minHeight:'60vh'}}>
                <div style={{maxWidth:480, width:'100%', padding:'32px 28px', background:'var(--gradient-card)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:'var(--radius-md)', display:'flex', flexDirection:'column', alignItems:'center', gap:16, textAlign:'center'}}>
                  <h3 style={{margin:0, fontSize:'18px', color:'var(--text-primary)', fontWeight:600}}>Couldn't reach market data</h3>
                  <p style={{margin:0, fontSize:'13px', color:'var(--text-muted)', lineHeight:1.5}}>
                    {loadingState.message || 'Network error reaching market data.'}
                  </p>
                  <p style={{margin:0, fontSize:'12px', color:'var(--text-muted)'}}>
                    No prices are shown until live data is restored.
                  </p>
                  <button className="btn btn-sm btn-primary" onClick={loadData} style={{minWidth:120}}>
                    Retry
                  </button>
                </div>
              </div>
            ) : (loading && stocks.length === 0 && loadingState.status !== 'empty') ? (
              <div className="loading-state">
                <div className="spinner"></div>
                <p>Loading market data...</p>
                <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:16, width:'100%', maxWidth:900, marginTop:20}}>
                  {[1,2,3,4].map(i => (
                    <div key={i} style={{background:'var(--gradient-card)', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:20, animation:`shimmer 1.5s ease-in-out infinite`, backgroundImage:'linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.05) 50%, transparent 100%)', backgroundSize:'200% 100%'}}>
                      <div style={{height:10, background:'var(--bg-elevated)', borderRadius:4, width:'60%', marginBottom:12}}></div>
                      <div style={{height:24, background:'var(--bg-elevated)', borderRadius:4, width:'40%', marginBottom:8}}></div>
                      <div style={{height:8, background:'var(--bg-elevated)', borderRadius:4, width:'80%'}}></div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              // ready, idle, or empty — render the page. Empty case shows stats with 0 + an inline
              // "no recommendations" copy already handled inside the dashboard component.
              <>
                {dataSourceInfo?.dataLimitedToMonthly && (
                  <div style={{
                    margin: '0 0 16px',
                    padding: '10px 14px',
                    background: 'rgba(245,158,11,0.08)',
                    border: '1px solid rgba(245,158,11,0.25)',
                    borderRadius: 'var(--radius-sm, 6px)',
                    color: 'var(--accent-amber)',
                    fontSize: '13px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: 10,
                  }}>
                    <span style={{fontSize:'14px'}}>●</span>
                    <span>
                      Showing <strong>monthly</strong> options recommendations while {' '}
                      <strong>{
                        dataSourceInfo.requestedDte === 'weekly' ? 'This Week' :
                        dataSourceInfo.requestedDte === 'biweekly' ? '2 Weeks' :
                        dataSourceInfo.requestedDte === 'all' ? 'All Expirations' :
                        dataSourceInfo.requestedDte
                      }</strong> data finishes loading. All prices are real Tradier data.
                    </span>
                  </div>
                )}
                {pages[page]?.component}
              </>
            )}
          </div>
        </main>
      </div>

      {/* v2.5: Stock Detail Modal */}
      {selectedStock && <StockDetailModal stock={selectedStock} onClose={() => setSelectedStock(null)} />}

      {/* v2.5: Onboarding Tour */}
      {showTour && <OnboardingTour onComplete={completeTour} />}

      <footer className="footer">
        <div className="footer-copyright">
          © {new Date().getFullYear()} {CONFIG.OWNER} — All Rights Reserved · WheelPro™ v{CONFIG.VERSION}
        </div>
        <div style={{display:'flex', alignItems:'center', gap:16}}>
          <span style={{fontSize:10, color:'var(--text-muted)'}}>R=Refresh · 1-5=Pages · Esc=Close</span>
          <span>For educational purposes only. Not financial advice. Options involve risk of loss.</span>
        </div>
      </footer>

      <div className="watermark">WheelPro™ v{CONFIG.VERSION}</div>

      <style>{`
        @media (max-width: 1024px) {
          .mobile-menu { display: block !important; }
        }
      `}</style>
    </AuthContext.Provider>
  );
}

// ===== RENDER =====
try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
} catch(e) {
  console.error('Render error:', e);
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#ef4444;font-family:sans-serif;"><h2>Loading Error</h2><p>' + e.message + '</p><p>Please check your internet connection and reload.</p></div>';
}
</script>
