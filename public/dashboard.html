}

// ===== SCREENER PAGE =====
function ScreenerPage({ stocks, user, subscriptionTier, capitalTier = 'all', onSelectStock, onExport }) {
  // Shared concentration helpers (module-level) — highlight stocks whose
  // cash-at-risk is ≥60% of the selected tier's upper cap.
  const getConcentrationPct = (stock) => getConcentrationPctFor(stock, capitalTier);
  const isHighConcentration = (stock) => isHighConcentrationFor(stock, capitalTier);
  const [filters, setFilters] = useState({
    sector: 'All',
    minYield: 0,
    maxDelta: 0.35,
    minScore: 0,
    signal: 'All',
    search: '',
    sortBy: 'wheelScore',
    sortDir: 'desc'
  });

  const sectors = useMemo(() => ['All', ...new Set(stocks.map(s => s.sector))], [stocks]);

  // Dynamic search: when the search term matches nothing in the loaded list, query the API
  const [extraStocks, setExtraStocks] = React.useState([]);
  React.useEffect(() => {
    const term = filters.search.trim();
    if (!term) { setExtraStocks([]); return; }
    const hasMatch = stocks.some(s =>
      s.symbol.toLowerCase().includes(term.toLowerCase()) ||
      s.name.toLowerCase().includes(term.toLowerCase())
    );
    if (hasMatch) { setExtraStocks([]); return; }
    // Nothing found in loaded data — query the backend
    const apiConfigured = typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL && !CONFIG.API_BASE_URL.includes('YOUR-RAILWAY-URL');
    if (!apiConfigured) return;
    const controller = new AbortController();
    const timer = setTimeout(() => {
      fetch(`${CONFIG.API_BASE_URL}/api/stocks?q=${encodeURIComponent(term)}`, { signal: controller.signal })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(result => {
          if (result.success && result.data && result.data.length > 0) {
            const existing = new Set(stocks.map(s => s.symbol));
            const fresh = result.data.filter(s => !existing.has(s.symbol)).map(s => {
              s.dataSource = 'yahoo-finance';
              if (!s.wheelScore) s.wheelScore = WheelScoring.calculateScore(s);
              if (!s.recommendation) s.recommendation = WheelScoring.getRecommendation(s);
              return s;
            });
            setExtraStocks(fresh);
          }
        })
        .catch(() => {});
    }, 400);
    return () => { clearTimeout(timer); controller.abort(); };
  }, [filters.search, stocks]);

  // Track screener searches with 400ms debounce (mirrors the API search delay)
  React.useEffect(() => {
    const term = filters.search.trim();
    if (!term) return;
    const timer = setTimeout(() => {
      if (window.posthog) window.posthog.capture('screener_search', { query: term });
    }, 400);
    return () => clearTimeout(timer);
  }, [filters.search]);

  // Combine loaded stocks with any dynamically fetched extras
  const allScreenerStocks = React.useMemo(() => {
    if (extraStocks.length === 0) return stocks;
    const existing = new Set(stocks.map(s => s.symbol));
    return [...stocks, ...extraStocks.filter(s => !existing.has(s.symbol))];
  }, [stocks, extraStocks]);

  const filteredStocks = useMemo(() => {
    let result = allScreenerStocks.filter(s => {
      if (filters.sector !== 'All' && s.sector !== filters.sector) return false;
      if (s.weeklyYield < filters.minYield / 100) return false;
      if (s.delta > filters.maxDelta) return false;
      if (s.wheelScore < filters.minScore) return false;
      if (filters.signal === 'Bullish' && s.technicalSignal <= 0.2) return false;
      if (filters.signal === 'Bearish' && s.technicalSignal >= -0.2) return false;
      if (filters.signal === 'Neutral' && (s.technicalSignal > 0.2 || s.technicalSignal < -0.2)) return false;
      if (filters.search && !s.symbol.toLowerCase().includes(filters.search.toLowerCase()) && !s.name.toLowerCase().includes(filters.search.toLowerCase())) return false;
      return true;
    });

    result.sort((a, b) => {
      // Exact symbol match always floats to top when a search term is active
      if (filters.search) {
        const term = filters.search.toLowerCase();
        const aExact = a.symbol.toLowerCase() === term;
        const bExact = b.symbol.toLowerCase() === term;
        if (aExact && !bExact) return -1;
        if (bExact && !aExact) return 1;
      }
      const mult = filters.sortDir === 'desc' ? -1 : 1;
      return (a[filters.sortBy] - b[filters.sortBy]) * mult;
    });

    return result;
  }, [allScreenerStocks, filters]);

  // Split-table refs for frozen Symbol column
  const scrSplit = useSplitTable([filteredStocks]);

  // Responsive: swap table for stacked cards on narrow/portrait screens
  const layout = useResponsiveLayout();

  const handleSort = (field) => {
    setFilters(f => ({
      ...f,
      sortBy: field,
      sortDir: f.sortBy === field && f.sortDir === 'desc' ? 'asc' : 'desc'
    }));
  };

  // Free tier: no screener access (gate placed after hooks to satisfy Rules of Hooks)
  const tierLimits = CONFIG.TIER_LIMITS[subscriptionTier || 'free'];
  if (!tierLimits.screener && !user?.isOwner) {
    return (
      <div className="loading-state" style={{gap:20}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:'var(--bg-elevated)',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <h3 style={{color:'var(--text-primary)', margin:0}}>Advanced Screener</h3>
        <p style={{maxWidth:400, textAlign:'center', lineHeight:1.7}}>Filter and sort all stocks by yield, delta, score, sector, and technical signal. Search for specific tickers. Available on Starter, Pro, and Elite plans.</p>
        <button className="btn btn-primary" style={{marginTop:8}}>Upgrade to Starter — $29/mo</button>
      </div>
    );
  }

  const SortIcon = ({ field }) => {
    if (filters.sortBy !== field) return null;
    return filters.sortDir === 'desc' ? Icons.arrowDown : Icons.arrowUp;
  };

  return (
    <div>
      <div className="screener-filters">
        <div className="filter-group">
          <label className="filter-label" htmlFor="screener-search">Search</label>
          <input id="screener-search" className="filter-input" placeholder="Symbol or name..." value={filters.search} onChange={e => setFilters(f => ({...f, search: e.target.value}))} style={{minWidth:180}} type="search" />
        </div>
        <div className="filter-group">
          <label className="filter-label" htmlFor="screener-sector">Sector</label>
          <select id="screener-sector" className="filter-select" value={filters.sector} onChange={e => setFilters(f => ({...f, sector: e.target.value}))}>
            {sectors.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <label className="filter-label" htmlFor="screener-min-yield">Min Yield %</label>
          <input id="screener-min-yield" className="filter-input" type="number" step="0.5" min="0" max="10" value={filters.minYield} onChange={e => setFilters(f => ({...f, minYield: +e.target.value}))} style={{minWidth:80}} />
        </div>
        <div className="filter-group">
          <label className="filter-label" htmlFor="screener-max-delta">Max Delta</label>
          <input id="screener-max-delta" className="filter-input" type="number" step="0.05" min="0" max="1" value={filters.maxDelta} onChange={e => setFilters(f => ({...f, maxDelta: +e.target.value}))} style={{minWidth:80}} />
        </div>
        <div className="filter-group">
          <label className="filter-label" htmlFor="screener-min-score">Min Score</label>
          <input id="screener-min-score" className="filter-input" type="number" step="5" min="0" max="100" value={filters.minScore} onChange={e => setFilters(f => ({...f, minScore: +e.target.value}))} style={{minWidth:80}} />
        </div>
        <div className="filter-group">
          <label className="filter-label" htmlFor="screener-signal">Signal</label>
          <select id="screener-signal" className="filter-select" value={filters.signal} onChange={e => setFilters(f => ({...f, signal: e.target.value}))}>
            <option>All</option>
            <option>Bullish</option>
            <option>Bearish</option>
            <option>Neutral</option>
          </select>
        </div>
        <div className="filter-group" style={{display:'flex', alignItems:'flex-end', gap:8}}>
          <button className="btn btn-sm btn-secondary" onClick={() => setFilters({sector:'All',minYield:0,maxDelta:0.35,minScore:0,signal:'All',search:'',sortBy:'wheelScore',sortDir:'desc'})}>
            Reset
          </button>
          <button className="btn btn-sm btn-secondary" onClick={() => onExport && onExport(filteredStocks)} style={{fontSize:11}}>
            📥 CSV
          </button>
        </div>
      </div>

      <div style={{marginBottom:'16px', fontSize:'13px', color:'var(--text-muted)'}}>
        Showing {filteredStocks.length} of {stocks.length} stocks
      </div>

      <div className="data-table-container">
        {layout === 'cards' ? (
          <div className="stock-card-list responsive-layout-fade" key="scr-cards">
            {filteredStocks.length === 0 ? (
              <div style={{padding:'40px 20px', color:'var(--text-muted)', fontSize:'14px', textAlign:'center'}}>
                No stocks match your filters. Try adjusting the search term or filter values above.
              </div>
            ) : filteredStocks.map(stock => {
              const highConc = isHighConcentration(stock);
              const pct = Math.round(getConcentrationPct(stock));
              const tierLabel = CAPITAL_TIERS[capitalTier]?.label?.split(' (')[0] || '';
              return (
                <div key={stock.symbol} style={{position:'relative'}}>
                  {highConc && (
                    <div style={{
                      display:'flex', alignItems:'center', gap:6,
                      padding:'6px 10px', marginBottom:6,
                      background:'rgba(245,158,11,0.1)',
                      border:'1px solid rgba(245,158,11,0.3)',
                      borderRadius:'var(--radius-sm)',
                      boxShadow:'0 0 8px var(--accent-amber-glow, rgba(245,158,11,0.15))',
                      fontSize:'11px', color:'var(--accent-amber)', fontWeight:600
                    }}>
                      <span>⚠</span>
                      <span>Uses ~{pct}% of your {tierLabel} capital — consider position size</span>
                    </div>
                  )}
                  <StockCard stock={stock} onClick={onSelectStock} />
                </div>
              );
            })}
          </div>
        ) : (
        <div className="split-table-wrapper">
          {/* FIXED: Symbol column */}
          <div className="split-table-fixed" ref={scrSplit.fixedRef}>
            <table className="data-table">
              <thead>
                <tr>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('symbol')}>Symbol <SortIcon field="symbol"/></th>
                </tr>
              </thead>
              <tbody>
                {filteredStocks.length === 0 && (
                  <tr><td style={{padding:'40px 20px', color:'var(--text-muted)', fontSize:'14px', whiteSpace:'normal'}}>No match</td></tr>
                )}
                {filteredStocks.map((stock, i) => {
                  const highConc = isHighConcentration(stock);
                  return (
                  <tr key={stock.symbol} style={{cursor:'pointer', background: highConc ? 'rgba(245,158,11,0.06)' : 'transparent', borderLeft: highConc ? '2px solid var(--accent-amber)' : undefined}} onClick={() => onSelectStock && onSelectStock(stock)}>
                    <td style={{background: highConc ? 'rgba(245,158,11,0.08)' : undefined}}>
                      {highConc && <span title={`Uses ~${Math.round(getConcentrationPct(stock))}% of your ${CAPITAL_TIERS[capitalTier]?.label || ''} capital`} style={{color:'var(--accent-amber)', marginRight:4}}>⚠</span>}
                      <span className="ticker">{stock.symbol}</span>
                    </td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {/* SCROLLABLE: all other columns */}
          <div className="split-table-scroll" ref={scrSplit.scrollRef}>
            <table className="data-table">
              <thead>
                <tr>
                  <th scope="col">Name</th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('price')}>Price <SortIcon field="price"/></th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('wheelScore')}>Score <SortIcon field="wheelScore"/></th>
                  <th scope="col">Recommendation</th>
                  <th scope="col">Strike</th>
                  <th scope="col">Exp Date</th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('weeklyYield')}>Wk Yield <SortIcon field="weeklyYield"/></th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('annualizedYield')}>Ann Yield <SortIcon field="annualizedYield"/></th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('delta')}>Delta <SortIcon field="delta"/></th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('rsi')}>RSI <SortIcon field="rsi"/></th>
                  <th scope="col">MACD</th>
                  <th scope="col">BB %B</th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('iv')}>IV <SortIcon field="iv"/></th>
                  <th scope="col" style={{cursor:'pointer'}} onClick={() => handleSort('optionVolume')}>Opt Vol <SortIcon field="optionVolume"/></th>
                  <th scope="col">Earnings</th>
                  <th scope="col">Trend</th>
                </tr>
              </thead>
              <tbody>
                {filteredStocks.length === 0 && (
                  <tr>
                    <td colSpan={16} style={{textAlign:'center', padding:'40px 20px', color:'var(--text-muted)', fontSize:'14px'}}>
                      No stocks match your filters. Try adjusting the search term or filter values above.
                    </td>
                  </tr>
                )}
                {filteredStocks.map((stock, i) => {
                  const highConc = isHighConcentration(stock);
                  return (
                  <tr key={stock.symbol} style={{cursor:'pointer', background: highConc ? 'rgba(245,158,11,0.06)' : 'transparent'}} onClick={() => onSelectStock && onSelectStock(stock)}>
                    <td style={{fontSize:'12px', color:'var(--text-secondary)', maxWidth:140, overflow:'hidden', textOverflow:'ellipsis'}}>{stock.name}</td>
                    <td>
                      <span style={{fontFamily:'var(--font-mono)', fontWeight:600}}>${stock.price.toFixed(2)}</span>
                      <span style={{fontSize:'11px', marginLeft:4, color: stock.change >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                        {stock.change >= 0 ? '+' : ''}{stock.changePct}%
                      </span>
                    </td>
                    <td>
                      <Tip text={TipText.score(stock)}>
                      <span className={`score-badge ${stock.wheelScore >= 75 ? 'score-high' : stock.wheelScore >= 50 ? 'score-mid' : 'score-low'}`}>
                        {stock.wheelScore}
                      </span>
                      </Tip>
                    </td>
                    <td>
                      <Tip text={TipText.action(stock)}>
                      <span className={`signal-badge signal-${stock.recommendation.color === 'green' ? 'bullish' : stock.recommendation.color === 'amber' ? 'neutral' : 'bearish'}`} style={{fontSize:'11px'}}>
                        {stock.recommendation.label}
                      </span>
                      </Tip>
                    </td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>${stock.strikePrice.toFixed(2)}</td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>{stock.expDateStr || `${stock.daysToExpiry}d`}</td>
                    <td><Tip text={TipText.yield(stock)}><span style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-blue)'}}>{(stock.weeklyYield * 100).toFixed(2)}%</span></Tip></td>
                    <td><Tip text={TipText.annYield(stock)}><span style={{fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--accent-green)'}}>{stock.annualizedYield}%</span></Tip></td>
                    <td><Tip text={TipText.delta(stock)}><span className={`indicator-pill ${stock.delta <= 0.20 ? 'pill-green' : stock.delta <= 0.28 ? 'pill-amber' : 'pill-red'}`}>{stock.delta.toFixed(2)}</span></Tip></td>
                    <td><Tip text={TipText.rsi(stock)}><span className={`indicator-pill ${stock.rsi < 35 ? 'pill-green' : stock.rsi > 65 ? 'pill-red' : 'pill-amber'}`}>{stock.rsi}</span></Tip></td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'11px', color: stock.macd && stock.macd.histogram > 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                      {stock.macd ? (stock.macd.histogram > 0 ? '↑' : '↓') + ' ' + Math.abs(stock.macd.histogram).toFixed(2) : '—'}
                    </td>
                    <td>
                      {stock.bb ? (
                        <span className={`indicator-pill ${stock.bb.percentB < 0.3 ? 'pill-green' : stock.bb.percentB > 0.7 ? 'pill-red' : 'pill-amber'}`}>
                          {(stock.bb.percentB * 100).toFixed(0)}%
                        </span>
                      ) : '—'}
                    </td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>{stock.iv}%</td>
                    <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>{stock.optionVolume.toLocaleString()}</td>
                    <td>
                      <Tip text={TipText.earnings(stock)}>
                      <span className={`indicator-pill ${stock.earningsConfirmed === false ? 'pill-amber' : stock.earningsIn == null ? 'pill-green' : stock.earningsIn <= 7 ? 'pill-red' : stock.earningsIn <= 14 ? 'pill-amber' : 'pill-green'}`}>
                        {stock.earningsConfirmed === false ? '~' : ''}{stock.earningsIn == null && !stock.earningsDateStr ? '—' : (stock.earningsDateStr || (stock.earningsIn + 'd'))}
                      </span>
                      </Tip>
                    </td>
                    <td><Sparkline data={stock.closes.slice(-15)} width={60} height={24} color={stock.technicalSignal > 0 ? '#10b981' : '#ef4444'} /></td>
                  </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
        )}
      </div>
    </div>
  );
}

// ===== SETTINGS PAGE =====
// ===== PORTFOLIO PAGE =====
function PortfolioPage({ stocks }) {
  const [positions, setPositions] = useState(() => Storage.get('positions', []));
  const [showAdd, setShowAdd] = useState(false);
  const [newPos, setNewPos] = useState({
    symbol: '', strike: '', premium: '', contracts: 1, expDate: '', type: 'CSP',
    isAssigned: false, assignedDate: new Date().toISOString().slice(0,10), shares: '', assignmentCostBasis: '',
  });
  const [ccPosition, setCcPosition] = useState(null);
  const [assigningId, setAssigningId] = useState(null);
  const [assignData, setAssignData] = useState({ assignedDate: new Date().toISOString().slice(0,10), shares: '', costBasis: '' });

  useEffect(() => { Storage.set('positions', positions); }, [positions]);

  const addPosition = () => {
    if (!newPos.symbol || !newPos.strike || !newPos.premium) return;
    const stock = stocks.find(s => s.symbol.toUpperCase() === newPos.symbol.toUpperCase());
    const autoCB = (+newPos.strike - +newPos.premium).toFixed(2);
    const isAssigned = newPos.isAssigned && newPos.type === 'CSP';
    setPositions(prev => [...prev, {
      id: Date.now(),
      symbol: newPos.symbol.toUpperCase(),
      type: newPos.type,
      strike: +newPos.strike,
      premium: +newPos.premium,
      contracts: +newPos.contracts || 1,
      expDate: newPos.expDate,
      openedAt: new Date().toISOString().slice(0,10),
      currentPrice: stock?.price || 0,
      wheelStage: newPos.type === 'CC' ? 'selling_calls' : (isAssigned ? 'assigned' : 'selling_puts'),
      isAssigned,
      assignedDate: isAssigned ? newPos.assignedDate : null,
      shares: isAssigned ? +(newPos.shares || +newPos.contracts * 100) : null,
      assignmentCostBasis: isAssigned ? +(newPos.assignmentCostBasis || autoCB) : null,
    }]);
    setNewPos({ symbol:'', strike:'', premium:'', contracts:1, expDate:'', type:'CSP', isAssigned:false, assignedDate:new Date().toISOString().slice(0,10), shares:'', assignmentCostBasis:'' });
    setShowAdd(false);
  };

  const removePosition = (id) => setPositions(prev => prev.filter(p => p.id !== id));

  const markAssigned = (id) => {
    const pos = positions.find(p => p.id === id);
    if (!pos) return;
    const cb = +(assignData.costBasis || (pos.strike - pos.premium).toFixed(2));
    setPositions(prev => prev.map(p => p.id !== id ? p : {
      ...p, isAssigned: true, wheelStage: 'assigned',
      assignedDate: assignData.assignedDate || new Date().toISOString().slice(0,10),
      shares: +(assignData.shares || p.contracts * 100),
      assignmentCostBasis: cb,
    }));
    setAssigningId(null);
    setAssignData({ assignedDate: new Date().toISOString().slice(0,10), shares: '', costBasis: '' });
  };

  const markSellingCalls = (id) =>
    setPositions(prev => prev.map(p => p.id !== id ? p : { ...p, wheelStage: 'selling_calls' }));

  const markCalledAway = (id) =>
    setPositions(prev => prev.map(p => p.id !== id ? p : {
      ...p, wheelStage: 'called_away', calledAwayDate: new Date().toISOString().slice(0,10),
    }));

  // Enrich positions with live data + wheel-stage derived fields
  const enriched = positions.map(p => {
    const stock = stocks.find(s => s.symbol === p.symbol);
    const currentPrice = stock?.price || p.currentPrice || 0;
    const cashLocked = p.strike * 100 * p.contracts;
    const premiumCollected = p.premium * 100 * p.contracts;
    const maxLoss = (p.strike - p.premium) * 100 * p.contracts;
    const isITM = p.type === 'CSP' ? currentPrice < p.strike : currentPrice > p.strike;
    const daysLeft = p.expDate ? Math.max(0, Math.ceil((new Date(p.expDate) - new Date()) / 86400000)) : null;
    const costBasis = p.assignmentCostBasis || (p.strike - p.premium);
    const wheelStage = p.wheelStage || (p.type === 'CC' ? 'selling_calls' : 'selling_puts');
    const isAssigned = p.isAssigned || wheelStage === 'assigned' || wheelStage === 'selling_calls' || wheelStage === 'called_away';
    const shares = p.shares || p.contracts * 100;
    const unrealized = isAssigned ? (currentPrice - costBasis) * shares : null;
    return { ...p, currentPrice, cashLocked, premiumCollected, maxLoss, isITM, daysLeft, costBasis, stock, wheelStage, isAssigned, shares, unrealized };
  });

  const totalCashLocked = enriched.filter(p => !p.isAssigned).reduce((s, p) => s + p.cashLocked, 0);
  const totalPremium = enriched.reduce((s, p) => s + p.premiumCollected, 0);
  const itmCount = enriched.filter(p => p.isITM && p.wheelStage === 'selling_puts').length;
  const assignedCount = enriched.filter(p => p.isAssigned && p.wheelStage !== 'called_away').length;
  const cycleCount = enriched.filter(p => p.wheelStage === 'called_away').length;

  const sectorMap = {};
  enriched.filter(p => !p.isAssigned).forEach(p => {
    const sec = p.stock?.sector || 'Unknown';
    sectorMap[sec] = (sectorMap[sec] || 0) + p.cashLocked;
  });
  const sectors = Object.entries(sectorMap).sort((a, b) => b[1] - a[1]);

  const iStyle = { background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', fontSize:'13px' };

  return (
    <div>
      {/* ── Summary ── */}
      <div className="stats-grid">
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-blue)'}}>
          <div className="stat-label">Open Positions</div>
          <div className="stat-value">{enriched.filter(p => p.wheelStage !== 'called_away').length}</div>
          <div className="stat-change" style={{color: itmCount > 0 ? 'var(--accent-red)' : 'var(--accent-green)', background: itmCount > 0 ? 'rgba(239,68,68,0.1)' : 'rgba(16,185,129,0.1)'}}>
            {itmCount > 0 ? `${itmCount} ITM ⚠` : 'All OTM ✓'}
          </div>
        </div>
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-amber)'}}>
          <div className="stat-label">Assigned (Own Shares)</div>
          <div className="stat-value" style={{color:'var(--accent-amber)'}}>{assignedCount}</div>
          <div className="stat-change" style={{color: assignedCount > 0 ? 'var(--accent-gold)' : 'var(--text-muted)', background:'none'}}>
            {assignedCount > 0 ? 'Sell covered calls →' : 'No active assignments'}
          </div>
        </div>
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-green)'}}>
          <div className="stat-label">Premium Collected</div>
          <div className="stat-value" style={{color:'var(--accent-green)'}}>${totalPremium.toLocaleString()}</div>
          <div className="stat-change positive">
            {totalCashLocked > 0 ? ((totalPremium / totalCashLocked) * 100).toFixed(2) : '—'}% ROC
          </div>
        </div>
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-green)'}}>
          <div className="stat-label">Completed Cycles</div>
          <div className="stat-value" style={{color:'var(--accent-green)'}}>{cycleCount}</div>
          <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>Full wheel cycles completed</div>
        </div>
      </div>

      {/* ── Sector Concentration ── */}
      {sectors.length > 0 && (
        <div className="data-table-container" style={{marginBottom:24}}>
          <div className="data-table-header">
            <h3>Sector Concentration</h3>
            <span style={{fontSize:'12px', color:'var(--text-muted)'}}>Diversification across {sectors.length} sector{sectors.length !== 1 ? 's' : ''}</span>
          </div>
          <div style={{padding:'16px 20px', display:'flex', flexWrap:'wrap', gap:'12px'}}>
            {sectors.map(([sector, amount]) => {
              const pct = totalCashLocked > 0 ? (amount / totalCashLocked * 100) : 0;
              const heavy = pct > 40;
              return (
                <div key={sector} style={{background:'var(--bg-elevated)', borderRadius:'var(--radius-md)', padding:'12px 16px', minWidth:180, border: heavy ? '1px solid rgba(239,68,68,0.3)' : '1px solid var(--border)'}}>
                  <div style={{fontSize:'12px', color:'var(--text-muted)', marginBottom:4}}>{sector}</div>
                  <div style={{display:'flex', alignItems:'baseline', gap:8}}>
                    <span style={{fontFamily:'var(--font-mono)', fontWeight:700, fontSize:'16px'}}>${amount.toLocaleString()}</span>
                    <span style={{fontFamily:'var(--font-mono)', fontSize:'12px', color: heavy ? 'var(--accent-red)' : 'var(--accent-green)'}}>
                      {pct.toFixed(0)}% {heavy ? '⚠ Heavy' : ''}
                    </span>
                  </div>
                  <div style={{width:'100%', height:4, background:'var(--bg-primary)', borderRadius:2, marginTop:8, overflow:'hidden'}}>
                    <div style={{width:`${Math.min(pct,100)}%`, height:'100%', background: heavy ? 'var(--accent-red)' : 'var(--accent-blue)', borderRadius:2}}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Positions Table ── */}
      <div className="data-table-container">
        <div className="data-table-header">
          <h3>Wheel Positions</h3>
          <button className="btn btn-sm btn-primary" onClick={() => setShowAdd(v => !v)}>+ Add Position</button>
        </div>

        {/* Add Position Form */}
        {showAdd && (
          <div style={{padding:'20px', background:'var(--bg-elevated)', borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex', flexWrap:'wrap', gap:'10px', alignItems:'flex-end'}}>
              <div>
                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Symbol</div>
                <input aria-label="Position symbol" style={{...iStyle, width:82}} value={newPos.symbol} onChange={e => setNewPos(p => ({...p, symbol:e.target.value.toUpperCase()}))} placeholder="AAPL" />
              </div>
              <div>
                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Type</div>
                <select aria-label="Position type" style={{...iStyle}} value={newPos.type} onChange={e => setNewPos(p => ({...p, type:e.target.value, isAssigned:false}))}>
                  <option value="CSP">Cash-Secured Put</option>
                  <option value="CC">Covered Call</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Strike $</div>
                <input aria-label="Strike price in dollars" type="number" style={{...iStyle, width:90}} value={newPos.strike} onChange={e => setNewPos(p => ({...p, strike:e.target.value}))} placeholder="150.00" />
              </div>
              <div>
                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Premium $</div>
                <input aria-label="Premium in dollars" type="number" style={{...iStyle, width:80}} value={newPos.premium} onChange={e => setNewPos(p => ({...p, premium:e.target.value}))} placeholder="2.50" />
              </div>
              <div>
                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Contracts</div>
                <input aria-label="Number of contracts" type="number" style={{...iStyle, width:64}} value={newPos.contracts} onChange={e => setNewPos(p => ({...p, contracts:e.target.value}))} min="1" />
              </div>
              <div>
                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Exp Date</div>
                <input aria-label="Expiration date" type="date" style={{...iStyle}} value={newPos.expDate} onChange={e => setNewPos(p => ({...p, expDate:e.target.value}))} />
              </div>
              {newPos.type === 'CSP' && (
                <label style={{display:'flex', alignItems:'center', gap:6, paddingBottom:2, cursor:'pointer'}}>
                  <input type="checkbox" checked={newPos.isAssigned} onChange={e => setNewPos(p => ({...p, isAssigned:e.target.checked}))} style={{accentColor:'var(--accent-gold)', cursor:'pointer'}} />
                  <span style={{fontSize:'12px', color:'var(--accent-amber)', fontWeight:600}}>Mark as Assigned</span>
                </label>
              )}
              <button className="btn btn-sm btn-primary" onClick={addPosition}>Save</button>
              <button className="btn btn-sm btn-secondary" onClick={() => setShowAdd(false)}>Cancel</button>
            </div>
            {/* Assignment sub-fields */}
            {newPos.isAssigned && newPos.type === 'CSP' && (
              <div style={{display:'flex', flexWrap:'wrap', gap:10, marginTop:12, padding:'14px 16px', background:'rgba(212,168,67,0.07)', borderRadius:'var(--radius-md)', border:'1px solid rgba(212,168,67,0.22)'}}>
                <div style={{fontSize:'12px', color:'var(--accent-amber)', fontWeight:700, width:'100%', marginBottom:2}}>Assignment Details</div>
                <div>
                  <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Assignment Date</div>
                  <input aria-label="Assignment date" type="date" style={{...iStyle}} value={newPos.assignedDate} onChange={e => setNewPos(p => ({...p, assignedDate:e.target.value}))} />
                </div>
                <div>
                  <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Shares</div>
                  <input aria-label="Number of shares" type="number" style={{...iStyle, width:90}} placeholder={newPos.contracts * 100} value={newPos.shares} onChange={e => setNewPos(p => ({...p, shares:e.target.value}))} />
                </div>
                <div>
                  <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Cost Basis $/sh <span style={{color:'var(--accent-gold)'}}>↳ auto: ${(+newPos.strike - +newPos.premium || 0).toFixed(2)}</span></div>
                  <input aria-label="Cost basis per share" type="number" style={{...iStyle, width:110}} placeholder={(+newPos.strike - +newPos.premium || 0).toFixed(2)} value={newPos.assignmentCostBasis} onChange={e => setNewPos(p => ({...p, assignmentCostBasis:e.target.value}))} />
                </div>
              </div>
            )}
          </div>
        )}

        {enriched.length === 0 ? (
          <div style={{padding:'48px 20px', textAlign:'center', color:'var(--text-muted)'}}>
            <div style={{fontSize:'16px', marginBottom:12}}>No positions yet</div>
            <p>Click <strong>+ Add Position</strong> to start tracking your wheel trades.</p>
            <p style={{fontSize:'12px', marginTop:8}}>Positions save locally and sync with live prices.</p>
          </div>
        ) : (
          <div className="table-scroll">
            <table className="data-table">
              <thead>
                <tr>
                  <th scope="col">Symbol</th>
                  <th scope="col">Wheel Stage</th>
                  <th scope="col">Type</th>
                  <th scope="col">Price</th>
                  <th scope="col">Strike</th>
                  <th scope="col">Status</th>
                  <th scope="col">Cost Basis (DCA)</th>
                  <th scope="col">Premium</th>
                  <th scope="col">Cash / Shares</th>
                  <th scope="col">Share P/L</th>
                  <th scope="col">Days Left</th>
                  <th scope="col">Opened</th>
                  <th scope="col">Actions</th>
                  <th scope="col"></th>
                </tr>
              </thead>
              <tbody>
                {enriched.map(p => {
                  const si = CoveredCallHelper.getStageInfo(p.wheelStage);
                  const isCalledAway = p.wheelStage === 'called_away';
                  const isAssigning = assigningId === p.id;
                  const borderColor = isCalledAway ? 'var(--accent-green)' : p.isAssigned ? 'var(--accent-amber)' : p.isITM ? 'var(--accent-red)' : 'var(--accent-green)';
                  return (
                    <React.Fragment key={p.id}>
                      <tr style={{borderLeft:`3px solid ${borderColor}`, opacity: isCalledAway ? 0.75 : 1}}>

                        <td>
                          <span className="ticker">{p.symbol}</span>
                          {p.assignedDate && <div style={{fontSize:'10px', color:'var(--text-muted)', marginTop:1}}>assigned {p.assignedDate}</div>}
                        </td>

                        <td><span className={`wheel-stage-badge ${si.cls}`}>{si.icon} {si.label}</span></td>

                        <td>
                          <span style={{fontSize:'11px', padding:'2px 8px', borderRadius:'10px',
                            background: p.type==='CSP' ? 'rgba(59,130,246,0.1)' : 'rgba(139,92,246,0.1)',
                            color: p.type==='CSP' ? 'var(--accent-blue)' : 'var(--accent-purple)'}}>
                            {p.type==='CSP' ? 'Put' : 'Call'}
                          </span>
                        </td>

                        <td style={{fontFamily:'var(--font-mono)', fontWeight:600}}>${p.currentPrice.toFixed(2)}</td>
                        <td style={{fontFamily:'var(--font-mono)'}}>${p.strike.toFixed(2)}</td>

                        <td>
                          {isCalledAway ? (
                            <span style={{fontSize:'11px', padding:'2px 8px', borderRadius:'10px', fontWeight:600, background:'rgba(34,197,94,0.12)', color:'var(--accent-green)'}}>✓ Called Away</span>
                          ) : p.isAssigned ? (
                            <span style={{fontSize:'11px', padding:'2px 8px', borderRadius:'10px', fontWeight:600, background:'rgba(212,168,67,0.12)', color:'var(--accent-amber)'}}>⬛ Shares Owned</span>
                          ) : (
                            <span style={{fontSize:'11px', padding:'2px 8px', borderRadius:'10px', fontWeight:600,
                              background: p.isITM ? 'rgba(239,68,68,0.15)' : 'rgba(16,185,129,0.15)',
                              color: p.isITM ? 'var(--accent-red)' : 'var(--accent-green)'}}>
                              {p.isITM ? '⚠ ITM' : '✓ OTM'}
                            </span>
                          )}
                        </td>

                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>
                          ${p.costBasis.toFixed(2)}/sh
                          {p.isAssigned && (
                            <div style={{fontSize:'10px', color: p.currentPrice >= p.costBasis ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                              {p.currentPrice >= p.costBasis ? '+' : ''}{(((p.currentPrice - p.costBasis) / p.costBasis) * 100).toFixed(1)}%
                            </div>
                          )}
                        </td>

                        <td style={{fontFamily:'var(--font-mono)', color:'var(--accent-green)'}}>
                          ${p.premiumCollected.toLocaleString()}
                          <span style={{fontSize:'10px', color:'var(--text-muted)'}}> ({p.contracts}×)</span>
                        </td>

                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>
                          {p.isAssigned
                            ? <span style={{color:'var(--accent-amber)'}}>{p.shares} sh</span>
                            : <span>${p.cashLocked.toLocaleString()}</span>}
                        </td>

                        <td style={{fontFamily:'var(--font-mono)', fontSize:'12px'}}>
                          {p.unrealized !== null ? (
                            <span style={{color: p.unrealized >= 0 ? 'var(--accent-green)' : 'var(--accent-red)', fontWeight:600}}>
                              {p.unrealized >= 0 ? '+' : ''}${Math.abs(p.unrealized).toFixed(0)}
                            </span>
                          ) : <span style={{color:'var(--text-muted)'}}>—</span>}
                        </td>

                        <td>
                          {p.daysLeft !== null
                            ? <span style={{fontFamily:'var(--font-mono)', fontWeight:600, color: p.daysLeft <= 3 ? 'var(--accent-amber)' : 'var(--text-secondary)'}}>{p.daysLeft}d</span>
                            : '—'}
                        </td>

                        <td style={{fontFamily:'var(--font-mono)', fontSize:'11px', color:'var(--text-muted)'}}>{p.openedAt}</td>

                        {/* Actions */}
                        <td>
                          <div style={{display:'flex', gap:5, flexWrap:'nowrap'}}>
                            {/* Mark Assigned — CSP positions not yet assigned */}
                            {p.type === 'CSP' && !p.isAssigned && !isCalledAway && (
                              <button
                                className="btn btn-sm btn-secondary"
                                style={{fontSize:'10px', padding:'3px 8px', borderColor:'rgba(212,168,67,0.3)', color:'var(--accent-amber)', whiteSpace:'nowrap'}}
                                onClick={() => {
                                  setAssigningId(p.id);
                                  setAssignData({ assignedDate: new Date().toISOString().slice(0,10), shares: p.contracts * 100, costBasis: (p.strike - p.premium).toFixed(2) });
                                }}>
                                Mark Assigned
                              </button>
                            )}
                            {/* Sell Covered Call — gold button on assigned positions */}
                            {p.isAssigned && !isCalledAway && (
                              <button
                                className="btn btn-sm btn-gold"
                                style={{fontSize:'10px', padding:'3px 10px', whiteSpace:'nowrap'}}
                                onClick={() => setCcPosition(p)}>
                                Sell Covered Call
                              </button>
                            )}
                            {/* Mark Called Away — on selling_calls positions */}
                            {p.wheelStage === 'selling_calls' && (
                              <button
                                className="btn btn-sm btn-secondary"
                                style={{fontSize:'10px', padding:'3px 8px', borderColor:'rgba(34,197,94,0.3)', color:'var(--accent-green)', whiteSpace:'nowrap'}}
                                onClick={() => markCalledAway(p.id)}>
                                Called Away
                              </button>
                            )}
                          </div>
                        </td>

                        <td>
                          <button onClick={() => removePosition(p.id)}
                            aria-label={`Remove ${p.symbol} position`}
                            style={{background:'none', border:'none', cursor:'pointer', color:'var(--accent-red)', fontSize:'14px', padding:'4px'}} title="Remove">✕</button>
                        </td>
                      </tr>

                      {/* ── Inline assign form ── */}
                      {isAssigning && (
                        <tr>
                          <td colSpan={14} style={{padding:0}}>
                            <div style={{padding:'14px 20px', background:'rgba(212,168,67,0.06)', borderBottom:'1px solid rgba(212,168,67,0.2)', display:'flex', flexWrap:'wrap', gap:10, alignItems:'flex-end'}}>
                              <div style={{fontSize:'12px', color:'var(--accent-amber)', fontWeight:700, width:'100%', marginBottom:2}}>
                                ⬛ Mark {p.symbol} as Assigned — Confirm Details
                              </div>
                              <div>
                                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Assignment Date</div>
                                <input aria-label="Assignment date" type="date" style={{...iStyle}} value={assignData.assignedDate} onChange={e => setAssignData(d => ({...d, assignedDate:e.target.value}))} />
                              </div>
                              <div>
                                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Shares</div>
                                <input aria-label="Number of shares" type="number" style={{...iStyle, width:90}} value={assignData.shares} onChange={e => setAssignData(d => ({...d, shares:e.target.value}))} placeholder={p.contracts * 100} />
                              </div>
                              <div>
                                <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>
                                  Cost Basis $/sh <span style={{color:'var(--accent-gold)'}}>↳ ${(p.strike - p.premium).toFixed(2)} auto</span>
                                </div>
                                <input aria-label="Cost basis per share" type="number" style={{...iStyle, width:110}} value={assignData.costBasis} onChange={e => setAssignData(d => ({...d, costBasis:e.target.value}))} placeholder={(p.strike - p.premium).toFixed(2)} />
                              </div>
                              <button className="btn btn-sm btn-gold" onClick={() => markAssigned(p.id)} style={{fontSize:'11px'}}>Confirm Assignment</button>
                              <button className="btn btn-sm btn-secondary" onClick={() => setAssigningId(null)} style={{fontSize:'11px'}}>Cancel</button>
                            </div>
                          </td>
                        </tr>
                      )}

                      {/* ── Called Away P&L row ── */}
                      {isCalledAway && (
                        <tr>
                          <td colSpan={14} style={{padding:0}}>
                            <div style={{padding:'10px 20px', background:'rgba(34,197,94,0.04)', borderBottom:'1px solid rgba(34,197,94,0.12)', fontSize:'12px', color:'var(--text-secondary)', display:'flex', gap:20, flexWrap:'wrap', alignItems:'center'}}>
                              <span style={{color:'var(--accent-green)', fontWeight:700, fontSize:'13px'}}>✓ Wheel Cycle Complete</span>
                              <span>Called away at <strong>${p.strike.toFixed(2)}</strong> · cost basis <strong>${p.costBasis.toFixed(2)}</strong>/sh</span>
                              <span>Capital {(p.strike - p.costBasis) >= 0 ? 'gain' : 'loss'}: <strong style={{color:(p.strike - p.costBasis) >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>
                                {(p.strike - p.costBasis) >= 0 ? '+' : ''}${((p.strike - p.costBasis) * p.shares).toFixed(0)}
                              </strong></span>
                              <span>Premium earned: <strong style={{color:'var(--accent-green)'}}>+${p.premiumCollected.toLocaleString()}</strong></span>
                              <span>Total: <strong style={{color:'var(--accent-gold)', fontSize:'14px'}}>
                                +${(((p.strike - p.costBasis) * p.shares) + p.premiumCollected).toFixed(0)}
                              </strong></span>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* ── Covered Call Modal ── */}
      {ccPosition && (
        <CoveredCallModal
          position={ccPosition}
          stock={stocks.find(s => s.symbol === ccPosition.symbol)}
          onClose={() => setCcPosition(null)}
          onMarkSelling={() => { markSellingCalls(ccPosition.id); setCcPosition(null); }}
        />
      )}
    </div>
  );
}

// ===== TRADE JOURNAL PAGE =====
function TradeJournalPage({ user, subscriptionTier }) {
  const [trades, setTrades] = useState(() => Storage.get('journal', []));
  const [showAdd, setShowAdd] = useState(false);
  const [newTrade, setNewTrade] = useState({ symbol: '', type: 'CSP', strike: '', premium: '', contracts: 1, openDate: '', closeDate: '', outcome: 'expired', pnl: '' });

  useEffect(() => { Storage.set('journal', trades); }, [trades]);

  const addTrade = () => {
    if (!newTrade.symbol || !newTrade.strike || !newTrade.pnl) return;
    setTrades(prev => [{
      id: Date.now(),
      symbol: newTrade.symbol.toUpperCase(),
      type: newTrade.type,
      strike: +newTrade.strike,
      premium: +newTrade.premium || 0,
      contracts: +newTrade.contracts || 1,
      openDate: newTrade.openDate || new Date().toISOString().slice(0, 10),
      closeDate: newTrade.closeDate || new Date().toISOString().slice(0, 10),
      outcome: newTrade.outcome,
      pnl: +newTrade.pnl,
    }, ...prev]);
    setNewTrade({ symbol: '', type: 'CSP', strike: '', premium: '', contracts: 1, openDate: '', closeDate: '', outcome: 'expired', pnl: '' });
    setShowAdd(false);
  };

  const removeTrade = (id) => setTrades(prev => prev.filter(t => t.id !== id));

  // Aggregates
  const totalTrades = trades.length;
  const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  const winRate = totalTrades > 0 ? Math.round((wins / totalTrades) * 100) : 0;
  const avgReturn = totalTrades > 0 ? (totalPnl / totalTrades).toFixed(0) : 0;
  const bestTrade = trades.length > 0 ? trades.reduce((best, t) => t.pnl > best.pnl ? t : best, trades[0]) : null;
  const worstTrade = trades.length > 0 ? trades.reduce((worst, t) => t.pnl < worst.pnl ? t : worst, trades[0]) : null;

  // Check tier access
  const tierLimits = CONFIG.TIER_LIMITS[subscriptionTier || 'free'];
  if (!tierLimits.journal && !user?.isOwner) {
    return (
      <div className="loading-state" style={{gap:20}}>
        <div style={{width:48,height:48,borderRadius:'50%',background:'var(--accent-gold-glow, rgba(201,168,76,0.12))',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-gold, #c9a84c)" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
        <h3 style={{color:'var(--text-primary)', margin:0}}>Trade Journal</h3>
        <p style={{maxWidth:400, textAlign:'center', lineHeight:1.7}}>Track your completed trades, measure win rate, and see your actual P&L over time. Available on Pro and Elite plans.</p>
        <button className="btn btn-primary" style={{marginTop:8}}>Upgrade to Pro — $79/mo</button>
      </div>
    );
  }

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-blue)'}}>
          <div className="stat-label">Total Trades</div>
          <div className="stat-value">{totalTrades}</div>
          <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>All-time logged</div>
        </div>
        <div className="stat-card" style={{borderLeft:'3px solid var(--accent-green)'}}>
          <div className="stat-label">Win Rate</div>
          <div className="stat-value" style={{color: winRate >= 70 ? 'var(--accent-green)' : winRate >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)'}}>{winRate}%</div>
          <div className="stat-change positive">{wins} of {totalTrades} profitable</div>
        </div>
        <div className="stat-card" style={{borderLeft: totalPnl >= 0 ? '3px solid var(--accent-green)' : '3px solid var(--accent-red)'}}>
          <div className="stat-label">Total P&L</div>
          <div className="stat-value" style={{color: totalPnl >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}}>{totalPnl >= 0 ? '+' : ''}${totalPnl.toLocaleString()}</div>
          <div className="stat-change" style={{color:'var(--text-muted)', background:'none'}}>Avg ${avgReturn}/trade</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Best / Worst</div>
          <div style={{display:'flex', gap:'8px', alignItems:'center', marginTop:8}}>
            {bestTrade && <span style={{fontFamily:'var(--font-mono)', fontSize:'13px', color:'var(--accent-green)'}}>+${bestTrade.pnl.toLocaleString()} {bestTrade.symbol}</span>}
            {worstTrade && worstTrade.pnl < 0 && <span style={{fontFamily:'var(--font-mono)', fontSize:'13px', color:'var(--accent-red)'}}>${worstTrade.pnl.toLocaleString()} {worstTrade.symbol}</span>}
            {!bestTrade && <span style={{color:'var(--text-muted)', fontSize:'13px'}}>No trades yet</span>}
          </div>
        </div>
      </div>

      <div className="data-table-container">
        <div className="data-table-header">
          <h3>Trade History</h3>
          <button className="btn btn-sm btn-primary" onClick={() => setShowAdd(true)}>+ Log Trade</button>
        </div>

        {showAdd && (
          <div style={{padding:'16px 20px', background:'var(--bg-elevated)', borderBottom:'1px solid var(--border)', display:'flex', flexWrap:'wrap', gap:'10px', alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Symbol</div>
              <input aria-label="Trade symbol" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', width:80, fontSize:'13px'}}
                value={newTrade.symbol} onChange={e => setNewTrade(t => ({...t, symbol: e.target.value.toUpperCase()}))} placeholder="AAPL" />
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Type</div>
              <select aria-label="Trade type" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontSize:'13px'}}
                value={newTrade.type} onChange={e => setNewTrade(t => ({...t, type: e.target.value}))}>
                <option value="CSP">Cash-Secured Put</option>
                <option value="CC">Covered Call</option>
              </select>
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Strike $</div>
              <input aria-label="Strike price in dollars" type="number" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', width:90, fontSize:'13px'}}
                value={newTrade.strike} onChange={e => setNewTrade(t => ({...t, strike: e.target.value}))} placeholder="150" />
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Premium $</div>
              <input aria-label="Premium in dollars" type="number" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', width:80, fontSize:'13px'}}
                value={newTrade.premium} onChange={e => setNewTrade(t => ({...t, premium: e.target.value}))} placeholder="2.50" />
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Contracts</div>
              <input aria-label="Number of contracts" type="number" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', width:60, fontSize:'13px'}}
                value={newTrade.contracts} onChange={e => setNewTrade(t => ({...t, contracts: e.target.value}))} min="1" />
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Outcome</div>
              <select aria-label="Trade outcome" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontSize:'13px'}}
                value={newTrade.outcome} onChange={e => setNewTrade(t => ({...t, outcome: e.target.value}))}>
                <option value="expired">Expired Worthless</option>
                <option value="assigned">Assigned</option>
                <option value="closed">Closed Early</option>
                <option value="rolled">Rolled</option>
              </select>
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>P&L $</div>
              <input aria-label="Profit or loss in dollars" type="number" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontFamily:'var(--font-mono)', width:90, fontSize:'13px'}}
                value={newTrade.pnl} onChange={e => setNewTrade(t => ({...t, pnl: e.target.value}))} placeholder="250" />
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Open Date</div>
              <input aria-label="Open date" type="date" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontSize:'13px'}}
                value={newTrade.openDate} onChange={e => setNewTrade(t => ({...t, openDate: e.target.value}))} />
            </div>
            <div>
              <div style={{fontSize:'11px', color:'var(--text-muted)', marginBottom:4}}>Close Date</div>
              <input aria-label="Close date" type="date" style={{background:'var(--bg-primary)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'6px 10px', color:'var(--text-primary)', fontSize:'13px'}}
                value={newTrade.closeDate} onChange={e => setNewTrade(t => ({...t, closeDate: e.target.value}))} />
            </div>
            <button className="btn btn-sm btn-primary" onClick={addTrade}>Save</button>
            <button className="btn btn-sm btn-secondary" onClick={() => setShowAdd(false)}>Cancel</button>
          </div>
        )}

function AdvancedGateThresholdsCard({ user }) {
  const [open, setOpen] = useState(false);
  const [vals, setVals] = useState(() => {
    try {
      const cached = localStorage.getItem('gateThresholds');
      if (cached) return { ...DEFAULT_GATE_THRESHOLDS, ...JSON.parse(cached) };
    } catch(e) {}
    return { ...DEFAULT_GATE_THRESHOLDS };
  });
  const [toast, setToast] = useState('');
  const [saving, setSaving] = useState(false);

  // Load from Firestore on mount (if logged in)
  useEffect(() => {
    let cancelled = false;
    async function load() {
      if (!user || !user.uid || typeof firebaseDb === 'undefined') return;
      try {
        const doc = await firebaseDb.collection('users').doc(user.uid)
          .collection('settings').doc('gateThresholds').get();
        if (cancelled) return;
        if (doc.exists) {
          const data = doc.data() || {};
          const next = { ...DEFAULT_GATE_THRESHOLDS };
          for (const k of Object.keys(DEFAULT_GATE_THRESHOLDS)) {
            if (typeof data[k] === 'number') next[k] = data[k];
          }
          setVals(next);
          setUserGateThresholds(next);
        }
      } catch (e) { console.warn('[gateThresholds] load failed', e); }
    }
    load();
    return () => { cancelled = true; };
  }, [user && user.uid]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 2500);
  };

  const updateVal = (key, v, min, max) => {
    let n = typeof v === 'string' ? parseFloat(v) : v;
    if (Number.isNaN(n)) return;
    if (typeof min === 'number') n = Math.max(min, n);
    if (typeof max === 'number') n = Math.min(max, n);
    setVals(prev => ({ ...prev, [key]: n }));
  };

  const resetOne = (key) => {
    setVals(prev => ({ ...prev, [key]: DEFAULT_GATE_THRESHOLDS[key] }));
  };

  const saveAll = async () => {
    setSaving(true);
    setUserGateThresholds(vals);
    try {
      if (user && user.uid && typeof firebaseDb !== 'undefined') {
        await firebaseDb.collection('users').doc(user.uid)
          .collection('settings').doc('gateThresholds')
          .set({ ...vals, updatedAt: new Date().toISOString() });
        try { window.dispatchEvent(new CustomEvent('rescore-stocks')); } catch(e) {}
        showToast('Settings saved. Recommendations updated.');
      } else {
        try { window.dispatchEvent(new CustomEvent('rescore-stocks')); } catch(e) {}
        showToast('Saved locally. Sign in to sync to cloud.');
      }
    } catch (e) {
      console.error('[gateThresholds] save failed', e);
      showToast('Save failed — cached locally.');
    } finally {
      setSaving(false);
    }
  };

  const resetAll = async () => {
    if (!window.confirm('Reset all gate thresholds to defaults? This overwrites your saved values.')) return;
    const defaults = { ...DEFAULT_GATE_THRESHOLDS };
    setVals(defaults);
    setUserGateThresholds(defaults);
    try {
      if (user && user.uid && typeof firebaseDb !== 'undefined') {
        await firebaseDb.collection('users').doc(user.uid)
          .collection('settings').doc('gateThresholds')
          .set({ ...defaults, updatedAt: new Date().toISOString() });
      }
      try { window.dispatchEvent(new CustomEvent('rescore-stocks')); } catch(e) {}
      showToast('Reset to defaults. Recommendations updated.');
    } catch (e) { showToast('Reset locally. Cloud sync failed.'); }
  };

  const renderRow = ({ key, label, desc, min, max, step, unit }) => (
    <div className="advanced-gates-row" key={key}>
      <div>
        <div className="label-main">{label}</div>
      </div>
      <input type="number" className="advanced-gates-input"
        min={min} max={max} step={step || 1}
        value={vals[key]}
        onChange={e => updateVal(key, e.target.value, min, max)} />
      <button className="advanced-gates-reset-link" onClick={() => resetOne(key)}
        title={`Reset to default (${DEFAULT_GATE_THRESHOLDS[key]}${unit || ''})`}>Reset</button>
      <div className="label-desc">{desc}</div>
    </div>
  );

  const renderDualRow = ({ keyHigh, keyMed, label, desc, min, max }) => (
    <div className="advanced-gates-row">
      <div>
        <div className="label-main">{label}</div>
      </div>
      <div className="advanced-gates-dual">
        <span className="dual-label">HIGH</span>
        <input type="number" className="advanced-gates-input" style={{width:64}}
          min={min} max={max} step={1}
          value={vals[keyHigh]}
          onChange={e => updateVal(keyHigh, e.target.value, min, max)} />
        <span className="dual-label">MED</span>
        <input type="number" className="advanced-gates-input" style={{width:64}}
          min={min} max={max} step={1}
          value={vals[keyMed]}
          onChange={e => updateVal(keyMed, e.target.value, min, max)} />
      </div>
      <button className="advanced-gates-reset-link"
        onClick={() => { resetOne(keyHigh); resetOne(keyMed); }}
        title={`Reset to defaults (${DEFAULT_GATE_THRESHOLDS[keyHigh]}% / ${DEFAULT_GATE_THRESHOLDS[keyMed]}%)`}>Reset</button>
      <div className="label-desc">{desc}</div>
    </div>
  );

  return (
    <div className="settings-card advanced-gates-card" style={{gridColumn:'1 / -1'}}>
      <div className="advanced-gates-header" onClick={() => setOpen(o => !o)}>
        <h3>Advanced — Gate Thresholds</h3>
        <span className={`advanced-gates-chevron ${open ? 'open' : ''}`}>▶</span>
      </div>
      {open && (
        <>
          <div className="advanced-gates-warning">
            ⚠ These settings affect which trades pass WheelPro's safety gates. Only adjust if you understand the implications. Each option has a plain-English description below.
          </div>
          {toast && <div className="advanced-gates-toast">{toast}</div>}

          {renderRow({
            key: 'rsiDailyMax', label: 'Daily RSI Maximum',
            desc: "Stocks with a daily RSI above this value are flagged as overbought and may fail Gate 1. Lower this number for a more conservative approach (fewer trades pass). Raise it to allow more aggressive setups through. Most experienced traders use 70-80.",
            min: 50, max: 95,
          })}
          {renderRow({
            key: 'rsiWeeklyMax', label: 'Weekly RSI Maximum',
            desc: "The weekly RSI ceiling for Gate 1. Weekly RSI above this suggests the broader trend is overextended. Lower = more conservative. Default 72 matches standard technical analysis thresholds.",
            min: 50, max: 95,
          })}
          {renderRow({
            key: 'earningsBufferDays', label: 'Earnings Buffer Days',
            desc: "Gate 3 skips any trade where confirmed earnings fall within this many days of the option expiry. Earnings events can cause sharp moves that disrupt wheel trades. 14 days is a safe buffer; reduce if you want more trades (at the cost of earnings-risk exposure).",
            min: 0, max: 30,
          })}
          {renderDualRow({
            keyHigh: 'yieldHighStandard', keyMed: 'yieldMediumStandard',
            label: 'Minimum Yield — Standard Stocks (% annualized)',
            desc: "Annualized yield floors for HIGH-confidence and MEDIUM-confidence SELL PUT recommendations on standard stocks. Higher yields filter out low-premium trades but may eliminate safer large-caps. Default floors prioritize trades that earn meaningfully above risk-free rate.",
            min: 1, max: 30,
          })}
          {renderDualRow({
            keyHigh: 'yieldHighTopLiquid', keyMed: 'yieldMediumTopLiquid',
            label: 'Minimum Yield — Top Liquid Names (% annualized)',
            desc: "Relaxed yield floors for ETFs (SPY, QQQ) and mega-caps (AAPL, MSFT). These names have tighter spreads and lower IV, so naturally yield less. Lower floors here prevent filtering out the most liquid (and often safest) trades.",
            min: 1, max: 30,
          })}
          {renderRow({
            key: 'deltaHighMax', label: 'Delta Ceiling for HIGH Confidence',
            desc: "Maximum put delta for HIGH-confidence trades. Lower delta = further out-of-the-money = safer but lower premium. 0.20-0.25 is conservative; 0.30-0.35 is standard; above 0.40 is aggressive. This setting dramatically affects your win rate.",
            min: 0.15, max: 0.50, step: 0.05,
          })}

          <div className="advanced-gates-actions">
            <button className="btn btn-secondary" onClick={resetAll} title="Reset all values to defaults">
              ⚠ Reset All to Defaults
            </button>
            <button className="btn btn-primary" onClick={saveAll} disabled={saving}>
              {saving ? 'Saving…' : 'Save Advanced Settings'}
            </button>
          </div>
        </>
      )}
    </div>
  );
}

// ===== ERROR BOUNDARY =====
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error('[WheelPro] Render error caught by boundary:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{padding:'40px 20px', textAlign:'center'}}>
          <div style={{color:'var(--accent-red)', marginBottom:16, fontSize:14}}>
            Something went wrong: {this.state.error?.message || 'Unknown error'}
          </div>
          <button className="btn btn-primary" onClick={() => this.setState({ hasError: false, error: null })}>
            Try Again
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}
