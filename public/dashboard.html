:root {

  --gradient-accent: linear-gradient(135deg, #b89a3e, #c49a38);
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;

}

/* =================================================================
   a11y utilities — skip link, sr-only, and keyboard-focus fallback
   ================================================================= */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
.skip-link {
  position: absolute;
  top: -60px;
  left: 8px;
  background: var(--accent-gold);
  color: var(--bg-primary);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  z-index: 10000;
  transition: top 0.15s ease;
}
.skip-link:focus {
  top: 8px;
  outline: 2px solid var(--accent-gold);
  outline-offset: 2px;
}
/* Keyboard-focus fallback: ensures a visible gold outline on any
   interactive element focused via keyboard. Individual components
   may override with their own :focus-visible style. */
:focus-visible {
  outline: 2px solid var(--accent-gold);
  outline-offset: 2px;
}
button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible,
[role="button"]:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--accent-gold);
  outline-offset: 2px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "kern" 1;
  letter-spacing: 0.01em;
}

/* Scrollbar — v3.3.1: bright white by default for max visibility on dark bg */
::-webkit-scrollbar { width: 12px; height: 12px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.7);
  border-radius: 10px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.95); background-clip: padding-box; border: 2px solid transparent; }
::-webkit-scrollbar-thumb:active { background: #ffffff; background-clip: padding-box; border: 2px solid transparent; }
* { scrollbar-width: auto; scrollbar-color: rgba(255,255,255,0.7) rgba(255,255,255,0.05); }

/* Light-background contexts (modals, light panels) — darker scrollbar for contrast */
.light-panel ::-webkit-scrollbar-thumb,
.light-bg ::-webkit-scrollbar-thumb { background: rgba(30,40,60,0.35); background-clip: padding-box; border: 2px solid transparent; }
.light-panel ::-webkit-scrollbar-thumb:hover,
.light-bg ::-webkit-scrollbar-thumb:hover { background: rgba(30,40,60,0.55); background-clip: padding-box; border: 2px solid transparent; }
.light-panel, .light-bg { scrollbar-color: rgba(30,40,60,0.35) rgba(0,0,0,0.05); }

/* Selection */
::selection { background: rgba(74,143,212,0.35); color: white; }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pulse-glow {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes slideIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes skeleton-pulse {
  0%, 100% { opacity: 0.04; }
  50% { opacity: 0.08; }
}

.animate-in { animation: fadeInUp 0.4s ease-out forwards; }
.animate-fade { animation: fadeIn 0.25s ease-out forwards; }

/* Tabular numbers — all monospace numerals align in columns */
[style*="font-mono"], .stat-value, .ticker, .pricing-amount,
.score-badge-inner, .indicator-pill, .detail-row .value {
  font-feature-settings: "tnum" 1, "lnum" 1;
  font-variant-numeric: tabular-nums lining-nums;
}

/* ===== ANTI-COPY PROTECTIONS ===== */
body.protected {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
body.protected img { pointer-events: none; }

.app-container { min-height: 100vh; display: flex; flex-direction: column; }

  content: '';

  top: -50%;

  height: 80%;

  pointer-events: none;
}
.landing-hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -20%;

  height: 60%;
  background: radial-gradient(circle, rgba(74,144,217,0.04) 0%, transparent 70%);
  pointer-events: none;
}

  position: relative;
  z-index: 10;
}
.landing-logo {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
}
.landing-logo span {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: 10px;
  -webkit-text-fill-color: var(--text-muted);
  margin-left: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.7;
}

.landing-nav-links { display: flex; gap: 32px; align-items: center; }
.landing-nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
  cursor: pointer;
}
.landing-nav-links a:hover { color: var(--text-primary); }

.landing-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 40px;
  position: relative;
  z-index: 10;
}

.landing-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 14px;
  background: rgba(74,143,212,0.06);
  border: 1px solid rgba(74,143,212,0.15);
  border-radius: 100px;
  font-size: 12px;
  color: var(--accent-blue);
  font-weight: 500;
  margin-bottom: 32px;
  animation: fadeInUp 0.6s ease-out;
  letter-spacing: 0.3px;
  font-family: var(--font-mono);
}
.landing-badge .dot {
  width: 5px; height: 5px;
  background: var(--accent-green);
  border-radius: 50%;
  animation: pulse-glow 2s infinite;
}

.landing-h1 {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 72px);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 24px;
  animation: fadeInUp 0.6s ease-out 0.1s both;
  max-width: 800px;
}
.landing-h1 .gradient-text {
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.landing-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 560px;
  margin-bottom: 48px;
  animation: fadeInUp 0.6s ease-out 0.2s both;
  line-height: 1.7;
}

.landing-cta-group {
  display: flex;
  gap: 16px;
  animation: fadeInUp 0.6s ease-out 0.3s both;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
  border: none;
  text-decoration: none;
  font-family: var(--font-body);
  letter-spacing: 0.02em;
}
.btn-primary {
  background: var(--gradient-accent);
  color: #080d19;
  font-weight: 700;
  box-shadow: 0 1px 8px rgba(184,154,62,0.2);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 16px rgba(184,154,62,0.3);
  filter: brightness(1.08);
}
.btn-secondary {
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover {

  border-color: var(--text-muted);
}
.btn-sm {

}
.btn-danger {
  background: var(--accent-red);

.landing-stats {

  gap: 64px;
  margin-top: 80px;
  animation: fadeInUp 0.6s ease-out 0.4s both;
}
.landing-stat { text-align: center; }
.landing-stat-value {
  font-family: var(--font-mono);
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
}
.landing-stat-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.landing-features {
  padding: 100px 40px;
  max-width: 1200px;

}
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));

}
.feature-card {

  border-radius: var(--radius-md);

}

  border-color: rgba(74,143,212,0.25);
}

  align-items: center;
  justify-content: center;

}

  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font-body);
  transition: border-color 0.2s;
  outline: none;
}
.form-input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px var(--accent-blue-glow);
}
.form-input::placeholder {
  color: var(--text-muted);
}
.form-error {
  color: var(--accent-red);
  font-size: 12px;
  margin-top: 4px;
}
.form-footer {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  color: var(--text-muted);
}
.form-footer a {
  color: var(--accent-blue);
  cursor: pointer;
  text-decoration: none;
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard-layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
}
.sidebar-logo-sub {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 3px;
  font-family: var(--font-mono);
  opacity: 0.6;
}
.sidebar-nav { padding: 12px 10px; flex: 1; }
.sidebar-section-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 8px 12px;
  margin-top: 14px;
  font-family: var(--font-mono);
  opacity: 0.6;
}
.sidebar-section-label:first-child { margin-top: 0; }
.sidebar-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s ease;
  text-decoration: none;
}
.sidebar-link:hover {
  background: rgba(255,255,255,0.03);
  color: var(--text-primary);
}
.sidebar-link.active {
  background: rgba(74,143,212,0.08);
  color: var(--accent-blue);
  border-left: 2px solid var(--accent-blue);
  padding-left: 10px;
}
.sidebar-link .icon { font-size: 16px; width: 22px; text-align: center; opacity: 0.8; }

.sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid var(--border);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
}
.sidebar-avatar {
  width: 32px; height: 32px;
  background: var(--gradient-accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  color: #080d19;
}
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-plan {
  font-size: 10px;
  color: var(--accent-gold);
  font-weight: 500;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Main Content */
.main-content {
  flex: 1;
  min-width: 0;
  margin-left: 240px;
  min-height: 100vh;
  overflow-x: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,13,25,0.92);
  backdrop-filter: blur(16px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.topbar-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--accent-green);
  font-weight: 600;
  padding: 3px 10px;
  background: rgba(30,166,81,0.06);
  border: 1px solid rgba(30,166,81,0.15);
  border-radius: 100px;
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}
.topbar-badge .pulse {
  width: 5px; height: 5px;
  background: var(--accent-green);
  border-radius: 50%;
  animation: pulse-glow 2s infinite;
}

.page-content { padding: 24px 28px; }

/* ===== DASHBOARD COMPONENTS ===== */
/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  transition: border-color 0.15s ease;
}
.stat-card:hover {
  border-color: rgba(74,143,212,0.2);
}
.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 6px;
  font-family: var(--font-mono);
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  animation: countUp 0.4s ease-out;
  letter-spacing: -0.5px;
}
.stat-change {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 4px;
  padding: 1px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
}
.stat-change.positive { color: var(--accent-green); background: var(--accent-green-glow); }
.stat-change.negative { color: var(--accent-red); background: var(--accent-red-glow); }

/* Tables */
.data-table-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow-x: hidden;
}
.data-table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.data-table-header h3 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.01em;
}
.data-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.data-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 700;
  color: #e8eef7;  /* v3.3: bright white-ish for readability */
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-bottom: 2px solid rgba(184,154,62,0.35);
  background: #0a1220;
  font-family: var(--font-mono);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.data-table td {
  padding: 7px 12px;
  font-size: 12px;
  border-bottom: 1px solid rgba(26,39,64,0.5);
  white-space: nowrap;
  font-feature-settings: "tnum" 1;
}
.data-table tbody tr {
  transition: background 0.15s;
}
.data-table tbody tr:hover {
  background: rgba(255,255,255,0.02);
}
.data-table tbody tr:last-child td {
  border-bottom: none;
}

/* ===== SPLIT-TABLE: frozen column via JS + dual-panel layout ===== */
.split-table-wrapper {
  display: flex;
  width: 100%;
  max-width: 100%;
  max-height: 580px;
  overflow: hidden;
}
.split-table-fixed {
  flex-shrink: 0;
  overflow: hidden;
  border-right: 1px solid rgba(184,154,62,0.2);
  box-shadow: 2px 0 8px rgba(0,0,0,0.3);
  z-index: 10;
  position: relative;
}
.split-table-fixed .data-table { width: auto; }
.split-table-fixed .data-table th,
.split-table-fixed .data-table td {
  background: #090f1c;
}
.split-table-fixed .data-table tbody tr:hover td {
  background: var(--bg-card-hover);
}
.split-table-scroll {
  flex: 1;
  min-width: 0;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.split-table-scroll .data-table { width: 100%; }
/* Hide scrollbar on fixed panel (scroll synced from scrollable panel) */
.split-table-fixed { scrollbar-width: none; -ms-overflow-style: none; }
.split-table-fixed::-webkit-scrollbar { display: none; }

/* ===== Freeze-pane variant: for non-split tables that still need a sticky first col ===== */
.data-table-container.freeze-pane { overflow-x: auto; }
.data-table-container.freeze-pane .data-table th:first-child,
.data-table-container.freeze-pane .data-table td:first-child {
  position: sticky;
  left: 0;
  z-index: 5;
  background: var(--bg-card);
}
.data-table-container.freeze-pane .data-table th:first-child {
  z-index: 15;
  background: #0a1220;
}

/* ===== RESPONSIVE LAYOUT: fade transition between table and card view ===== */
.responsive-layout-fade {
  animation: layoutFadeIn 0.2s ease-out;
}
@keyframes layoutFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ===== MOBILE STOCK CARD VIEW ===== */
.stock-card-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px;
  background: transparent;
}
.stock-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px 12px 18px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  overflow: hidden;
}
.stock-card:hover,
.stock-card:active {
  background: var(--bg-card-hover);
  border-color: rgba(184,154,62,0.3);
}
.stock-card:active {
  transform: scale(0.995);
}
.stock-card-tierbar {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 4px;
  background: var(--accent-green);
}
.stock-card-tierbar.tier-high    { background: var(--accent-green); }
.stock-card-tierbar.tier-medium  { background: var(--accent-amber); }
.stock-card-tierbar.tier-low     { background: #d4b83a; }
.stock-card-tierbar.tier-wait    { background: var(--accent-red); }
.stock-card-tierbar.tier-default { background: var(--text-muted); }
.stock-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.stock-card-symbol {
  font-family: var(--font-mono);
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.5px;
  line-height: 1.1;
}
.stock-card-name {
  font-size: 11px;
  color: var(--text-secondary);  /* v3.3.2: bumped from muted — company name is identifier, not subtle */
  margin-top: 2px;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}
.stock-card-pill {
  flex-shrink: 0;
  padding: 3px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.6px;
  font-family: var(--font-mono);
}
.stock-card-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}
.stock-card-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stock-card-cell .stock-card-label {
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  margin-bottom: 2px;
}
.stock-card-cell .stock-card-value {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
}
.stock-card-reason {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.4;
  margin-top: 4px;
}
.stock-card-reason-label {
  color: var(--text-muted);
  font-weight: 600;
  margin-right: 4px;
}

/* DTE filter select — Wall Street Premium style */
.dte-filter-select {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  appearance: auto;
  min-width: 150px;
}
.dte-filter-select:hover,
.dte-filter-select:focus {
  border-color: var(--accent-gold);
  color: var(--text-primary);
  outline: none;
}
.dte-filter-select option {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

/* Score Badge */
.score-badge {
  position: relative;
}

/* ===== TOOLTIP SYSTEM ===== */
.tip-wrap {
  position: relative;
  display: inline-flex;
  cursor: help;
}
.tip-box {
  position: fixed;
  background: #1a1f2e;
  color: #e2e8f0;
  border: 1px solid rgba(184,154,62,0.2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: var(--font-primary);
  line-height: 1.5;
  white-space: pre-line;
  width: max-content;
  max-width: 300px;
  z-index: 99999;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.tip-box::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: #1a1f2e;
}
.tip-box.tip-below::after {
  top: auto;
  bottom: 100%;
  border-top-color: transparent;
  border-bottom-color: #1a1f2e;
}
.tip-label { color: var(--accent-gold); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.tip-val { color: #10b981; font-weight: 700; font-family: var(--font-mono); }
.tip-dim { color: #94a3b8; }
.tip-warn { color: #f59e0b; }
.tip-bad { color: #ef4444; }

.score-badge-inner {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 40px;
  padding: 2px 8px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.score-high { background: var(--accent-green-glow); color: var(--accent-green); }
.score-mid { background: var(--accent-amber-glow); color: var(--accent-amber); }
.score-low { background: var(--accent-red-glow); color: var(--accent-red); }

/* Signal Badge */
.signal-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}
.signal-bullish { background: var(--accent-green-glow); color: var(--accent-green); }
.signal-bearish { background: var(--accent-red-glow); color: var(--accent-red); }
.signal-neutral { background: rgba(100,116,139,0.15); color: var(--text-muted); }

/* Ticker Badge */
.ticker {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}

/* Indicator Pills */
.indicator-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.indicator-pill {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.2px;
}
.pill-green { background: var(--accent-green-glow); color: var(--accent-green); }
.pill-red { background: var(--accent-red-glow); color: var(--accent-red); }
.pill-amber { background: var(--accent-amber-glow); color: var(--accent-amber); }

/* Mini Chart */
.mini-chart {
  width: 80px;
  height: 32px;
}

/* ===== SCREENER ===== */
.screener-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.filter-select, .filter-input {
  padding: 8px 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-body);
  outline: none;
  min-width: 140px;
}
.filter-select:focus, .filter-input:focus {
  border-color: var(--accent-blue);
}
.filter-select option { background: var(--bg-secondary); }

/* ===== STOCK DETAIL ===== */
.stock-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.detail-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
}
.detail-card h4 {
  font-size: 14px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(30,41,59,0.3);
}
.detail-row:last-child { border-bottom: none; }
.detail-row .label { font-size: 13px; color: var(--text-secondary); }
.detail-row .value {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
}

/* Progress Bar */
.progress-bar {
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* ===== SETTINGS ===== */
.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 24px;
}
.settings-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 24px;
}
.settings-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(30,41,59,0.3);
}
.settings-row:last-child { border-bottom: none; }
.settings-row .label-group { flex: 1; }
.settings-row .label-main { font-size: 14px; font-weight: 500; }
.settings-row .label-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* Advanced Gate Thresholds section */
.advanced-gates-card { margin-top: 16px; }
.advanced-gates-header {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none; padding: 6px 0;
}
.advanced-gates-header h3 { margin: 0; }
.advanced-gates-chevron { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; }
.advanced-gates-chevron.open { transform: rotate(90deg); }
.advanced-gates-warning {
  background: rgba(196,154,56,0.08);
  border: 1px solid rgba(196,154,56,0.25);
  color: #c49a38;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 12px;
  line-height: 1.5;
  margin: 12px 0;
}
.advanced-gates-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px 16px;
  align-items: start;
  padding: 14px 0;
  border-bottom: 1px solid rgba(30,41,59,0.3);
}
.advanced-gates-row:last-of-type { border-bottom: none; }
.advanced-gates-row .label-main { font-size: 14px; font-weight: 500; }
.advanced-gates-row .label-desc {
  font-size: 12px; color: var(--text-muted); margin-top: 4px;
  grid-column: 1 / -1; line-height: 1.5;
}
.advanced-gates-input {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  padding: 6px 10px; border-radius: 4px;
  width: 80px; font-size: 13px;
}
.advanced-gates-reset-link {
  background: none; border: none;
  color: var(--text-muted); font-size: 11px;
  cursor: pointer; text-decoration: underline;
  padding: 6px 0; white-space: nowrap;
}
.advanced-gates-reset-link:hover { color: var(--accent); }
.advanced-gates-dual { display: flex; gap: 8px; align-items: center; }
.advanced-gates-dual .dual-label { font-size: 11px; color: var(--text-muted); }
.advanced-gates-actions {

    return messages[code] || 'Something went wrong. Please try again.';
  }
};

// ===== TECHNICAL INDICATOR CALCULATIONS =====
const TechnicalAnalysis = {
  // Simple Moving Average
  SMA(data, period) {
    if (data.length < period) return null;
    const slice = data.slice(-period);
    return slice.reduce((sum, v) => sum + v, 0) / period;
  },

  // Exponential Moving Average
  EMA(data, period) {
    if (data.length < period) return null;
    const k = 2 / (period + 1);
    let ema = data.slice(0, period).reduce((s, v) => s + v, 0) / period;
    for (let i = period; i < data.length; i++) {
      ema = data[i] * k + ema * (1 - k);
    }
    return ema;
  },

  // RSI (Relative Strength Index)
  RSI(closes, period = 14) {
    if (closes.length < period + 1) return null;
    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
      const diff = closes[closes.length - period - 1 + i] - closes[closes.length - period - 1 + i - 1];
      if (diff > 0) gains += diff;
      else losses -= diff;
    }
    let avgGain = gains / period;
    let avgLoss = losses / period;
    if (avgLoss === 0) return 100;
    const rs = avgGain / avgLoss;
    return 100 - (100 / (1 + rs));
  },

  // Weekly RSI — derives weekly candles from daily closes (sample every 5 trading days)
  weeklyRSI(closes, period = 14) {
    if (!closes || closes.length < period * 5) return null;
    // Sample every 5th close to create weekly data points
    const weeklyCloses = [];
    for (let i = 4; i < closes.length; i += 5) {
      weeklyCloses.push(closes[i]);
    }
    if (weeklyCloses.length < period + 1) return null;
    return this.RSI(weeklyCloses, period);
  },

  // MACD
  MACD(closes, fast = 12, slow = 26, signal = 9) {
    if (closes.length < slow + signal) return null;
    const emaFast = this.EMA(closes, fast);
    const emaSlow = this.EMA(closes, slow);
    if (emaFast === null || emaSlow === null) return null;
    
    // Calculate MACD line for all points
    const macdLine = [];
    const kFast = 2 / (fast + 1);
    const kSlow = 2 / (slow + 1);
    
    let emaF = closes.slice(0, fast).reduce((s, v) => s + v, 0) / fast;
    let emaS = closes.slice(0, slow).reduce((s, v) => s + v, 0) / slow;
    
    for (let i = slow; i < closes.length; i++) {
      emaF = closes[i] * kFast + emaF * (1 - kFast);
      emaS = closes[i] * kSlow + emaS * (1 - kSlow);
      macdLine.push(emaF - emaS);
    }
    
    if (macdLine.length < signal) return null;
    
    const signalLine = this.EMA(macdLine, signal);
    const currentMACD = macdLine[macdLine.length - 1];
    const histogram = currentMACD - signalLine;
    
    return { macd: currentMACD, signal: signalLine, histogram };
  },

  // Bollinger Bands
  BollingerBands(closes, period = 20, stdDev = 2) {
    if (closes.length < period) return null;
    const slice = closes.slice(-period);
    const sma = slice.reduce((s, v) => s + v, 0) / period;
    const variance = slice.reduce((s, v) => s + Math.pow(v - sma, 2), 0) / period;
    const sd = Math.sqrt(variance);
    return {
      upper: sma + stdDev * sd,
      middle: sma,
      lower: sma - stdDev * sd,
      bandwidth: ((sma + stdDev * sd) - (sma - stdDev * sd)) / sma,
      percentB: (closes[closes.length - 1] - (sma - stdDev * sd)) / ((sma + stdDev * sd) - (sma - stdDev * sd))
    };
  },

  // Average True Range (for volatility)
  ATR(highs, lows, closes, period = 14) {
    if (closes.length < period + 1) return null;
    const trueRanges = [];
    for (let i = 1; i < closes.length; i++) {
      const tr = Math.max(
        highs[i] - lows[i],
        Math.abs(highs[i] - closes[i - 1]),
        Math.abs(lows[i] - closes[i - 1])
      );
      trueRanges.push(tr);
    }
    return this.SMA(trueRanges.slice(-period), period);
  },

  // Volume Weighted Average Price (simplified)
  VWAP(closes, volumes) {
    if (closes.length === 0) return null;
    let cumPV = 0, cumV = 0;
    for (let i = 0; i < closes.length; i++) {
      cumPV += closes[i] * volumes[i];
      cumV += volumes[i];
    }
    return cumV > 0 ? cumPV / cumV : null;
  },

  // Support Level — lowest of recent swing lows (20-day low within 60-day lookback)
  SupportLevel(lows, closes, period = 60) {
    if (!lows || lows.length < 20) return closes ? closes[closes.length - 1] * 0.95 : null;
    const recentLows = lows.slice(-period);
    // Find the two lowest points and average them for a stronger support line
    const sorted = [...recentLows].sort((a, b) => a - b);
    return +((sorted[0] + sorted[1] + sorted[2]) / 3).toFixed(2);
  },

  // Resistance Level — highest of recent swing highs (20-day high within 60-day lookback)
  ResistanceLevel(highs, closes, period = 60) {
    if (!highs || highs.length < 20) return closes ? closes[closes.length - 1] * 1.05 : null;
    const recentHighs = highs.slice(-period);
    const sorted = [...recentHighs].sort((a, b) => b - a);
    return +((sorted[0] + sorted[1] + sorted[2]) / 3).toFixed(2);
  },

  // IV Percentile — where current IV sits relative to the last 60 days of realized volatility
  // Uses historical close-to-close volatility as proxy since we don't have historical IV data
  IVPercentile(closes, currentIV, period = 60) {
    if (!closes || closes.length < period || !currentIV) return 50;
    // Calculate rolling 20-day realized volatility for each window in the lookback
    const volReadings = [];
    for (let i = 20; i <= Math.min(period, closes.length); i++) {
      const window = closes.slice(i - 20, i);
      let sumSqReturns = 0;
      for (let j = 1; j < window.length; j++) {
        const logReturn = Math.log(window[j] / window[j - 1]);
        sumSqReturns += logReturn * logReturn;
      }
      const realizedVol = Math.sqrt(sumSqReturns / (window.length - 1)) * Math.sqrt(252) * 100;
      volReadings.push(realizedVol);
    }
    if (volReadings.length === 0) return 50;
    // Percentile = % of readings that current IV exceeds
    const below = volReadings.filter(v => currentIV > v).length;
    return Math.round((below / volReadings.length) * 100);
  },

  // Composite Signal: -1 (bearish) to +1 (bullish)
  getCompositeSignal(closes, highs, lows, volumes) {
    let score = 0;
    let signals = 0;

    // RSI Signal
    const rsi = this.RSI(closes);
    if (rsi !== null) {
      if (rsi < 30) { score += 1; signals++; } // Oversold = bullish
      else if (rsi > 70) { score -= 1; signals++; } // Overbought = bearish
      else if (rsi < 50) { score += 0.3; signals++; }
      else { score -= 0.3; signals++; }
    }

    // MACD Signal
    const macd = this.MACD(closes);
    if (macd !== null) {
      if (macd.histogram > 0 && macd.macd > macd.signal) { score += 1; signals++; }
      else if (macd.histogram < 0 && macd.macd < macd.signal) { score -= 1; signals++; }
      else { score += macd.histogram > 0 ? 0.3 : -0.3; signals++; }
    }

    // Bollinger Band Signal
    const bb = this.BollingerBands(closes);
    if (bb !== null) {
      if (bb.percentB < 0.2) { score += 1; signals++; } // Near lower band = bullish
      else if (bb.percentB > 0.8) { score -= 0.5; signals++; } // Near upper band
      else { score += 0; signals++; }
    }

    // Trend (EMA crossover)
    const ema9 = this.EMA(closes, 9);
    const ema21 = this.EMA(closes, 21);
    if (ema9 !== null && ema21 !== null) {
      if (ema9 > ema21) { score += 0.8; signals++; }
      else { score -= 0.8; signals++; }
    }

    // Price vs SMA 50
    const sma50 = this.SMA(closes, Math.min(50, closes.length));
    if (sma50 !== null) {
      const priceLoc = closes[closes.length - 1];
      if (priceLoc > sma50) { score += 0.5; signals++; }
      else { score -= 0.5; signals++; }
    }

    // Volume Confirmation Signal (v2.5 — from prior analysis)
    // Price declining + volume rising = accumulation (bullish for put selling)
    // Price rising + volume falling = distribution (bearish)
    if (volumes && volumes.length >= 10 && closes.length >= 10) {
      const recentPrice = closes[closes.length - 1];
      const priorPrice = closes[closes.length - 6]; // 5 days ago
      const recentVol = volumes.slice(-5).reduce((s,v) => s+v, 0) / 5;
      const priorVol = volumes.slice(-10, -5).reduce((s,v) => s+v, 0) / 5;
      const priceDown = recentPrice < priorPrice;
      const volUp = recentVol > priorVol * 1.1;
      const priceUp = recentPrice > priorPrice;
      const volDown = recentVol < priorVol * 0.9;
      if (priceDown && volUp) { score += 1; signals++; } // Accumulation = bullish
      else if (priceUp && volDown) { score -= 0.8; signals++; } // Distribution = bearish
      else { signals++; } // Neutral volume
    }

    return signals > 0 ? score / signals : 0;
  }
};

// ===== USER GATE THRESHOLDS (configurable via Settings → Advanced) =====
// Top-liquid names get relaxed yield floors (ETFs + mega-caps)
const TOP_LIQUID_SYMBOLS = new Set(['SPY','QQQ','IWM','DIA','VTI','AAPL','MSFT','GOOGL','GOOG','AMZN','NVDA','META']);
// NOTE: These defaults MUST match server.js env var defaults.
// If you change them here, update .env.example AND server.js constants.
// Source of truth: wheelpro/api/server.js (RSI_DAILY_MAX, RSI_WEEKLY_MAX, YIELD_*).
// earningsBufferDays (14) and deltaHighMax (0.35) are currently hardcoded in server.js
// — keep in sync manually until those are promoted to env vars.
const DEFAULT_GATE_THRESHOLDS = {
  rsiDailyMax: 78,
  rsiWeeklyMax: 72,
  earningsBufferDays: 14,
  yieldHighStandard: 12,       // annualized %
  yieldMediumStandard: 7,      // annualized %
  yieldHighTopLiquid: 8,       // annualized %
  yieldMediumTopLiquid: 4,     // annualized %
  deltaHighMax: 0.35,
};
// Module-level mutable holder so WheelScoring.getRecommendation can read user overrides
// without refactoring every call site. Populated at app mount from Firestore/localStorage.
let userGateThresholds = { ...DEFAULT_GATE_THRESHOLDS };
function setUserGateThresholds(next) {
  userGateThresholds = { ...DEFAULT_GATE_THRESHOLDS, ...(next || {}) };
  try { localStorage.setItem('gateThresholds', JSON.stringify(userGateThresholds)); } catch(e) {}
}
function getUserGateThresholds() { return userGateThresholds; }
// Bootstrap from localStorage immediately so scoring uses user values before Firestore resolves
try {
  const cached = localStorage.getItem('gateThresholds');
  if (cached) userGateThresholds = { ...DEFAULT_GATE_THRESHOLDS, ...JSON.parse(cached) };
} catch(e) {}

// ===== WHEEL STRATEGY SCORING =====
const WheelScoring = {
  // Calculate comprehensive wheel score (0-100)
  calculateScore(stock) {
    let score = 0;
    let maxScore = 0;

    // 1. Premium Yield (30 points max)
    const weeklyYield = stock.weeklyYield || 0;
    if (weeklyYield >= 0.03) score += 30;
    else if (weeklyYield >= 0.025) score += 25;
    else if (weeklyYield >= 0.02) score += 20;
    else if (weeklyYield >= 0.015) score += 15;
    else if (weeklyYield >= 0.01) score += 8;
    else score += 3;
    maxScore += 30;

    // 2. Delta Safety (20 points max)
    const delta = stock.delta || 0.3;
    if (delta <= 0.15) score += 20;
    else if (delta <= 0.20) score += 17;
    else if (delta <= 0.25) score += 14;
    else if (delta <= 0.30) score += 10;
    else score += 3;
    maxScore += 20;

    // 3. Technical Score (20 points max)
    const techSignal = stock.technicalSignal || 0;
    score += Math.max(0, Math.min(20, (techSignal + 1) * 10));
    maxScore += 20;

    // 4. Liquidity (15 points max)
    const optionVolume = stock.optionVolume || 0;
    if (optionVolume >= 10000) score += 15;
    else if (optionVolume >= 5000) score += 12;
    else if (optionVolume >= 1000) score += 8;
    else if (optionVolume >= 500) score += 5;
    else score += 2;
    maxScore += 15;

    // 5. IV Rank (15 points max) - Higher IV = more premium
    const ivRank = stock.ivRank || 50;
    if (ivRank >= 60) score += 15;
    else if (ivRank >= 45) score += 12;
    else if (ivRank >= 30) score += 8;
    else score += 4;
    maxScore += 15;

    return Math.round((score / maxScore) * 100);
  },

  // Get strategy recommendation — 3-Gate Entry System (v2.5)
  // All 3 gates must pass for HIGH confidence. Transparent, explainable, 6th-grader readable.
  getRecommendation(stock) {
    const thr = (typeof getUserGateThresholds === 'function') ? getUserGateThresholds() : DEFAULT_GATE_THRESHOLDS;
    const isTopLiquid = TOP_LIQUID_SYMBOLS.has((stock.symbol || '').toUpperCase());
    const yieldHighPct = isTopLiquid ? thr.yieldHighTopLiquid : thr.yieldHighStandard;
    const yieldMedPct  = isTopLiquid ? thr.yieldMediumTopLiquid : thr.yieldMediumStandard;
    // weeklyYield is stored as a decimal per-week; convert user's annualized % floor to weekly decimal
    const yieldHighFloor = (yieldHighPct / 100) / 52;
    const yieldMedFloor  = (yieldMedPct  / 100) / 52;

    const score = stock.wheelScore || 0;
    const signal = stock.technicalSignal || 0;
    const rsi = stock.rsi || 50;
    const weeklyRsi = stock.weeklyRsi || 50;
    const delta = stock.delta || 0.5;
    const weeklyYield = stock.weeklyYield || 0;
    const earningsIn = stock.earningsIn ?? 999;  // null = unknown = treat as far future
    const daysToExpiry = stock.daysToExpiry || 7;
    const bidAskSpread = stock.bidAskSpread || 1;
    const premium = stock.premium || 0;
    const otmPct = stock.otmPercent || 0;
    const macd = stock.macd;

    // PRE-CHECKS: Hard blockers before gates
    const earningsBeforeExpiry = earningsIn <= daysToExpiry;
    const earningsConfirmed = stock.earningsConfirmed === true;
    if (earningsBeforeExpiry && earningsConfirmed) {
      return { type: 'WAIT', label: 'Earnings Risk', color: 'red', confidence: 'NONE', reason: `Confirmed earnings in ${earningsIn}d — do not sell`, gates: '0/3' };
    }
    if (stock.exDivBeforeExpiry) {
      return { type: 'WAIT', label: 'Ex-Div Risk', color: 'red', confidence: 'NONE', reason: `Ex-dividend before expiry — early assignment risk`, gates: '0/3' };
    }
    if (otmPct > 0.15 || otmPct < 0.02) {
      return { type: 'WAIT', label: 'No Good Strike', color: 'red', confidence: 'NONE', reason: `Strike ${(otmPct*100).toFixed(1)}% OTM — outside 3-15% range`, gates: '0/3' };
    }

    // ===== 3-GATE ENTRY SYSTEM =====
    const gates = [];
    const gateDetails = [];

    // GATE 1: RSI Check — Daily RSI ≤ user max AND Weekly RSI < user max
    const gate1 = rsi <= thr.rsiDailyMax && weeklyRsi < thr.rsiWeeklyMax;
    gates.push(gate1);
    gateDetails.push(gate1
      ? `Gate 1 ✓ RSI ${rsi.toFixed(0)} · Weekly RSI ${weeklyRsi.toFixed(0)}`
      : `Gate 1 ✗ ${rsi > thr.rsiDailyMax ? `RSI ${rsi.toFixed(0)} > ${thr.rsiDailyMax} (overbought)` : `Weekly RSI ${weeklyRsi.toFixed(0)} ≥ ${thr.rsiWeeklyMax}`}`);

    // GATE 2: Momentum Check — RSI + MACD not both bearish simultaneously
    const rsiBearish = rsi > 65;
    const macdBearish = macd && macd.histogram < 0 && macd.macd < macd.signal;
    const gate2 = !(rsiBearish && macdBearish);
    gates.push(gate2);
    gateDetails.push(gate2
      ? `Gate 2 ✓ Momentum OK${macd ? ` · MACD ${macd.histogram > 0 ? 'bullish' : 'neutral'}` : ''}`
      : `Gate 2 ✗ RSI + MACD both bearish — high reversal risk`);

    // GATE 3: Earnings Safety
    //   - Unknown earnings date (earningsIn === null) → pass (treat as safe)
    //   - Confirmed earnings → require full buffer (earningsBufferDays)
    //   - Unconfirmed/estimated earnings → require half the buffer (estimates can shift by a few days,
    //     so still be cautious but not as strict as confirmed dates)
    const gate3 =
      earningsIn === null ||
      (earningsConfirmed && earningsIn >= thr.earningsBufferDays) ||
      (!earningsConfirmed && earningsIn >= (thr.earningsBufferDays / 2));
    gates.push(gate3);
    gateDetails.push(gate3
      ? `Gate 3 ✓ Earnings ${earningsIn === null ? 'unknown' : (earningsConfirmed ? earningsIn + 'd out' : '~' + earningsIn + 'd (est)')} — safe`
      : (earningsConfirmed
          ? `Gate 3 ✗ Earnings in ${earningsIn}d — too close (confirmed)`
          : `Gate 3 ✗ Earnings ~${earningsIn}d — unconfirmed estimate too close`));

    const gatesPassed = gates.filter(g => g).length;
    const allGatesPassed = gatesPassed === 3;
    const spreadPct = premium > 0 ? bidAskSpread / premium : 1;

    // HIGH CONFIDENCE: All 3 gates + score ≥75 + yield ≥ user HIGH floor + delta ≤ user ceiling
    if (allGatesPassed && score >= 75 && weeklyYield >= yieldHighFloor && delta <= thr.deltaHighMax && signal > 0 && spreadPct < 0.3) {
      return { type: 'SELL_PUT', label: 'Sell Put', color: 'green', confidence: 'HIGH',
        reason: `All 3 gates passed · RSI ${rsi.toFixed(0)} · Weekly RSI ${weeklyRsi.toFixed(0)} · Strong setup`,
        gates: '3/3', gateDetails };
    }

    // MEDIUM CONFIDENCE: All 3 gates + score ≥65 + yield ≥ user MEDIUM floor + delta ≤ user ceiling
    if (allGatesPassed && score >= 65 && weeklyYield >= yieldMedFloor && delta <= thr.deltaHighMax && signal > -0.2) {
      return { type: 'SELL_PUT', label: 'Sell Put', color: 'amber', confidence: 'MEDIUM',
        reason: `${gatesPassed}/3 gates passed · ${spreadPct >= 0.3 ? 'Watch bid-ask spread' : 'Good setup — monitor entry'}`,
        gates: `${gatesPassed}/3`, gateDetails };
    }

    // SELL COVERED CALL (if bearish and holding shares)
    if (signal < -0.3 && rsi > 60) {
      return { type: 'SELL_CALL', label: 'Sell Call', color: 'amber', confidence: 'MEDIUM',
        reason: 'Bearish — sell covered calls if holding', gates: `${gatesPassed}/3`, gateDetails };
    }

    // WAIT — explain which gates failed
    const failedGates = gateDetails.filter(g => g.includes('✗'));
    let reason = [];
    if (gatesPassed < 3) reason.push(`${gatesPassed}/3 gates passed`);
    if (score < 65) reason.push(`Score ${score} < 65`);
    if (weeklyYield < yieldMedFloor) reason.push(`Yield ${(weeklyYield*52*100).toFixed(1)}% ann. < ${yieldMedPct}% floor`);
    if (delta > thr.deltaHighMax) reason.push(`Delta ${delta.toFixed(2)} > ${thr.deltaHighMax.toFixed(2)}`);
    if (failedGates.length > 0) reason.push(failedGates[0]);

    return { type: 'WAIT', label: 'Wait', color: 'red', confidence: 'NONE',
      reason: reason.join(' · ') || 'Does not meet criteria', gates: `${gatesPassed}/3`, gateDetails };
  },

  // Calculate probability of profit (1 - delta for puts)
  getProbOfProfit(delta) {
    return Math.round((1 - (delta || 0.3)) * 100);
  },

  // Calculate cash required to sell a cash-secured put
  getCashRequired(strikePrice) {
    return (strikePrice || 0) * 100;
  },

  // Get confidence badge styling
  getConfidenceStyle(confidence) {
    switch(confidence) {
      case 'HIGH': return { bg: 'rgba(30,166,81,0.08)', color: '#1ea651', border: '1px solid rgba(30,166,81,0.18)' };
      case 'MEDIUM': return { bg: 'rgba(196,154,56,0.08)', color: '#c49a38', border: '1px solid rgba(196,154,56,0.18)' };
      default: return { bg: 'rgba(239,68,68,0.1)', color: '#ef4444', border: '1px solid rgba(239,68,68,0.2)' };
    }
  }
};

// ===== MINI SPARKLINE COMPONENT =====
function Sparkline({ data, width = 80, height = 32, color = '#3b82f6' }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ===== AUTH MODAL =====
function AuthModal({ mode, onClose, onSubmit, onToggle, notice }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  // a11y: Esc-to-close
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    if (!email || !password) { setError('Please fill in all fields.'); return; }
    if (mode === 'signup' && !name) { setError('Please enter your name.'); return; }
    if (mode === 'signup' && password.length < 6) { setError('Password must be at least 6 characters.'); return; }

    setLoading(true);
    try {
      let userData;
      if (mode === 'signup') {
        userData = await FirebaseHelper.signUp(email, password, name);
        if (window.posthog) window.posthog.capture('sign_up', { method: 'email' });
      } else {
        userData = await FirebaseHelper.signIn(email, password);
      }
      onSubmit(userData);
    } catch (err) {
      setError(FirebaseHelper.getErrorMessage(err.code));
    }
    setLoading(false);
  };

  const handleGoogleSignIn = async () => {
    setError('');
    setLoading(true);
    try {
      const userData = await FirebaseHelper.signInWithGoogle();
      if (window.posthog) window.posthog.capture('sign_up', { method: 'google' });
      onSubmit(userData);
    } catch (err) {
      setError(FirebaseHelper.getErrorMessage(err.code));
    }
    setLoading(false);
  };

  const handleForgotPassword = async () => {
    if (!email) { setError('Enter your email above, then click Forgot Password.'); return; }
    try {
      await firebaseAuth.sendPasswordResetEmail(email);
      setError('');
      alert('Password reset email sent! Check your inbox.');
    } catch (err) {
      setError(FirebaseHelper.getErrorMessage(err.code));
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose} role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'4px'}}>
          <h2 id="auth-modal-title">{mode === 'login' ? 'Welcome Back' : 'Start Your Free Trial'}</h2>
          <button onClick={onClose} aria-label="Close sign in dialog" style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',padding:'4px'}}>{Icons.close}</button>
        </div>
        <p>{mode === 'login' ? 'Sign in to access your dashboard' : '7 days free. Cancel anytime.'}</p>

          <div style={{padding:'10px 14px',marginBottom:'16px',background:'rgba(201,168,76,0.1)',border:'1px solid rgba(201,168,76,0.3)',borderRadius:'var(--radius-md)',color:'var(--accent-gold)',fontSize:'13px',lineHeight:1.5}}>
            {notice}
          </div>
        )}

        {/* Google Sign-In Button */}
        <button onClick={handleGoogleSignIn} disabled={loading} style={{width:'100%', padding:'12px', background:'var(--bg-elevated)', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', color:'var(--text-primary)', fontSize:'14px', fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:'10px', marginBottom:'16px', fontFamily:'var(--font-body)'}}>

}

// ===== COVERED CALL HELPER =====
const CoveredCallHelper = {
  // Generate CC recommendations locally using a BS-like approximation
  generateRecs(stock, costBasis, contracts = 1) {
    const price = stock?.price || costBasis * 1.05;
    const iv = Math.max(0.15, (stock?.iv || 28) / 100);
    const shares = contracts * 100;
    const results = [];
    const dteSeries = [21, 30, 45];

    dteSeries.forEach(dte => {
      const T = dte / 365;
      const sqrtT = Math.sqrt(T);
      // Sample strikes from 1% to 15% OTM in 2.5% steps
      [0.01, 0.025, 0.05, 0.075, 0.10, 0.125, 0.15].forEach(otmPct => {
        const strike = Math.round(price * (1 + otmPct) * 4) / 4; // round to $0.25
        const d1 = (Math.log(price / strike) + (0.001 + 0.5 * iv * iv) * T) / (iv * sqrtT);
        const d2 = d1 - iv * sqrtT;
        // Logistic approximation of N(x)
        const N = x => 1 / (1 + Math.exp(-1.7 * x));
        const callValue = price * N(d1) - strike * Math.exp(-0.001 * T) * N(d2);
        const mid = Math.max(0.05, callValue);
        const bid = Math.max(0.01, mid * 0.92);
        const ask = mid * 1.08;
        const delta = Math.max(0.04, Math.min(0.50, N(d1) * 0.65));
        const theta = (mid * 100) / dte;
        const annualizedYield = (mid / price) * (365 / dte) * 100;
        const distFromCostBasis = ((strike - costBasis) / costBasis) * 100;
        const expDate = new Date(Date.now() + dte * 86400000).toISOString().slice(0, 10);
        results.push({
          strike: +strike.toFixed(2), bid: +bid.toFixed(2), ask: +ask.toFixed(2),
          mid: +mid.toFixed(2), dte, expDate,
          delta: +delta.toFixed(2), theta: +theta.toFixed(2),
          annualizedYield: +annualizedYield.toFixed(1),
          distFromCostBasis: +distFromCostBasis.toFixed(1),
          belowCostBasis: strike < costBasis,
          totalPremium: Math.round(mid * shares),
          otmPct: +(otmPct * 100).toFixed(1),
        });
      });
    });

    // Conservative: 7.5%+ OTM, 30–45 DTE — keep shares longer
    const conservative = results
      .filter(r => r.otmPct >= 7.5 && r.dte >= 30)
      .sort((a, b) => b.annualizedYield - a.annualizedYield)
      .slice(0, 6);

    // Aggressive: ≤5% OTM, 21–30 DTE — maximize premium
    const aggressive = results
      .filter(r => r.otmPct <= 5 && r.dte <= 30)
      .sort((a, b) => b.annualizedYield - a.annualizedYield)
      .slice(0, 6);

    return { conservative, aggressive };
  },

  async fetchRecs(symbol, costBasis, stock, contracts = 1) {
    try {
      const url = `${CONFIG.API_BASE_URL}/api/covered-calls/${encodeURIComponent(symbol)}?costBasis=${costBasis}`;
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 5000);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data && (Array.isArray(data.conservative) || Array.isArray(data.aggressive))) return data;
      throw new Error('Unexpected response shape');
    } catch (e) {
      console.warn('[WheelPro] CC backend unavailable — local calc:', e.message);
      return this.generateRecs(stock, costBasis, contracts);
    }
  },

  getRecommendationText(rec, costBasis, symbol) {
    if (!rec) return null;
    const premStr = `$${rec.mid.toFixed(2)}/share ($${rec.totalPremium} total)`;
    const aboveBelow = rec.distFromCostBasis >= 0
      ? `${rec.distFromCostBasis.toFixed(1)}% above your $${costBasis.toFixed(2)} cost basis — shares keep any profit if called away`
      : `${Math.abs(rec.distFromCostBasis).toFixed(1)}% BELOW your cost basis — selling here locks in a loss on shares`;
    return `Sell the $${rec.strike} ${symbol} call expiring ${rec.expDate} for ${premStr} — ${rec.annualizedYield}% annualized yield. Strike is ${aboveBelow}.`;
  },

  getStageInfo(stage) {
    return {
      selling_puts:    { label: 'Selling Puts',         cls: 'wheel-stage-selling-puts',  icon: '↓', idx: 0 },
      assigned:        { label: 'Assigned — Own Shares', cls: 'wheel-stage-assigned',       icon: '⬛', idx: 1 },
      selling_calls:   { label: 'Selling Covered Calls', cls: 'wheel-stage-selling-calls',  icon: '↑', idx: 2 },
      called_away:     { label: 'Called Away',           cls: 'wheel-stage-called-away',    icon: '✓', idx: 3 },
    }[stage] || { label: 'Selling Puts', cls: 'wheel-stage-selling-puts', icon: '↓', idx: 0 };
  },
};

// ===== SPLIT-TABLE HOOK: syncs vertical scroll + row heights between fixed & scrollable panels =====
// ===== Responsive layout hook: decides between table and card view =====
// Rules:
//   width >= 900                                    -> 'table'
//   width >= 700 && width > height (landscape)      -> 'table'
//   else                                            -> 'cards'
function useResponsiveLayout() {
  const compute = () => {
    if (typeof window === 'undefined') return 'table';
    const w = window.innerWidth;
    const h = window.innerHeight;
    if (w >= 900) return 'table';
    if (w >= 700 && w > h) return 'table';
    return 'cards';
  };
  const [layout, setLayout] = React.useState(compute);
  React.useEffect(() => {
    let raf = null;
    const onResize = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = null;
        const next = compute();
        setLayout(prev => (prev === next ? prev : next));
      });
    };
    window.addEventListener('resize', onResize, { passive: true });
    window.addEventListener('orientationchange', onResize, { passive: true });
    return () => {
      if (raf) cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('orientationchange', onResize);
    };
  }, []);
  return layout;
}

function useSplitTable(deps) {
  const fixedRef = React.useRef(null);
  const scrollRef = React.useRef(null);

  // Sync vertical scroll: scrollable panel drives fixed panel
  React.useEffect(() => {
    const s = scrollRef.current;
    const f = fixedRef.current;
    if (!s || !f) return;
    const onScroll = () => { f.scrollTop = s.scrollTop; };
    s.addEventListener('scroll', onScroll, { passive: true });
    return () => s.removeEventListener('scroll', onScroll);
  }, []);

  // Sync row heights so both panels stay aligned
  React.useEffect(() => {
    const f = fixedRef.current;
    const s = scrollRef.current;
    if (!f || !s) return;
    const fRows = f.querySelectorAll('tr');
    const sRows = s.querySelectorAll('tr');
    // Reset to natural height first
    fRows.forEach(r => { r.style.height = ''; r.style.boxSizing = 'border-box'; });
    sRows.forEach(r => { r.style.height = ''; r.style.boxSizing = 'border-box'; });
    // Measure then apply max
    requestAnimationFrame(() => {
      const len = Math.min(fRows.length, sRows.length);
      for (let i = 0; i < len; i++) {
        const h = Math.max(fRows[i].getBoundingClientRect().height, sRows[i].getBoundingClientRect().height);
        fRows[i].style.height = h + 'px';
        sRows[i].style.height = h + 'px';
      }
    });
  }, deps);

  return { fixedRef, scrollRef };
}
